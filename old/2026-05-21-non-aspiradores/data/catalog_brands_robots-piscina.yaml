          - key: "cepillo-desgastado"
            title: "Zodiac CX20: cepillo desgastado"
            intent: "info"
            symptoms:
              - "El robot no elimina bien las algas del fondo aunque el filtro esté limpio"
              - "El robot resbala y pierde tracción especialmente en las pendientes laterales"
              - "La superficie de la piscina queda con una película verdosa tras el ciclo"
            checks:
              - "Saca el cepillo y examina las cerdas — si están aplastadas o tienen menos de la mitad de longitud hay que sustituirlo"
              - "Comprueba que el eje del cepillo gira libremente sin fricción ni resistencia"
              - "Revisa si las cerdas tienen desgaste asimétrico que indique un problema de alineación"
              - "Verifica cuántas temporadas lleva el cepillo — tras 2-3 temporadas suele estar agotado"
            causes:
              - "Cerdas aplastadas por uso continuado sobre superficies abrasivas de la piscina"
              - "Degradación por cloro y UV que fragiliza el plástico de las cerdas"
              - "Desgaste irregular por superficies de distintas durezas en la misma piscina"
