            causes:
              - "Desgaste asimétrico de los cepillos que genera más resistencia en un lado"
              - "Rodillos de tracción bloqueados por hojas o pelo que impiden el avance"
              - "Cable excesivamente enredado que actúa como ancla e impide la trayectoria libre"
            cta: { catKey: "cepillo", label: "Ver cepillos compatibles" }
