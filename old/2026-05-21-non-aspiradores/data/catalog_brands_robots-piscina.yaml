              - "Retira el cartucho de filtro y límpialo con agua a presión moderada"
              - "Inspecciona la malla del cartucho para detectar roturas o deformaciones"
              - "Verifica que el cartucho está bien encajado y no tiene juego dentro del compartimento"
              - "Comprueba si el filtro lleva más de dos temporadas en uso"
