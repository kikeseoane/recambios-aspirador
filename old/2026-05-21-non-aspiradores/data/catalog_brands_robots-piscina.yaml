brands:
  maytronics:
    name: "Maytronics / Dolphin"
    vertical: "robots-piscina"
    notes_brand: "Líder mundial en robots limpiafondos. Dolphin es la marca más buscada. Alta demanda en filtros, cepillos y cables."
    models:
      - model: "Dolphin E20"
        slug: "dolphin-e20"
        series: "E-Series"
        year_range: "2019-actual"
        sku_pack: "poolrobot10"
        model_tokens: ["dolphin e20", "e20"]
        intro: "El Dolphin E20 es el robot limpiafondos de entrada de Maytronics, ideal para piscinas de hasta 8m. Los filtros de cartucho y los cepillos son los consumibles más demandados."
        problemas:
          - key: "filtro-sucio"
            title: "Dolphin E20: filtro sucio o colmatado"
            intent: "info"
            symptoms:
              - "El robot recorre la piscina pero el agua sigue turbia al terminar el ciclo"
              - "El robot se mueve más despacio de lo normal o se detiene con frecuencia"
              - "El fondo de la piscina queda con restos de suciedad fina tras el ciclo completo"
            checks:
              - "Saca el cartucho de filtro y límpialo con una manguera hasta que el agua salga clara"
              - "Comprueba si el cartucho tiene grietas o deformaciones que reduzcan el filtrado"
              - "Revisa la cesta de filtro: si tiene residuos pegados en las mallas necesita sustitución"
              - "Verifica que el cartucho está correctamente insertado y la tapa cierra bien"
              - "Comprueba el tiempo desde el último recambio — tras 2 temporadas el cartucho suele estar agotado"
            causes:
              - "Cartucho de filtro colmatado por acumulación de algas, cal o suciedad fina"
              - "Malla del cartucho deteriorada que ya no retiene las partículas pequeñas"
              - "Uso en piscinas con mucha carga orgánica que agota el filtro más rápido"
            cta: { catKey: "filtro", label: "Ver filtros y cartuchos compatibles" }
          - key: "cepillo-desgastado"
            title: "Dolphin E20: cepillo desgastado"
            intent: "info"
            symptoms:
              - "El robot no desprende bien la suciedad adherida al fondo ni las paredes"
              - "Quedan manchas verdes o pardas en el fondo después de que el robot haya pasado"
              - "El robot resbala sobre las superficies y pierde tracción en los laterales"
            checks:
              - "Retira los cepillos y comprueba si las cerdas están aplastadas o han perdido rigidez"
              - "Observa si las cerdas tienen menos de la mitad de su longitud original"
              - "Revisa si el cepillo tiene grietas en el núcleo plástico que indiquen rotura estructural"
              - "Comprueba si el robot avanza en línea recta — un cepillo desgastado solo en un lado provoca desvío"
            causes:
              - "Desgaste natural de las cerdas por fricción con el revestimiento de la piscina"
              - "Exposición prolongada al cloro que fragiliza y degrada las cerdas de PVC"
              - "Uso en piscinas con superficie abrasiva que acelera el desgaste del cepillo"
            cta: { catKey: "cepillo", label: "Ver cepillos compatibles" }

      - model: "Dolphin E30"
        slug: "dolphin-e30"
        series: "E-Series"
        year_range: "2019-actual"
        sku_pack: "poolrobot10"
        model_tokens: ["dolphin e30", "e30"]
        intro: "El Dolphin E30 añade limpieza de paredes respecto al E20 y es uno de los modelos más vendidos de Maytronics en España. Los filtros y el cable son los recambios más solicitados."
        problemas:
          - key: "filtro-sucio"
            title: "Dolphin E30: filtro sucio o colmatado"
            intent: "info"
            symptoms:
              - "El agua de la piscina sigue con partículas en suspensión tras el ciclo de limpieza"
              - "El robot completa el ciclo pero el fondo queda con suciedad fina"
              - "El robot se ralentiza o detiene antes de finalizar el programa"
            checks:
              - "Extrae el cartucho de filtro y límpialo con una manguera a presión moderada"
              - "Comprueba si las mallas del cartucho tienen roturas o deformaciones visibles"
              - "Verifica que el cartucho encaja correctamente y la tapa del compartimento cierra bien"
              - "Revisa el historial de limpieza del filtro — en temporadas intensas hay que limpiarlo cada 2-3 usos"
            causes:
              - "Cartucho colmatado por uso prolongado sin limpieza periódica"
              - "Malla del cartucho deteriorada por el cloro que ya no filtra correctamente"
              - "Carga orgánica elevada en la piscina que satura el filtro más rápido de lo habitual"
            cta: { catKey: "filtro", label: "Ver filtros y cartuchos compatibles" }
          - key: "cable-enredado"
            title: "Dolphin E30: cable enredado o rígido"
            intent: "info"
            symptoms:
              - "El cable forma bucles o nudos durante el ciclo y el robot queda atrapado"
              - "El robot da vueltas en el mismo sitio sin avanzar porque el cable lo bloquea"
              - "El cable está tan rígido y enroscado que no se extiende correctamente"
            checks:
              - "Extiende el cable completamente fuera del agua y comprueba si tiene espirales permanentes"
              - "Verifica que el swivel giratorio del cable funciona libremente — gíralo con los dedos"
              - "Comprueba que la longitud del cable no excede el doble del largo de la piscina"
              - "Revisa si el cable tiene marcas de aplastamiento o daños en la vaina exterior"
            causes:
              - "Swivel giratorio desgastado o bloqueado que ya no destuerce el cable durante el movimiento"
              - "Cable envejecido que ha perdido flexibilidad por exposición al cloro y la luz UV"
              - "Cable demasiado largo para el tamaño de la piscina que siempre forma bucles"
            cta: { catKey: "accesorios", label: "Ver cables y swivel compatibles" }

      - model: "Dolphin Active 30i"
        slug: "dolphin-active-30i"
        series: "Active"
        year_range: "2020-actual"
        sku_pack: "poolrobot10"
        model_tokens: ["active 30i", "active30i"]
        intro: "El Dolphin Active 30i es el primer modelo con control por app de la gama E. La escalada de paredes y los cepillos de PVC son su punto diferencial y los recambios más demandados."
        problemas:
          - key: "no-sube-paredes"
            title: "Dolphin Active 30i no sube por las paredes"
            intent: "info"
            symptoms:
              - "El robot limpia bien el fondo pero resbala antes de llegar a la línea de agua"
              - "El robot intenta subir pero cae de vuelta al fondo repetidamente"
              - "Las paredes de la piscina quedan con algas o manchas verdes tras el ciclo"
            checks:
              - "Comprueba el estado de las cerdas del cepillo — si están aplastadas no hacen tracción en la pared"
              - "Revisa si el filtro está limpio: un filtro saturado reduce la succión necesaria para adherirse"
              - "Verifica que los rodillos laterales no tienen pelo o algas enredadas que bloqueen su giro"
              - "Comprueba que la piscina tiene la presión de agua correcta y el robot está bien sumergido"
            causes:
              - "Cepillos desgastados que no generan la tracción suficiente para escalar paredes"
              - "Filtro saturado que reduce la succión y la capacidad de adherencia del robot"
              - "Rodillos de tracción desgastados o bloqueados que impiden el avance vertical"
            cta: { catKey: "cepillo", label: "Ver cepillos compatibles" }
          - key: "cable-enredado"
            title: "Dolphin Active 30i: cable enredado"
            intent: "info"
            symptoms:
              - "El cable se enreda durante el ciclo y el robot queda inmovilizado"
              - "Al sacar el robot del agua el cable sale hecho un nudo difícil de deshacer"
              - "El robot describe trayectorias cortas y erráticas por culpa del cable"
            checks:
              - "Comprueba si el swivel anti-enredo gira libremente antes de sumergir el robot"
              - "Extiende el cable sobre el suelo para ver si tiene espirales permanentes que no se deshacen"
              - "Verifica que la longitud del cable es adecuada para el tamaño de tu piscina"
              - "Revisa si hay daños en la vaina del cable que puedan indicar desgaste interno"
            causes:
              - "Swivel desgastado que no gira con suficiente libertad para destorcer el cable"
              - "Cable con memoria de enrollado permanente por almacenamiento incorrecto"
              - "Cable demasiado largo que siempre genera exceso de longitud dentro de la piscina"
            cta: { catKey: "accesorios", label: "Ver cables y swivel compatibles" }

      - model: "Dolphin Sigma"
        slug: "dolphin-sigma"
        series: "Sigma"
        year_range: "2021-actual"
        sku_pack: "poolrobot10"
        model_tokens: ["dolphin sigma", "sigma"]
        intro: "El Dolphin Sigma es un robot gama alta con filtración dual de cartucho y bolsa. Los filtros de doble capa son el consumible más buscado por los propietarios de este modelo."
        problemas:
          - key: "filtro-saturado"
            title: "Dolphin Sigma: filtro saturado"
            intent: "info"
            symptoms:
              - "El agua no queda limpia tras el ciclo aunque el robot haya completado el programa"
              - "El robot reduce su velocidad de limpieza considerablemente"
              - "El sistema de filtración dual no retiene bien las partículas finas como polvo de polén"
            checks:
              - "Retira el cartucho de filtro y la bolsa interior y límpialos por separado con agua a presión"
              - "Comprueba si la bolsa de microfibra interior tiene roturas o costuras abiertas"
              - "Verifica que el cartucho exterior no tiene grietas ni mallas rotas"
              - "Revisa que ambas piezas están correctamente ensambladas antes de reinstalar"
            causes:
              - "Cartucho de filtro colmatado que impide el flujo de agua a través del sistema"
              - "Bolsa de microfibra interior saturada de partículas finas que no se lavan con agua"
              - "Sistema dual sobrecargado en piscinas con mucha carga orgánica o uso frecuente"
            cta: { catKey: "filtro", label: "Ver filtros compatibles" }
          - key: "cepillo-desgastado"
            title: "Dolphin Sigma: cepillo desgastado"
            intent: "info"
            symptoms:
              - "El robot no elimina las algas adheridas al fondo ni a las paredes laterales"
              - "El robot sigue el programa correctamente pero la superficie queda sucia tras su paso"
              - "Se nota que el robot resbala más de lo habitual en los laterales de la piscina"
            checks:
              - "Saca los cepillos y mide visualmente el desgaste de las cerdas"
              - "Comprueba si las cerdas están aplastadas o deformadas hacia un lado"
              - "Revisa el número de temporadas de uso — tras 2-3 temporadas los cepillos suelen estar agotados"
              - "Verifica que el eje del cepillo no tiene algas ni suciedad enredada que reducen la fricción"
            causes:
              - "Cerdas aplastadas por uso continuado sobre superficies abrasivas"
              - "Degradación acelerada por exposición al cloro y la luz UV"
              - "Desgaste asimétrico causado por una piscina con mayor pendiente en un lado"
            cta: { catKey: "cepillo", label: "Ver cepillos compatibles" }

      - model: "Dolphin Supreme M400"
        slug: "dolphin-supreme-m400"
        series: "Supreme"
        year_range: "2020-actual"
        sku_pack: "poolrobot10"
        model_tokens: ["m400", "supreme m400"]
        intro: "El Dolphin Supreme M400 es la opción profesional de Maytronics para piscinas grandes con triple cepillo. Los cepillos de PVC y los filtros de cesta son los recambios más solicitados."
        problemas:
          - key: "cepillo-desgastado"
            title: "Dolphin M400: cepillo desgastado"
            intent: "info"
            symptoms:
              - "El robot no limpia eficazmente las paredes y línea de agua aunque lo intente"
              - "La superficie de la piscina queda con película verdosa o suciedad fina tras el ciclo"
              - "El robot reduce la eficiencia de limpieza notablemente respecto a temporadas anteriores"
            checks:
              - "Retira los tres cepillos y comprueba el estado de las cerdas en cada uno"
              - "Verifica si las cerdas de los cepillos laterales están más desgastadas que las del central"
              - "Comprueba que los ejes de los cepillos giran libremente sin resistencia"
              - "Revisa si los cepillos tienen algas incrustadas que haya que eliminar antes de evaluar el desgaste"
            causes:
              - "Cerdas desgastadas por fricción con la superficie de la piscina tras varias temporadas"
              - "Degradación de la goma o PVC por la combinación de cloro y radiación UV"
              - "Desgaste irregular en las tres posiciones por diferente carga de trabajo"
            cta: { catKey: "cepillo", label: "Ver cepillos compatibles" }
          - key: "filtro-saturado"
            title: "Dolphin M400: filtro de cesta saturado"
            intent: "info"
            symptoms:
              - "El agua no queda limpia después de un ciclo completo de limpieza"
              - "El robot reduce velocidad y parece esforzarse más de lo normal"
              - "La cesta de filtro tiene residuos muy pegados que no salen solo con el agua"
            checks:
              - "Saca la cesta de filtro y límpiala con agua a presión y un cepillo suave"
              - "Comprueba si la malla metálica tiene deformaciones o agujeros que comprometan el filtrado"
              - "Verifica que la tapa del compartimento de filtro cierra correctamente sin juego"
              - "Revisa si hay partículas muy finas que pasen por la malla — en ese caso necesitas un filtro de malla más fina"
            causes:
              - "Cesta de filtro colmatada por hojas, insectos o algas que bloquean el caudal"
              - "Malla de la cesta deteriorada que ya no retiene las partículas"
              - "Filtración insuficiente para el nivel de suciedad de la piscina — se requiere limpieza más frecuente"
            cta: { catKey: "filtro", label: "Ver filtros compatibles" }

  zodiac-pool:
    name: "Zodiac / Fluidra"
