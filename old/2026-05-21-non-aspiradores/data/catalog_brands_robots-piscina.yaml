              - "La suciedad fina no queda retenida en el filtro y vuelve al agua de la piscina"
            checks:
              - "Saca el cartucho de filtro y límpialo con manguera hasta que el agua salga limpia"
              - "Inspecciona la malla del cartucho con luz directa para detectar roturas"
              - "Verifica que el cartucho está correctamente insertado antes de sumergir el robot"
              - "Comprueba si el filtro lleva más de dos temporadas — en ese caso sustitúyelo"
            causes:
              - "Cartucho colmatado por acumulación de algas y partículas finas"
              - "Malla rota que deja pasar la suciedad de vuelta al agua de la piscina"
              - "Uso en piscinas con alto contenido de cal que colmata el filtro más rápido"
            cta: { catKey: "filtro", label: "Ver filtros compatibles" }

      - model: "Zodiac Fresia 2"
