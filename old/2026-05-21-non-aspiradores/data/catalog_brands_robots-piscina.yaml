            causes:
              - "Rotura de la bolsa por desgaste del tejido de microfibra tras varias temporadas"
              - "Costuras deterioradas por la combinación de cloro y presión del agua"
              - "Daño por almacenamiento incorrecto con la bolsa húmeda y doblada"
            cta: { catKey: "filtro", label: "Ver bolsas de filtrado compatibles" }
          - key: "cepillo-desgastado"
            title: "Zodiac Vortex 4: cepillo desgastado"
            intent: "info"
            symptoms:
              - "El robot no limpia eficazmente el fondo aunque el filtro esté en buen estado"
              - "Las algas adheridas al fondo no se desprenden con el paso del robot"
              - "El robot pierde tracción en las subidas laterales y resbala frecuentemente"
