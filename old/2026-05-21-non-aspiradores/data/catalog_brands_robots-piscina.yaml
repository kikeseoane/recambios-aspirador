              - "Desgaste de cerdas por fricción sobre revestimiento abrasivo de la piscina"
              - "Degradación acelerada por cloro y exposición al sol durante el almacenamiento"
              - "Cerdas aplastadas asimétricamente por escalada frecuente de las paredes"
