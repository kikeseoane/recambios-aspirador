      compatibilidad:
      - Confirma la version exacta del secador antes de comprar boquillas, difusor
        o filtro trasero.
      - Algunas gamas premium cambian el sistema magnetico o de fijacion entre generaciones
        aunque se parezcan mucho.
      - En filtros y tapas traseras, compara diametro, pestanas y fotos reales con
        la pieza original.
      - En cables y fuentes, revisa voltaje, clavija y salida exacta antes de pedir
        un recambio.
      - Los accesorios termicos universales suelen ajustar peor que los especificos
        de serie.
      problemas:
      - key: pierde-potencia-aire
        intent: info
        cta_cat: filtro
        fix_hint: La mayoria de perdidas de potencia en secadores vienen de un filtro
          trasero sucio o parcialmente bloqueado.
        title: Studio Dry CV5830 ha perdido potencia de aire
        symptoms:
        - El caudal es menor que antes
        - Tarda mas en secar el pelo
        - El motor suena ahogado
        causes:
        - Filtro trasero saturado por polvo o pelo
        - Rejillas obstruidas
        - Accesorio mal colocado o deformado
        checks:
        - Limpiar el filtro y la rejilla de entrada
        - Probar sin accesorio para comparar el caudal
        - Revisar que no haya pelo atrapado en las entradas de aire
      - key: se-calienta-mucho
        intent: info
        cta_cat: filtro
        fix_hint: Si baja el rendimiento justo antes de calentarse, revisa primero
          el filtro y la entrada de aire.
        title: Studio Dry CV5830 se calienta demasiado
        symptoms:
        - La carcasa quema al tacto
        - Reduce automaticamente la potencia
        - Huele a caliente al poco de usarlo
        causes:
        - Filtro sucio que fuerza el motor
        - Entrada o salida de aire bloqueada
        - Uso prolongado a maxima temperatura
        checks:
        - Limpiar el filtro antes de volver a usarlo
        - Revisar que la salida de aire no esta tapada
        - Probar con un nivel de calor inferior
      - key: accesorio-no-encaja
        intent: info
        cta_cat: accesorios
        fix_hint: En secadores premium, una pequena diferencia de version basta para
          que las boquillas no fijen correctamente.
        title: 'Studio Dry CV5830: la boquilla o accesorio no encaja bien'
        symptoms:
        - La boquilla se cae o gira sola
        - El difusor vibra al usarlo
        - El accesorio queda suelto desde el primer dia
        causes:
        - Accesorio de otra version o generacion
        - Anillo de fijacion desgastado
        - Tolerancias pobres en un compatible generico
        checks:
        - Comparar el accesorio con la pieza original
        - Verificar la version exacta del modelo
        - Revisar que no falte ningun aro o iman de fijacion
      faqs:
      - q: ¿Cómo compruebo si este recambio es compatible con mi aspirador?
        a: Revisa el modelo exacto, la serie y, si hay variantes (Animal, Absolute,
          Pro...), confirma cuál tienes. Compara encajes, conectores y medidas con
          la pieza original.
      - q: ¿Los recambios compatibles son igual de buenos que los originales?
        a: Depende del fabricante. Muchos compatibles de calidad ofrecen rendimiento
          similar a menor precio, pero revisa valoraciones y que indiquen compatibilidad
          explícita con tu modelo.
      - q: ¿Con qué frecuencia debo cambiar el filtro?
        a: Lo habitual es cada 3-6 meses con uso normal, o antes si notas pérdida
          de succión. Los filtros lavables se limpian mensualmente y se sustituyen
          anualmente.
      - q: ¿Puedo usar una batería de mayor capacidad que la original?
        a: Solo si el voltaje es idéntico y el formato físico encaja. Una batería
          de mayor Ah dará más autonomía sin dañar el motor, pero verifica siempre
          la compatibilidad de voltaje.
