      compatibilidad:
      - Confirma el modelo exacto y la serie antes de comprar deposito, cartucho antical
        o manguera.
      - Los depositos y colectores antical suelen ser especificos por familia aunque
        visualmente parezcan iguales.
      - En juntas y tapones, revisa diametro, grosor y tipo de cierre.
      - 'Las resistencias y piezas internas no son universales: busca siempre referencia
        exacta de servicio.'
      - Si compras un protector de suela, mide la base de la plancha y revisa el sistema
        de fijacion.
      problemas:
      - key: no-sale-vapor
        intent: info
        cta_cat: deposito
        fix_hint: Si el equipo calienta pero no mantiene vapor, empieza revisando
          deposito, cartucho antical y circuito.
        title: Vaporella XT100C no saca vapor o saca muy poco
        symptoms:
        - La plancha calienta pero no vaporiza
        - Sale vapor intermitente
        - Tarda demasiado en recuperar presion
        causes:
        - Deposito vacio o mal encajado
        - Cal en la caldera o circuito
        - Cartucho antical agotado
        checks:
        - Rellenar y recolocar el deposito
        - Revisar el sistema antical
        - Purgar vapor unos segundos antes de planchar
      - key: pierde-agua
        intent: info
        cta_cat: junta
        fix_hint: Si el goteo persiste en caliente, suele haber desgaste en juntas
          o problemas de condensacion en el circuito.
        title: Vaporella XT100C gotea o pierde agua por la suela
        symptoms:
        - Moja la ropa en lugar de vaporizar
        - Gotea al empezar a usarla
        - Deja marcas de agua sobre tejidos delicados
        causes:
        - Junta fatigada en deposito o tapon
        - Temperatura insuficiente para vapor seco
        - Condensacion acumulada en la manguera
        checks:
        - Revisar juntas y cierres
        - Esperar a que alcance temperatura completa
        - Purgar vapor antes de planchar prendas delicadas
      - key: no-calienta-bien
        intent: info
        cta_cat: resistencia
        fix_hint: Una perdida clara de temperatura sostenida suele apuntar a resistencia
          o acumulacion severa de cal.
        title: Vaporella XT100C no calienta bien
        symptoms:
        - La suela no alcanza temperatura
        - Hay que pasar varias veces sobre la prenda
        - El vapor sale tibio y poco efectivo
        causes:
        - Resistencia de suela o caldera fatigada
        - Acumulacion de cal
        - Sensor termico desajustado
        checks:
        - Probar varios niveles de calor
        - Realizar limpieza antical si el fabricante lo permite
        - Observar si el problema aparece en todos los tejidos
      faqs:
      - q: ¿Cada cuánto debo descalcificar mi cafetera?
        a: Cada 2-3 meses con agua dura, o cuando el programa de la máquina lo indique.
          La cal es la causa principal de averías en cafeteras de presión.
      - q: ¿Los filtros de agua de cafetera son universales?
        a: No. Cada fabricante tiene su sistema de filtrado. Comprueba el número de
          referencia de tu modelo antes de comprar.
      - q: ¿Puedo cambiar la junta de mi cafetera yo mismo?
        a: Sí, en la mayoría de modelos es una operación sencilla. Solo necesitas
          la junta correcta (verifica las medidas en mm) y seguir un tutorial del
          modelo específico.
      - q: ¿Por qué la cafetera pierde presión después de años de uso?
        a: La acumulación de cal deteriora las juntas y obstruye la bomba. Un descalcificado
          regular y la sustitución de juntas cada 2-3 años suelen resolver el problema.
