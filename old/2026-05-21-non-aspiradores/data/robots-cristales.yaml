        intent: info
        symptoms:
        - El depósito de agua se vacía a mitad de la primera ventana
        - Quedan rayas de suciedad seca en el cristal porque el robot se queda sin
          agua
        - El depósito necesita rellenarse mucho más frecuentemente que al principio
        checks:
        - Revisa el depósito por fuera con el robot encendido para detectar fugas
          visibles
        - Comprueba la junta de goma del depósito — si está agrietada o deformada
          hay que sustituirla
        - Verifica que el dispensador no está atascado en posición abierta por cal
          o residuos
        - Comprueba si el robot está configurado en modo de alta humedad que vacía
          antes el depósito
        causes:
        - Junta del depósito deteriorada que provoca una fuga continua de agua
        - Dispensador bloqueado en posición abierta por cal que libera agua constantemente
        - Grieta en el cuerpo del depósito por caída o impacto que no siempre es visible
          a simple vista
        cta:
