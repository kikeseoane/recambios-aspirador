      intro: El Ecovacs WINBOT W1 Pro es el robot limpiacristales más avanzado de
        Ecovacs con sistema de rociado inteligente. Las almohadillas son el consumible
        más solicitado.
      problemas:
      - key: almohadilla-desgastada
        title: 'WINBOT W1 Pro: almohadilla desgastada'
        intent: info
        symptoms:
        - El cristal queda con rayas o suciedad extendida en lugar de limpio
        - Las almohadillas tienen zonas claramente más finas o peladas
        - El robot necesita más pasadas para conseguir el mismo resultado que antes
        checks:
        - Examina las almohadillas por ambas caras para detectar zonas de desgaste
          irregular
        - Comprueba si las fibras de microfibra son suaves al tacto o están endurecidas
        - Verifica cuántas horas llevan en uso — el fabricante recomienda sustituirlas
          cada 3 meses
        - Revisa si tienen residuos de cal incrustados que se notan al palpar la superficie
        causes:
        - Desgaste natural de la microfibra por fricción sobre el cristal
        - Cal del agua que endurece las fibras y reduce su capacidad de limpieza
        - Suciedad incrustada que actúa como elemento abrasivo durante el frotado
        cta:
          catKey: accesorios
          label: Ver almohadillas compatibles
      - key: no-detecta-bordes
        title: WINBOT W1 Pro no detecta bordes
        intent: info
        symptoms:
        - El robot sale del marco de la ventana y hay que sujetarlo manualmente
        - El robot no frena al acercarse al borde del cristal y lo sobrepasa
        - El robot repite la misma franja sin cubrir toda la superficie de la ventana
        checks:
        - Limpia los sensores de borde con un paño seco — los sensores sucios dan
          lecturas erróneas
        - Verifica que el cristal no tiene película de suciedad muy gruesa que confunda
          los sensores
        - Comprueba que el robot está actualizado con el último firmware disponible
          en la app Ecovacs
        - Revisa si el problema ocurre en todos los cristales o solo en uno — un cristal
          muy limpio puede confundir el sensor
        causes:
        - Sensores de detección de borde sucios o con residuos que bloquean la lectura
        - Cristal con propiedades ópticas inusuales (tintado, espejado) que engañan
          al sensor óptico
        - Firmware desactualizado con un bug en la detección de bordes corregido en
          versiones posteriores
        cta:
          catKey: accesorios
          label: Ver accesorios y sensores compatibles
