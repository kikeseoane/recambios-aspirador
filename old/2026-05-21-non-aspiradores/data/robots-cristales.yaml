      compatibilidad:
      - Confirma el modelo exacto (variante Animal, Absolute, etc.) antes de comprar
        cualquier recambio.
      - 'En baterías: verifica voltaje nominal, capacidad (Ah) y tipo de conector
        (click-in vs. tornillos).'
      - 'En filtros: comprueba si es HEPA lavable o cartucho seco y las medidas exactas.'
      - 'En rodillos: elige entre soft roller (suelos duros) o multisuperficie (mixto)
        según tu caso.'
      - Compara fotos reales del recambio con tu pieza original antes de comprar.
      faqs:
      - q: ¿Cómo compruebo si este recambio es compatible con mi aspirador?
        a: Revisa el modelo exacto, la serie y, si hay variantes (Animal, Absolute,
          Pro...), confirma cuál tienes. Compara encajes, conectores y medidas con
          la pieza original.
      - q: ¿Los recambios compatibles son igual de buenos que los originales?
        a: Depende del fabricante. Muchos compatibles de calidad ofrecen rendimiento
          similar a menor precio, pero revisa valoraciones y que indiquen compatibilidad
          explícita con tu modelo.
      - q: ¿Con qué frecuencia debo cambiar el filtro?
        a: Lo habitual es cada 3-6 meses con uso normal, o antes si notas pérdida
          de succión. Los filtros lavables se limpian mensualmente y se sustituyen
          anualmente.
      - q: ¿Puedo usar una batería de mayor capacidad que la original?
        a: Solo si el voltaje es idéntico y el formato físico encaja. Una batería
          de mayor Ah dará más autonomía sin dañar el motor, pero verifica siempre
          la compatibilidad de voltaje.
    - model: HOBOT LEGEE-688
      slug: hobot-legee-688
      series: LEGEE
      year_range: 2021-actual
      sku_pack: glasscleaner10
      model_tokens:
      - legee 688
      - legee688
      - legee
      intro: El HOBOT LEGEE-688 combina fregado del suelo y limpieza de cristales
        en un solo robot. Las almohadillas de microfibra son el consumible más solicitado
        para este modelo híbrido.
      problemas:
      - key: almohadilla-desgastada
        title: 'HOBOT LEGEE-688: almohadilla desgastada'
        intent: info
        symptoms:
        - El robot limpia los cristales pero deja rayas o manchas en lugar de un acabado
          limpio
        - Las almohadillas tienen zonas peladas o más finas que el resto
        - El robot necesita más pasadas para eliminar la misma suciedad que antes
        checks:
        - Examina las almohadillas a contraluz para detectar zonas desgastadas o agujeros
        - Comprueba si las almohadillas conservan la textura suave original o están
          endurecidas
        - Verifica cuántas horas de uso llevan — se recomienda sustituirlas cada 3
          meses con uso semanal
        - Revisa si las almohadillas están sucias con residuos de cal que las endurecen
        causes:
        - Desgaste natural de las fibras de microfibra por fricción sobre el cristal
        - Cal del agua dura que endurece las fibras y reduce su capacidad de absorción
        - Suciedad incrustada que actúa como abrasivo y acelera el desgaste
        cta:
          catKey: accesorios
          label: Ver almohadillas compatibles
      - key: no-carga
        title: HOBOT LEGEE-688 no carga
        intent: info
        symptoms:
        - El indicador de carga no se enciende al colocar el robot en la base
        - La batería no sube de nivel aunque el robot lleve horas en la estación
        - El robot se apaga a los pocos minutos de empezar a limpiar
        checks:
        - Limpia los contactos metálicos del robot y de la base de carga con un paño
          seco
        - Verifica que la base está enchufada y tiene alimentación eléctrica
        - Comprueba si el cable del adaptador tiene daños o dobleces pronunciados
        - Prueba a reiniciar el robot y volver a colocarlo sobre la base
        causes:
        - Contactos de carga oxidados o sucios que impiden la transferencia de corriente
        - Cargador defectuoso que no entrega la tensión correcta
        - Batería agotada por ciclos acumulados que ya no acepta carga
        cta:
          catKey: cargador
          label: Ver cargadores compatibles
      recambios:
