  guias_genericas:
    seguridad:
    - Desconecta el aspirador antes de manipular filtros, rodillos o batería.
    - 'No laves filtros no lavables: revisa el tipo (HEPA lavable vs. cartucho seco).'
    - 'Evita baterías no compatibles con el modelo/serie: riesgo de sobrecalentamiento
      y fallos de carga.'
    - 'Si hay olor a quemado, chispas o cortes repetidos: detén el uso y revisa obstrucciones
      y cableado.'
    mantenimiento:
    - 'Limpia el depósito y conductos: la obstrucción es la causa nº1 de pérdida de
      succión.'
    - 'Lava y seca filtros lavables (24h): la humedad genera malos olores y reduce
      el caudal.'
    - Retira pelo/hilos del rodillo cada 1-2 semanas si hay mascotas o alfombras.
    - 'Revisa juntas y sellos: una fuga de aire baja el rendimiento incluso con motor
      correcto.'
    compra:
    - Prioriza recambios con encaje y conectores equivalentes (voltaje nominal y tipo
      de anclaje).
    - 'En filtros, elige el grado adecuado: HEPA para alergias; estándar para uso
      general.'
    - 'En rodillos, elige según suelo: soft roller para duro; multisuperficie para
      mixto.'
    - Si tu aspirador es robot, compra packs (filtros + cepillos laterales + mopas)
      para abaratar mantenimiento.
brands:
  hobot:
    name: HOBOT
    notes_brand: Líder en robots limpiacristales. Alta demanda en almohadillas, depósitos
      y baterías.
    models:
    - model: HOBOT 2S
      slug: hobot-2s
      series: HOBOT
      year_range: 2020-actual
      sku_pack: glasscleaner10
      model_tokens:
      - hobot 2s
      - hobot2s
      intro: El HOBOT 2S es el robot limpiacristales más vendido de la gama HOBOT
        con sistema de rociado de agua integrado. Las almohadillas de microfibra y
        las baterías son los consumibles más demandados.
      problemas:
      - key: pierde-adherencia
        title: HOBOT 2S pierde adherencia al cristal
        intent: info
        symptoms:
        - El robot se despega del cristal durante la limpieza y cae
        - El robot resbala hacia abajo aunque los motores sigan funcionando
        - El robot no consigue subir más allá de la mitad del cristal
        checks:
        - 'Examina las almohadillas: si están sucias o desgastadas no hacen el sello
          necesario para la succión'
        - Comprueba que la ventosa de seguridad está bien enganchada antes de iniciar
        - Verifica que el cristal no tiene residuos de cera o productos repelentes
          que impidan la adherencia
        - Revisa si hay fugas de aire en el sello perimetral del robot — pasa la mano
          alrededor mientras funciona
        causes:
        - Almohadillas desgastadas o sucias que rompen el sello de vacío necesario
          para la adherencia
        - Cristal con residuos de cera o productos hidrofóbicos que impiden la succión
        - Sello perimetral del robot deteriorado que genera pérdida de vacío
        cta:
          catKey: accesorios
          label: Ver almohadillas y ventosas compatibles
      - key: bateria-agotada
        title: HOBOT 2S batería se agota rápido
        intent: info
        symptoms:
        - El robot termina la batería a mitad de la ventana y cae sin completar la
          limpieza
        - La autonomía ha bajado notablemente respecto a cuando era nuevo
        - El robot no retiene la carga ni siquiera después de varias horas en el cargador
        checks:
        - Comprueba cuántos ciclos de carga lleva la batería — tras 300-400 ciclos
          la capacidad cae
        - Verifica que el cargador suministra la tensión correcta con un multímetro
        - Revisa si la batería está ligeramente abultada — una batería hinchada hay
          que sustituirla de inmediato
        - Comprueba que el robot no está expuesto a temperaturas extremas durante
          la carga
        causes:
        - Batería de litio degradada por ciclos de carga acumulados (causa más habitual
          tras 2 años de uso)
        - Cargador defectuoso que no entrega la corriente correcta y no recarga completamente
        - Almacenamiento con la batería descargada completamente que acelera la degradación
        cta:
          catKey: bateria
          label: Ver baterías compatibles
