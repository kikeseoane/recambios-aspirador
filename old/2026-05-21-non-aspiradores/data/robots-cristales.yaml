    - model: HOBOT-298
      slug: hobot-298
      series: HOBOT
      year_range: 2018-2022
      sku_pack: glasscleaner10
      model_tokens:
      - hobot 298
      - hobot298
      - '298'
      intro: El HOBOT-298 fue uno de los primeros robots limpiacristales con ultrasonidos.
        Es un modelo descatalogado pero con alta demanda de cargadores y almohadillas
        de recambio.
      comprar_nuevo:
        query: HOBOT window cleaning robot
        label: Ver HOBOT nuevo en AliExpress
        note: El HOBOT-298 tiene varios años. Si la reparación es costosa, compara
          con los modelos actuales.
      problemas:
      - key: no-carga
        title: HOBOT-298 no carga
        intent: info
        symptoms:
        - El robot no enciende el indicador de carga al conectar el cargador
        - El robot se apaga durante la limpieza aunque parecía tener batería suficiente
        - La batería no sube de nivel después de varias horas de carga
        checks:
        - Comprueba que el cargador del HOBOT-298 es el original o uno con la misma
          tensión y polaridad
        - Limpia el conector de carga del robot con un palillo seco para eliminar
          suciedad o corrosión
        - Verifica que el cable del cargador no tiene cortes ni dobleces bruscos
        - Revisa si la batería está abultada — en modelos antiguos la batería de polímero
          de litio se hincha
        causes:
        - Batería de litio degradada por el tiempo y los ciclos de carga (causa principal
          en modelos de 5+ años)
        - Cargador original deteriorado que ya no entrega la tensión correcta
        - Conector de carga del robot con corrosión por humedad que impide el contacto
        cta:
          catKey: cargador
          label: Ver cargadores compatibles
      - key: bateria-agotada
        title: 'HOBOT-298: batería se agota muy rápido'
        intent: info
        symptoms:
        - El robot termina la batería en menos de 10 minutos cuando antes duraba 25
        - El robot no termina de limpiar una ventana mediana antes de quedarse sin
          batería
        - El indicador de batería baja de lleno a vacío en muy poco tiempo
        checks:
        - Verifica cuántos años tiene el robot — tras 4-5 años la batería suele estar
          agotada
        - Comprueba si la batería está hinchada — palpa la parte trasera del robot
          para detectar protuberancias
        - 'Revisa si el robot se carga correctamente: una carga incompleta simula
          batería agotada'
        - Prueba a cargar durante 3 horas completas y mide la autonomía resultante
        causes:
        - Batería de litio al final de su vida útil tras años de uso y ciclos de carga
        - Degradación acelerada por almacenamiento con batería muy descargada en temporadas
          de invierno
        - Cargador defectuoso que realiza cargas parciales que aceleran el envejecimiento
          de la batería
        cta:
          catKey: bateria
          label: Ver baterías compatibles
      recambios:
        accesorios:
        - sku: hobot-hobot-298-accesorios-glass-pad-wash
          title: Almohadillas de lavado compatibles (pack) para HOBOT-298
          intent: compra
          query: HOBOT hobot298 pad washing
          must_include:
          - hobot298
          - pad
          - washing
          must_not_include:
          - battery
          - charger
          - tank
          - suction
          - cable
          model_tokens: &id003
          - hobot 298
          - hobot298
