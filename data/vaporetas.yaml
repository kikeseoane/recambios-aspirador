          query: Karcher sc 3 easyfix lance steam
          must_include:
          - sc 3 easyfix
          - lance
          - steam
          must_not_include:
          - vacuum
          - coffee
          - humidifier
          - air
          - purifier
          model_tokens: *id003
        - sku: karcher-steam-karcher-sc3-easyfix-accesorios-acc-kit
          title: Kit de accesorios compatible para SC 3 EasyFix
          intent: compra
          query: Karcher sc 3 easyfix kit accessory steam
          must_include:
          - sc 3 easyfix
          - kit
          - accessory
          - steam
          must_not_include:
          - vacuum
          - coffee
          - humidifier
          - air
          - purifier
          model_tokens: *id003
      compatibilidad:
      - 'Comprueba si tu vaporeta usa deposito extraible o caldera fija: cambia por
        completo el tipo de pieza.'
      - Las juntas y tapones son muy sensibles a diametro y rosca; una diferencia
        minima puede provocar fugas.
      - 'En mopas y panos, confirma el sistema de sujecion: velcro, goma, clip o bolsillo.'
      - Las boquillas y cepillos redondos suelen variar entre gamas domesticas y profesionales.
      - Si compras manguera o lanza, compara anclajes, longitud y tipo de gatillo.
      problemas:
      - key: no-sale-vapor
        intent: info
        cta_cat: deposito
        fix_hint: Si hay agua pero no presion, la causa mas frecuente es una obstruccion
          en boquilla o una junta fatigada.
        title: SC 3 EasyFix no saca vapor
        symptoms:
        - Enciende pero no emite vapor
        - Sale muy poco vapor aunque el deposito esta lleno
        - El piloto indica listo pero la boquilla no responde
        causes:
        - Deposito mal colocado o vacio
        - Conducto o boquilla obstruidos por cal
        - Junta deteriorada con perdida de presion
        checks:
        - Rellenar y recolocar el deposito
        - Desmontar y limpiar la boquilla
        - Revisar juntas y tapas por fugas
      - key: pierde-agua
        intent: info
        cta_cat: junta
        fix_hint: Cuando la perdida aparece alrededor del cierre, la junta suele ser
          la primera pieza a sustituir.
        title: SC 3 EasyFix pierde agua o gotea
        symptoms:
        - Sale agua en vez de vapor seco
        - Gotea por la tapa o la manguera
        - Deja charcos en el suelo
        causes:
        - Junta de tapa deteriorada
        - Deposito mal cerrado
        - Exceso de condensacion en la manguera
        checks:
        - Revisar el estado de la junta principal
        - Comprobar el cierre del tapon y el deposito
        - Purgar unos segundos antes de usar
      - key: accesorio-no-funciona
        intent: info
        cta_cat: accesorios
        fix_hint: En vaporetas, un accesorio que ajusta mal suele empeorar tanto la
          limpieza como la presion percibida.
        title: 'SC 3 EasyFix: el accesorio o cepillo no funciona bien'
        symptoms:
        - El cepillo no limpia como antes
        - La mopa no arrastra bien la suciedad
        - La lanza sale despedida o se afloja
        causes:
        - Accesorio desgastado o deformado
        - Sistema de fijacion flojo
        - Pieza no especifica para la version exacta
        checks:
        - Comparar encajes con el accesorio original
        - Revisar clips y pestanas de fijacion
        - Probar otro accesorio del mismo equipo
      faqs:
      - q: ¿Cada cuánto debo descalcificar mi cafetera?
        a: Cada 2-3 meses con agua dura, o cuando el programa de la máquina lo indique.
          La cal es la causa principal de averías en cafeteras de presión.
      - q: ¿Los filtros de agua de cafetera son universales?
        a: No. Cada fabricante tiene su sistema de filtrado. Comprueba el número de
          referencia de tu modelo antes de comprar.
      - q: ¿Puedo cambiar la junta de mi cafetera yo mismo?
        a: Sí, en la mayoría de modelos es una operación sencilla. Solo necesitas
          la junta correcta (verifica las medidas en mm) y seguir un tutorial del
          modelo específico.
      - q: ¿Por qué la cafetera pierde presión después de años de uso?
        a: La acumulación de cal deteriora las juntas y obstruye la bomba. Un descalcificado
          regular y la sustitución de juntas cada 2-3 años suelen resolver el problema.
