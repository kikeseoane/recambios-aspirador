          model_tokens: *id001
      compatibilidad:
      - Comprueba el modelo exacto y el ano de tu plancha antes de pedir funda, base
        o cierre.
      - Muchas fundas y bases termicas son universales, pero el ajuste perfecto depende
        del largo y ancho de la plancha.
      - En cables giratorios, revisa longitud, tipo de union y salida del mango.
      - Los cierres, bisagras y topes cambian mucho entre revisiones aunque la carcasa
        parezca igual.
      - Si el accesorio toca directamente las placas, confirma siempre medidas y resistencia
        al calor.
      problemas:
      - key: no-calienta
        intent: info
        cta_cat: accesorios
        fix_hint: Si el rendimiento cambia al mover el cable, suele haber fatiga en
          el cable giratorio o en la entrada al mango.
        title: Platinum+ no calienta o tarda demasiado
        symptoms:
        - Las placas apenas suben de temperatura
        - Tarda mucho en estar lista
        - El resultado dura menos que antes
        causes:
        - Cable o conexion interna fatigada
        - Sensor termico impreciso
        - Placas desgastadas o sucias
        checks:
        - Revisar si el cable falla al moverlo
        - Limpiar suavemente las placas en frio
        - Probar varios niveles de temperatura
      - key: tira-del-pelo
        intent: info
        cta_cat: accesorios
        fix_hint: Cuando la presion entre placas no es uniforme, el pelo se engancha
          con facilidad en la bisagra o en el borde.
        title: Platinum+ tira del pelo o lo engancha
        symptoms:
        - Arranca mechones al deslizar
        - Se nota un tiron en el cierre
        - Deja marcas o dobleces
        causes:
        - Bordes de placa desgastados
        - Hinge lock o bisagra con holgura
        - Restos de producto acumulados en las placas
        checks:
        - Limpiar restos de laca o protector termico
        - Revisar si la plancha cierra de forma uniforme
        - Comprobar el estado del cierre y los topes
      - key: olor-quemado
        intent: info
        cta_cat: soporte
        fix_hint: Muchos olores a quemado vienen del apoyo inadecuado en caliente
          o de residuos de producto sobre las placas.
        title: Platinum+ huele a quemado
        symptoms:
        - Olor fuerte al poco de encender
        - Humo ligero o residuo en la superficie
        - La carcasa se calienta mas de lo normal
        causes:
        - Restos de producto capilar en las placas
        - Cable danado o sobrecalentado
        - Apoyo incorrecto en una superficie no resistente al calor
        checks:
        - Limpiar placas y carcasa en frio
        - Revisar si el olor viene de la zona del cable
        - Usar base o funda termica adecuada
      faqs:
      - q: ¿Cómo compruebo si este recambio es compatible con mi aspirador?
        a: Revisa el modelo exacto, la serie y, si hay variantes (Animal, Absolute,
          Pro...), confirma cuál tienes. Compara encajes, conectores y medidas con
          la pieza original.
      - q: ¿Los recambios compatibles son igual de buenos que los originales?
        a: Depende del fabricante. Muchos compatibles de calidad ofrecen rendimiento
          similar a menor precio, pero revisa valoraciones y que indiquen compatibilidad
          explícita con tu modelo.
      - q: ¿Con qué frecuencia debo cambiar el filtro?
        a: Lo habitual es cada 3-6 meses con uso normal, o antes si notas pérdida
          de succión. Los filtros lavables se limpian mensualmente y se sustituyen
          anualmente.
      - q: ¿Puedo usar una batería de mayor capacidad que la original?
        a: Solo si el voltaje es idéntico y el formato físico encaja. Una batería
          de mayor Ah dará más autonomía sin dañar el motor, pero verifica siempre
          la compatibilidad de voltaje.
