  guias_genericas:
    seguridad:
    - Desconecta el aspirador antes de manipular filtros, rodillos o batería.
    - 'No laves filtros no lavables: revisa el tipo (HEPA lavable vs. cartucho seco).'
    - 'Evita baterías no compatibles con el modelo/serie: riesgo de sobrecalentamiento
      y fallos de carga.'
    - 'Si hay olor a quemado, chispas o cortes repetidos: detén el uso y revisa obstrucciones
      y cableado.'
    mantenimiento:
    - 'Limpia el depósito y conductos: la obstrucción es la causa nº1 de pérdida de
      succión.'
    - 'Lava y seca filtros lavables (24h): la humedad genera malos olores y reduce
      el caudal.'
    - Retira pelo/hilos del rodillo cada 1-2 semanas si hay mascotas o alfombras.
    - 'Revisa juntas y sellos: una fuga de aire baja el rendimiento incluso con motor
      correcto.'
    compra:
    - Prioriza recambios con encaje y conectores equivalentes (voltaje nominal y tipo
      de anclaje).
    - 'En filtros, elige el grado adecuado: HEPA para alergias; estándar para uso
      general.'
    - 'En rodillos, elige según suelo: soft roller para duro; multisuperficie para
      mixto.'
    - Si tu aspirador es robot, compra packs (filtros + cepillos laterales + mopas)
      para abaratar mantenimiento.
brands:
  roborock-fre:
    name: Roborock
    notes_brand: Top gama alta. S-series combina aspirado + fregado. Alta demanda
      en almohadillas, filtros y cepillos.
    models:
    - model: Roborock S5 Max
      slug: roborock-s5-max
      series: S-Series
      year_range: 2019-2022
      sku_pack: robot10
      model_tokens:
      - s5 max
      - s5max
      intro: 'El Roborock S5 Max combina aspirado y fregado con un depósito de 290ml.
        Es uno de los robots más reparados de la gama media: filtros y almohadillas
        son los consumibles más demandados.'
      comprar_nuevo:
        query: roborock s5 max robot mop vacuum
        label: Ver Roborock S5 Max nuevo
        note: El S5 Max tiene varios años. Compara si la reparación compensa o es
          mejor el S8 actual.
      problemas:
      - key: no-friega
        title: Roborock S5 Max no friega
        intent: info
        symptoms:
        - El robot pasa por el suelo pero este queda sucio y sin rastro de humedad
        - La almohadilla de fregado no está húmeda al terminar el ciclo
        - El depósito de agua baja muy poco aunque el robot haya limpiado toda la
          casa
        checks:
        - Verifica que el depósito de agua tiene agua y está bien encajado en su slot
        - Comprueba que la válvula de la almohadilla no está obstruida por cal o suciedad
        - Revisa si la almohadilla está desgastada o sucia — una almohadilla saturada
          no absorbe agua
        - Asegúrate de que la función de fregado está activada en la app y no solo
          aspirado
        causes:
        - Almohadilla desgastada o saturada de suciedad (causa más frecuente)
        - Válvula de agua obstruida por cal o residuos
        - Depósito mal encajado o con grieta que impide el flujo de agua
        cta:
          catKey: accesorios
          label: Ver almohadillas y mopas compatibles
      - key: poca-succion
        title: Roborock S5 Max tiene poca succión
        intent: info
        symptoms:
        - El robot no recoge pelo ni suciedad fina del suelo
        - Queda pelusa visible tras el paso del robot
        - El robot hace más ruido de lo normal pero aspira menos
        checks:
        - Retira y sacude el filtro HEPA — si está gris o aplastado hay que reemplazarlo
        - 'Comprueba el cepillo principal: elimina pelos o hilos enredados alrededor
          del eje'
        - Revisa que el compartimento del polvo esté limpio y bien cerrado
        - Verifica que la tapa del depósito de polvo cierra correctamente sin fugas
          de aire
        causes:
        - Filtro HEPA saturado que impide el paso de aire (causa más habitual)
        - Cepillo principal enredado con pelo que reduce la recogida
        - Sello del compartimento de polvo deteriorado que provoca pérdida de succión
        cta:
          catKey: filtro
          label: Ver filtros compatibles
      recambios:
        filtro:
        - sku: roborock-fre-roborock-s5-max-filtro-robot-filter-pack
          title: Filtros compatibles (pack) para Roborock S5 Max
          intent: compra
          query: Roborock s5max filter
          must_include:
          - s5max
          - filter
          model_tokens: &id001
          - s5 max
          - s5max
        - sku: roborock-fre-roborock-s5-max-filtro-robot-hepa-pack
          title: Filtros HEPA compatibles (pack) para Roborock S5 Max
          intent: compra
          query: Roborock s5max hepa filter
          must_include:
          - s5max
          - hepa
          - filter
          model_tokens: *id001
        cepillo:
        - sku: roborock-fre-roborock-s5-max-cepillo-robot-main-brush
          title: Main brush compatible para Roborock S5 Max
          intent: compra
          query: Roborock s5max main brush
          must_include:
          - s5max
          - main
          - brush
          must_not_include:
          - battery
          - charger
          - trigger
          - switch
          - button
          model_tokens: *id001
        - sku: roborock-fre-roborock-s5-max-cepillo-robot-side-brush-pack
          title: Side brush compatibles (pack) para Roborock S5 Max
          intent: compra
          query: Roborock s5max side brush
          must_include:
          - s5max
          - side
          - brush
          must_not_include:
          - battery
          - charger
          - trigger
          - switch
          - button
          model_tokens: *id001
        accesorios:
        - sku: roborock-fre-roborock-s5-max-accesorios-robot-mop-accessory
          title: Mop accessory compatible (pack) para Roborock S5 Max
          intent: compra
          query: Roborock s5max mop accessory
          must_include:
          - s5max
          - mop
          - accessory
          model_tokens: *id001
        - sku: roborock-fre-roborock-s5-max-accesorios-robot-dust-bag-accessory
          title: Dust bag accessory compatible (pack) para Roborock S5 Max
          intent: compra
          query: Roborock s5max dust bag accessory
          must_include:
          - s5max
          - dust
          - bag
          - accessory
          model_tokens: *id001
        - sku: roborock-fre-roborock-s5-max-accesorios-robot-kit-accessory
          title: Accessory kit compatible para Roborock S5 Max (brush+filter)
          intent: compra
          query: Roborock s5max kit accessory
          must_include:
          - s5max
          - kit
          - accessory
          model_tokens: *id001
        - sku: roborock-fre-roborock-s5-max-accesorios-robot-wheel-accessory
          title: Wheel accessory compatible para Roborock S5 Max
          intent: compra
          query: Roborock s5max wheel accessory
          must_include:
          - s5max
          - wheel
          - accessory
          model_tokens: *id001
        - sku: roborock-fre-roborock-s5-max-accesorios-robot-cover-accessory
          title: Brush cover accessory compatible para Roborock S5 Max
          intent: compra
          query: Roborock s5max cover accessory
          must_include:
          - s5max
          - cover
          - accessory
          model_tokens: *id001
        soporte:
        - sku: roborock-fre-roborock-s5-max-soporte-robot-dock-base
          title: Dock base compatible para Roborock S5 Max
          intent: compra
          query: Roborock s5max dock base
          must_include:
          - s5max
          - dock
          - base
          must_not_include:
          - trigger
          - switch
          - button
          - pcb
          - board
          model_tokens: *id001
      compatibilidad:
      - 'Comprueba el número de modelo completo: pequeñas variantes pueden cambiar
        el sistema de fijación.'
      - 'En filtros HEPA: asegúrate de que el formato (rectangular, cilíndrico) coincide
        con tu unidad.'
      - 'En cepillos laterales: verifica número de brazos (2 o 3) y sentido de giro
        (L/R).'
      - 'En mopas y almohadillas: comprueba el sistema de sujeción (velcro, clips,
        magnético).'
      - 'Para docks y bases: algunos modelos tienen versiones con y sin autovaciado
        que no son compatibles entre sí.'
      faqs:
      - q: ¿Con qué frecuencia debo cambiar los consumibles del robot?
        a: 'Filtros HEPA: cada 2-3 meses. Cepillos laterales: cada 3-6 meses. Cepillo
          principal: cada 6-12 meses. Mopas: cada 1-2 meses con uso regular.'
      - q: ¿Cómo sé qué cepillo lateral es el correcto para mi robot?
        a: Comprueba el número de brazos (2 o 3) y el sentido de giro. Algunos modelos
          llevan uno de cada lado (L+R). Busca el número de referencia en la pieza
          original.
      - q: ¿Los kits de accesorios incluyen todo lo que necesito?
        a: Los kits suelen incluir filtros, cepillos laterales y principal. Verifica
          qué contiene cada kit ya que la composición varía según fabricante y modelo.
      - q: ¿Puedo comprar piezas de mantenimiento sueltas o solo en packs?
        a: Ambas opciones existen. Los packs suelen ser más económicos si necesitas
          varios consumibles a la vez. Las piezas sueltas son útiles si solo falla
          un componente concreto.
    - model: Roborock S7
      slug: roborock-s7
      series: S-Series
      year_range: 2021-2023
      sku_pack: robot10
      model_tokens:
      - s7
      intro: El Roborock S7 introdujo la tecnología de fregado sónico por vibración.
        Las almohadillas de microfibra y los filtros son las piezas que se sustituyen
        con más frecuencia.
      problemas:
      - key: almohadilla-no-vibra
        title: 'Roborock S7: la almohadilla no vibra'
        intent: info
        symptoms:
        - El robot friega pero el suelo queda igual de sucio que antes
        - No se escucha el zumbido característico del sistema sónico durante el fregado
        - La almohadilla sale seca al terminar el ciclo aunque el depósito tenía agua
        checks:
        - Comprueba que la almohadilla está correctamente enganchada al módulo de
          fregado
        - Verifica que el módulo de fregado encaja bien en la base del robot sin juego
        - 'Revisa el depósito de agua: asegúrate de que tiene agua y la válvula no
          está calcificada'
        - Limpia los contactos eléctricos del módulo de fregado con un paño seco
        causes:
        - Almohadilla desgastada o despegada del soporte que impide la vibración correcta
        - Módulo de fregado con contactos sucios que interrumpen la señal eléctrica
        - Válvula de agua obstruida por cal que bloquea el flujo hacia la almohadilla
        cta:
          catKey: accesorios
          label: Ver almohadillas y mopas compatibles
      - key: filtro-obstruido
        title: 'Roborock S7: pérdida de succión por filtro'
        intent: info
        symptoms:
        - El S7 aspira peor de lo habitual y deja suciedad visible en el suelo
        - El robot tarda más en completar la limpieza de la misma área
        - El ventilador suena más fuerte pero la potencia de aspiración ha bajado
        checks:
        - Saca el filtro HEPA y golpéalo suavemente sobre un cubo para eliminar el
          polvo acumulado
        - Mira a contraluz si el filtro tiene agujeros o pliegues dañados que necesiten
          sustitución
        - Limpia el compartimento del filtro con un paño seco antes de reinstalar
        - Revisa también el pre-filtro de espuma si el modelo lo incluye
        causes:
        - Filtro HEPA colmatado por uso prolongado sin limpieza ni sustitución
        - Pre-filtro de espuma saturado que reduce el caudal de aire
        - Acumulación de pelo fino en la entrada del filtro que actúa como barrera
        cta:
          catKey: filtro
          label: Ver filtros compatibles
      recambios:
