          bien las mopas
        causes:
        - Desgaste natural de las fibras de microfibra por uso continuado sobre suelo
          duro
        - Cal del agua que endurece las fibras y reduce su capacidad de absorción
        - Pelo o suciedad incrustada en las mopas que la estación no elimina completamente
        cta:
          catKey: accesorios
          label: Ver almohadillas compatibles
