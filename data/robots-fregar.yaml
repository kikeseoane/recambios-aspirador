    - model: Roborock S7 MaxV Ultra
      slug: roborock-s7-maxv-ultra
      series: S-Series
      year_range: 2022-2024
      sku_pack: robot10
      model_tokens:
      - s7 maxv
      - s7maxv
      intro: El Roborock S7 MaxV Ultra incluye estación de vaciado y rellenado automático.
        La base de carga y las almohadillas son las piezas más solicitadas en este
        modelo.
      problemas:
      - key: base-no-carga
        title: 'Roborock S7 MaxV Ultra: la base no carga'
        intent: info
        symptoms:
        - El robot llega a la base pero el indicador de carga no se enciende
        - La batería del robot baja aunque haya pasado la noche en la base
        - La app muestra el robot como no cargando cuando está sobre la estación
        checks:
        - Limpia los contactos metálicos de carga del robot y de la base con un paño
          seco
        - Verifica que la base está enchufada y el LED de alimentación está encendido
        - Comprueba que el robot está bien alineado sobre la base — un milímetro de
          desalineación puede impedir la carga
        - Prueba a reiniciar el robot y volver a colocarlo manualmente sobre la base
        causes:
        - Contactos de carga oxidados o sucios que impiden la transferencia de corriente
        - Base mal posicionada o con obstrucción que impide el asentamiento correcto
          del robot
        - Fallo en el adaptador de corriente de la base — comprueba si hay calor excesivo
        cta:
          catKey: soporte
          label: Ver dock/base compatibles
      - key: no-regresa-base
        title: Roborock S7 MaxV Ultra no regresa a la base
        intent: info
        symptoms:
        - El robot termina la limpieza pero se queda parado en medio de la habitación
        - La app muestra error de navegación al intentar regresar a la base
        - El robot da vueltas en círculo sin encontrar la estación de carga
        checks:
        - Asegúrate de que la base está en un lugar despejado con al menos 50cm libres
          a cada lado
        - Revisa que los sensores frontales y de cliff no están sucios o tapados
        - Comprueba que el mapa en la app tiene la base correctamente ubicada
        - Verifica que no hay objetos nuevos bloqueando el camino habitual hacia la
          base
        causes:
        - Sensores de navegación sucios que distorsionan la localización de la base
        - Mapa corrupto o desactualizado que lleva al robot a una posición incorrecta
        - Obstrucción física en la ruta habitual que el robot no puede gestionar
        cta:
          catKey: soporte
          label: Ver dock/base compatibles
      recambios:
        filtro:
        - sku: roborock-fre-roborock-s7-maxv-ultra-filtro-robot-filter-pack
          title: Filtros compatibles (pack) para Roborock S7 MaxV Ultra
          intent: compra
          query: Roborock s7maxv filter
          must_include:
          - s7maxv
          - filter
          model_tokens: &id003
          - s7 maxv
          - s7maxv
        - sku: roborock-fre-roborock-s7-maxv-ultra-filtro-robot-hepa-pack
          title: Filtros HEPA compatibles (pack) para Roborock S7 MaxV Ultra
          intent: compra
          query: Roborock s7maxv hepa filter
          must_include:
          - s7maxv
          - hepa
          - filter
          model_tokens: *id003
        cepillo:
        - sku: roborock-fre-roborock-s7-maxv-ultra-cepillo-robot-main-brush
          title: Main brush compatible para Roborock S7 MaxV Ultra
          intent: compra
          query: Roborock s7maxv main brush
          must_include:
          - s7maxv
          - main
          - brush
          must_not_include:
          - battery
          - charger
          - trigger
          - switch
          - button
          model_tokens: *id003
        - sku: roborock-fre-roborock-s7-maxv-ultra-cepillo-robot-side-brush-pack
          title: Side brush compatibles (pack) para Roborock S7 MaxV Ultra
          intent: compra
          query: Roborock s7maxv side brush
          must_include:
          - s7maxv
          - side
          - brush
          must_not_include:
          - battery
          - charger
          - trigger
