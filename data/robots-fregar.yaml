          con el cepillo
        causes:
        - Pelo enredado en el eje que crea fricción y ruido al girar (causa más habitual)
        - Cerdas del cepillo deformadas por uso que rozan con la carcasa
        - Rodamiento del módulo del cepillo deteriorado por acumulación de suciedad
        cta:
