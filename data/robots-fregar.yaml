    - model: Dreame X40 Ultra
      slug: dreame-x40-ultra
      series: X-Series
      year_range: 2024-actual
      sku_pack: robot10
      model_tokens:
      - x40 ultra
      - x40
      intro: El Dreame X40 Ultra es el modelo tope de gama de Dreame con brazo extensible
        para llegar a los bordes. Los filtros y las mopas son los consumibles que
        se reemplazan con más frecuencia.
      problemas:
      - key: filtro-obstruido
        title: 'Dreame X40 Ultra: filtro obstruido'
        intent: info
        symptoms:
        - La potencia de aspiración ha bajado notablemente respecto a los primeros
          usos
        - El robot deja suciedad fina y pelo corto en el suelo después de pasar
        - La app reporta eficiencia de limpieza reducida en el resumen de sesión
        checks:
        - Extrae el filtro HEPA y límpialo sacudiéndolo suavemente — un filtro oscuro
          necesita sustitución
        - Revisa el filtro de esponja y sustitúyelo si está muy comprimido o amarillento
        - 'Comprueba la cámara del polvo: vacíala y límpiala aunque la estación haga
          el vaciado automático'
        - Verifica en la app el contador de horas del filtro y compáralo con el intervalo
          recomendado
        causes:
        - Filtro HEPA saturado que bloquea el caudal de aire necesario para la aspiración
        - Polvo muy fino de suelos de obra o tierra que colmata el filtro en pocas
          sesiones
        - Pre-filtro de esponja aplastado que actúa como barrera adicional
        cta:
          catKey: filtro
          label: Ver filtros compatibles
      - key: mopa-desgastada
        title: 'Dreame X40 Ultra: mopa desgastada'
        intent: info
        symptoms:
        - El suelo queda con manchas o líneas de suciedad tras el ciclo de fregado
        - Las mopas tienen zonas claramente más desgastadas que otras
        - El brazo extensible no llega bien a los bordes porque la mopa no tiene el
          grosor adecuado
        checks:
        - Examina las mopas por ambas caras para detectar zonas peladas o irregulares
        - Comprueba que las mopas no tienen pelos o hilos enredados que las deformen
        - Revisa el sistema de sujeción de las mopas para que no haya holgura al girar
        - Verifica si la estación limpia bien las mopas — si el agua de limpieza sale
          muy sucia hay que sustituirlas
        causes:
        - Desgaste acelerado de la microfibra por uso frecuente en suelos con arena
          o gres rugoso
        - Residuos de cal incrustados en las fibras que las endurecen y hacen menos
          efectivas
        - Limpieza insuficiente entre ciclos que acumula suciedad abrasiva en la mopa
        cta:
          catKey: accesorios
          label: Ver almohadillas compatibles
