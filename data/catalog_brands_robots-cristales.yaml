brands:
  hobot:
    name: "HOBOT"
    vertical: "robots-cristales"
    notes_brand: "Líder en robots limpiacristales. Alta demanda en almohadillas, depósitos y baterías."
    models:
      - model: "HOBOT 2S"
        slug: "hobot-2s"
        series: "HOBOT"
        year_range: "2020-actual"
        sku_pack: "glasscleaner10"
        model_tokens: ["hobot 2s", "hobot2s"]
        intro: "El HOBOT 2S es el robot limpiacristales más vendido de la gama HOBOT con sistema de rociado de agua integrado. Las almohadillas de microfibra y las baterías son los consumibles más demandados."
        problemas:
          - key: "pierde-adherencia"
            title: "HOBOT 2S pierde adherencia al cristal"
            intent: "info"
            symptoms:
              - "El robot se despega del cristal durante la limpieza y cae"
              - "El robot resbala hacia abajo aunque los motores sigan funcionando"
              - "El robot no consigue subir más allá de la mitad del cristal"
            checks:
              - "Examina las almohadillas: si están sucias o desgastadas no hacen el sello necesario para la succión"
              - "Comprueba que la ventosa de seguridad está bien enganchada antes de iniciar"
              - "Verifica que el cristal no tiene residuos de cera o productos repelentes que impidan la adherencia"
              - "Revisa si hay fugas de aire en el sello perimetral del robot — pasa la mano alrededor mientras funciona"
            causes:
              - "Almohadillas desgastadas o sucias que rompen el sello de vacío necesario para la adherencia"
              - "Cristal con residuos de cera o productos hidrofóbicos que impiden la succión"
              - "Sello perimetral del robot deteriorado que genera pérdida de vacío"
            cta: { catKey: "accesorios", label: "Ver almohadillas y ventosas compatibles" }
          - key: "bateria-agotada"
            title: "HOBOT 2S batería se agota rápido"
            intent: "info"
            symptoms:
              - "El robot termina la batería a mitad de la ventana y cae sin completar la limpieza"
              - "La autonomía ha bajado notablemente respecto a cuando era nuevo"
              - "El robot no retiene la carga ni siquiera después de varias horas en el cargador"
            checks:
              - "Comprueba cuántos ciclos de carga lleva la batería — tras 300-400 ciclos la capacidad cae"
              - "Verifica que el cargador suministra la tensión correcta con un multímetro"
              - "Revisa si la batería está ligeramente abultada — una batería hinchada hay que sustituirla de inmediato"
              - "Comprueba que el robot no está expuesto a temperaturas extremas durante la carga"
            causes:
              - "Batería de litio degradada por ciclos de carga acumulados (causa más habitual tras 2 años de uso)"
              - "Cargador defectuoso que no entrega la corriente correcta y no recarga completamente"
              - "Almacenamiento con la batería descargada completamente que acelera la degradación"
            cta: { catKey: "bateria", label: "Ver baterías compatibles" }

      - model: "HOBOT LEGEE-688"
        slug: "hobot-legee-688"
        series: "LEGEE"
        year_range: "2021-actual"
        sku_pack: "glasscleaner10"
        model_tokens: ["legee 688", "legee688", "legee"]
        intro: "El HOBOT LEGEE-688 combina fregado del suelo y limpieza de cristales en un solo robot. Las almohadillas de microfibra son el consumible más solicitado para este modelo híbrido."
        problemas:
          - key: "almohadilla-desgastada"
            title: "HOBOT LEGEE-688: almohadilla desgastada"
            intent: "info"
            symptoms:
              - "El robot limpia los cristales pero deja rayas o manchas en lugar de un acabado limpio"
              - "Las almohadillas tienen zonas peladas o más finas que el resto"
              - "El robot necesita más pasadas para eliminar la misma suciedad que antes"
            checks:
              - "Examina las almohadillas a contraluz para detectar zonas desgastadas o agujeros"
              - "Comprueba si las almohadillas conservan la textura suave original o están endurecidas"
              - "Verifica cuántas horas de uso llevan — se recomienda sustituirlas cada 3 meses con uso semanal"
              - "Revisa si las almohadillas están sucias con residuos de cal que las endurecen"
            causes:
              - "Desgaste natural de las fibras de microfibra por fricción sobre el cristal"
              - "Cal del agua dura que endurece las fibras y reduce su capacidad de absorción"
              - "Suciedad incrustada que actúa como abrasivo y acelera el desgaste"
            cta: { catKey: "accesorios", label: "Ver almohadillas compatibles" }
          - key: "no-carga"
            title: "HOBOT LEGEE-688 no carga"
            intent: "info"
            symptoms:
              - "El indicador de carga no se enciende al colocar el robot en la base"
              - "La batería no sube de nivel aunque el robot lleve horas en la estación"
              - "El robot se apaga a los pocos minutos de empezar a limpiar"
            checks:
              - "Limpia los contactos metálicos del robot y de la base de carga con un paño seco"
              - "Verifica que la base está enchufada y tiene alimentación eléctrica"
              - "Comprueba si el cable del adaptador tiene daños o dobleces pronunciados"
              - "Prueba a reiniciar el robot y volver a colocarlo sobre la base"
            causes:
              - "Contactos de carga oxidados o sucios que impiden la transferencia de corriente"
              - "Cargador defectuoso que no entrega la tensión correcta"
              - "Batería agotada por ciclos acumulados que ya no acepta carga"
            cta: { catKey: "cargador", label: "Ver cargadores compatibles" }

      - model: "HOBOT-298"
        slug: "hobot-298"
        series: "HOBOT"
        year_range: "2018-2022"
        sku_pack: "glasscleaner10"
        model_tokens: ["hobot 298", "hobot298", "298"]
        intro: "El HOBOT-298 fue uno de los primeros robots limpiacristales con ultrasonidos. Es un modelo descatalogado pero con alta demanda de cargadores y almohadillas de recambio."
        comprar_nuevo:
          query: "HOBOT window cleaning robot"
          label: "Ver HOBOT nuevo en AliExpress"
          note: "El HOBOT-298 tiene varios años. Si la reparación es costosa, compara con los modelos actuales."
        problemas:
          - key: "no-carga"
            title: "HOBOT-298 no carga"
            intent: "info"
            symptoms:
              - "El robot no enciende el indicador de carga al conectar el cargador"
              - "El robot se apaga durante la limpieza aunque parecía tener batería suficiente"
              - "La batería no sube de nivel después de varias horas de carga"
            checks:
              - "Comprueba que el cargador del HOBOT-298 es el original o uno con la misma tensión y polaridad"
              - "Limpia el conector de carga del robot con un palillo seco para eliminar suciedad o corrosión"
              - "Verifica que el cable del cargador no tiene cortes ni dobleces bruscos"
              - "Revisa si la batería está abultada — en modelos antiguos la batería de polímero de litio se hincha"
            causes:
              - "Batería de litio degradada por el tiempo y los ciclos de carga (causa principal en modelos de 5+ años)"
              - "Cargador original deteriorado que ya no entrega la tensión correcta"
              - "Conector de carga del robot con corrosión por humedad que impide el contacto"
            cta: { catKey: "cargador", label: "Ver cargadores compatibles" }
          - key: "bateria-agotada"
            title: "HOBOT-298: batería se agota muy rápido"
            intent: "info"
            symptoms:
              - "El robot termina la batería en menos de 10 minutos cuando antes duraba 25"
              - "El robot no termina de limpiar una ventana mediana antes de quedarse sin batería"
              - "El indicador de batería baja de lleno a vacío en muy poco tiempo"
            checks:
              - "Verifica cuántos años tiene el robot — tras 4-5 años la batería suele estar agotada"
              - "Comprueba si la batería está hinchada — palpa la parte trasera del robot para detectar protuberancias"
              - "Revisa si el robot se carga correctamente: una carga incompleta simula batería agotada"
              - "Prueba a cargar durante 3 horas completas y mide la autonomía resultante"
            causes:
              - "Batería de litio al final de su vida útil tras años de uso y ciclos de carga"
              - "Degradación acelerada por almacenamiento con batería muy descargada en temporadas de invierno"
              - "Cargador defectuoso que realiza cargas parciales que aceleran el envejecimiento de la batería"
            cta: { catKey: "bateria", label: "Ver baterías compatibles" }

      - model: "HOBOT 388"
        slug: "hobot-388"
        series: "HOBOT"
        year_range: "2019-2023"
        sku_pack: "glasscleaner10"
        model_tokens: ["hobot 388", "hobot388", "388"]
        intro: "El HOBOT 388 fue el primer robot limpiacristales con depósito de agua integrado para rociar el cristal durante la limpieza. Los depósitos y las almohadillas son los recambios más demandados."
        problemas:
          - key: "deposito-vacio-rapido"
            title: "HOBOT 388: depósito se vacía rápido"
            intent: "info"
            symptoms:
              - "El depósito de agua se vacía a mitad de la primera ventana"
              - "Quedan rayas de suciedad seca en el cristal porque el robot se queda sin agua"
              - "El depósito necesita rellenarse mucho más frecuentemente que al principio"
            checks:
              - "Revisa el depósito por fuera con el robot encendido para detectar fugas visibles"
              - "Comprueba la junta de goma del depósito — si está agrietada o deformada hay que sustituirla"
              - "Verifica que el dispensador no está atascado en posición abierta por cal o residuos"
              - "Comprueba si el robot está configurado en modo de alta humedad que vacía antes el depósito"
            causes:
              - "Junta del depósito deteriorada que provoca una fuga continua de agua"
              - "Dispensador bloqueado en posición abierta por cal que libera agua constantemente"
              - "Grieta en el cuerpo del depósito por caída o impacto que no siempre es visible a simple vista"
            cta: { catKey: "deposito", label: "Ver depósitos compatibles" }
          - key: "almohadilla-sucia"
            title: "HOBOT 388: almohadilla sucia o desgastada"
            intent: "info"
            symptoms:
              - "El robot deja rayas o manchas en el cristal en lugar de dejarlo limpio"
              - "La almohadilla tiene manchas oscuras que no salen con el lavado"
              - "El robot extiende la suciedad en lugar de eliminarla del cristal"
            checks:
              - "Retira las almohadillas y lávalas a mano con agua fría sin suavizante"
              - "Examina si las fibras de microfibra conservan la textura original o están apelmazadas"
              - "Comprueba si las almohadillas tienen incrustaciones de cal que las endurecen"
              - "Verifica cuántas semanas llevan en uso — con uso semanal conviene lavarlas cada 2 semanas"
            causes:
              - "Almohadillas saturadas de suciedad y cal que actúan como abrasivo sobre el cristal"
              - "Fibras de microfibra desgastadas por uso prolongado que ya no absorben bien"
              - "Residuos de productos de limpieza del cristal que impregnan las fibras"
            cta: { catKey: "accesorios", label: "Ver almohadillas compatibles" }

