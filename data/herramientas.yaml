      compatibilidad:
      - 'Verifica el voltaje de la batería (10,8V / 12V / 18V / 20V): no son intercambiables
        aunque parezca que encajan.'
      - Makita usa sistemas de batería LXT (18V) y CXT (12V) incompatibles entre sí
        aunque la forma sea parecida.
      - Bosch Professional y Bosch DIY (verde) tienen baterías distintas aunque sean
        del mismo voltaje.
      - En accesorios de corte (discos, hojas), verifica el diámetro y el tamaño del
        agujero central.
      - 'Los portabrocas tienen rosca específica: comprueba el paso de rosca antes
        de comprar uno compatible.'
      problemas:
      - key: bateria-no-carga
        intent: info
        cta_cat: bateria
        fix_hint: Las baterías de herramientas duran 3-5 años con uso intensivo. Una
          batería compatible de buena calidad puede costar la mitad que la original.
        title: 'DSS610 Sierra circular 18V: batería no carga o poca duración'
        symptoms:
        - La herramienta se apaga a los pocos minutos
        - El cargador no emite señal de carga
        - La batería no aguanta ni una tarea sencilla
        causes:
        - Celdas de la batería degradadas por ciclos de carga
        - Cargador defectuoso o sobrecalentado
        - Contactos de la batería sucios u oxidados
        checks:
        - Limpiar los contactos de la batería con contacto eléctrico limpiador
        - Probar con otro cargador si está disponible
        - Verificar que la batería no está excesivamente caliente al cargar
      - key: no-arranca-herramienta
        intent: info
        cta_cat: accesorios
        fix_hint: Si el problema persiste con batería cargada, el gatillo o el motor
          pueden necesitar revisión en servicio técnico.
        title: DSS610 Sierra circular 18V no arranca o pierde par
        symptoms:
        - La herramienta no responde al gatillo
        - Arranca pero sin fuerza suficiente
        - Se para sola bajo carga
        causes:
        - Batería con carga insuficiente
        - Interruptor de gatillo desgastado
        - Carbones del motor gastados (en modelos con escobillas)
        checks:
        - Cargar la batería completamente antes de volver a probar
        - Verificar que la batería hace contacto correcto en el alojamiento
        - Comprobar si hay protección térmica activada (esperar 15 min)
      - key: vibra-herramienta
        intent: info
        cta_cat: accesorios
        fix_hint: Un disco o broca desgastados son la causa más frecuente de vibración.
          Cambiarlos es barato y rápido.
        title: DSS610 Sierra circular 18V vibra o hace ruido excesivo
        symptoms:
        - Vibración inusual al trabajar
        - Ruido metálico o traqueteo
        - Calentamiento excesivo del cuerpo
        causes:
        - Accesorio (disco, broca) desequilibrado o desgastado
        - Rodamientos internos desgastados
        - Portabrocas flojo o con holgura
        checks:
        - Cambiar la broca o disco por uno nuevo y verificar si desaparece la vibración
        - Apretar correctamente el portabrocas con llave
        - Comprobar que el accesorio está bien centrado y en buen estado
      faqs:
      - q: ¿Puedo usar una batería de mayor Ah en mi herramienta?
        a: Sí, siempre que el voltaje sea el mismo. Una batería de mayor capacidad
          (Ah) dará más autonomía sin afectar al motor.
      - q: ¿Las baterías compatibles dañan la herramienta?
        a: Las baterías compatibles de calidad con BMS (sistema de gestión de batería)
          son seguras. Evita las de marcas desconocidas sin protecciones electrónicas.
      - q: ¿Con qué frecuencia debo cambiar las brocas o discos?
        a: Cuando notes que el corte requiere más presión, el resultado es rugoso
          o la broca se calienta rápido. Una broca gastada daña tanto el material
          como la herramienta.
      - q: ¿Puedo dejar la batería cargando toda la noche?
        a: Los cargadores modernos tienen corte automático al llegar al 100%, por
          lo que no debería haber problema. Aun así, evitar la carga prolongada permanente
          prolonga la vida de la batería.
