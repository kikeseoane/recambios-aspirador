      compatibilidad:
      - Comprueba el número de modelo completo (ECAM290.61, EP3221/40...) ya que pequeñas
        variantes cambian las piezas.
      - 'Las juntas de cafetera tienen medidas precisas en milímetros: un milímetro
        de diferencia puede impedir el sellado.'
      - Los depósitos de agua suelen ser específicos por serie aunque visualmente
        parezcan iguales.
      - 'Para cápsulas Nespresso, verifica si tu máquina es Original Line o Vertuo:
        sus cápsulas y piezas son distintas.'
      - Los descalcificadores son casi siempre universales, pero algunos fabricantes
        invalidan garantías si no usan el suyo.
      problemas:
      - key: no-hace-presion
        intent: info
        cta_cat: filtro
        fix_hint: Una junta de grupo endurecida es la causa más habitual de pérdida
          de presión en cafeteras de cápsulas.
        title: 2200 EP2220 no hace presión o el café sale aguado
        symptoms:
        - El café gotea en lugar de salir en chorro
        - El espresso no tiene crema o es muy fina
        - La máquina hace ruido pero apenas sale líquido
        causes:
        - Filtro de agua obstruido o saturado
        - Junta de grupo desgastada o reseca
        - Bomba de presión deteriorada
        checks:
        - Sustituir el filtro de agua si lleva más de 2 meses
        - Revisar que la junta del portafiltros está en buen estado
        - Ejecutar ciclo de descalcificación si hace más de 3 meses
      - key: pierde-agua
        intent: info
        cta_cat: junta
        fix_hint: Las juntas de goma se endurecen con el calor y la cal. Suelen costar
          menos de 5€ y son fáciles de cambiar.
        title: 2200 EP2220 pierde agua o hace goteo
        symptoms:
        - Hay charco de agua bajo la cafetera
        - Goteo desde el portafiltros durante el ciclo
        - El depósito se vacía más rápido de lo normal
        causes:
        - Junta de grupo desgastada o fisurada
        - Depósito mal encajado o con grieta
        - Tuberías internas con acumulación de cal que rompe el sellado
        checks:
        - Retirar y revisar la junta del portafiltros
        - Comprobar que el depósito está bien encajado sin grietas
        - Descalcificar si hay mucha acumulación de cal en el circuito
      - key: no-calienta-cafe
        intent: info
        cta_cat: accesorios
        fix_hint: El descalcificado regular (cada 3 meses) previene el 80% de los
          problemas de temperatura. Usa descalcificador específico para cafeteras.
        title: 2200 EP2220 no calienta o el café sale frío
        symptoms:
        - El café sale tibio en lugar de caliente
        - La máquina tarda más de lo normal en calentar
        - El vapor es débil o no sale
        causes:
        - Acumulación de cal en el thermoblock
        - Resistencia eléctrica deteriorada
        - Termostato defectuoso
        checks:
        - Ejecutar ciclo de descalcificación completo
        - Precalentar la taza antes del café
        - Verificar que la temperatura está en el ajuste máximo
      faqs:
      - q: ¿Cada cuánto debo descalcificar mi cafetera?
        a: Cada 2-3 meses con agua dura, o cuando el programa de la máquina lo indique.
          La cal es la causa principal de averías en cafeteras de presión.
      - q: ¿Los filtros de agua de cafetera son universales?
        a: No. Cada fabricante tiene su sistema de filtrado. Comprueba el número de
          referencia de tu modelo antes de comprar.
      - q: ¿Puedo cambiar la junta de mi cafetera yo mismo?
        a: Sí, en la mayoría de modelos es una operación sencilla. Solo necesitas
          la junta correcta (verifica las medidas en mm) y seguir un tutorial del
          modelo específico.
      - q: ¿Por qué la cafetera pierde presión después de años de uso?
        a: La acumulación de cal deteriora las juntas y obstruye la bomba. Un descalcificado
          regular y la sustitución de juntas cada 2-3 años suelen resolver el problema.
