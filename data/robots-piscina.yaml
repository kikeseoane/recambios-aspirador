  guias_genericas:
    seguridad:
    - Desconecta el aspirador antes de manipular filtros, rodillos o batería.
    - 'No laves filtros no lavables: revisa el tipo (HEPA lavable vs. cartucho seco).'
    - 'Evita baterías no compatibles con el modelo/serie: riesgo de sobrecalentamiento
      y fallos de carga.'
    - 'Si hay olor a quemado, chispas o cortes repetidos: detén el uso y revisa obstrucciones
      y cableado.'
    mantenimiento:
    - 'Limpia el depósito y conductos: la obstrucción es la causa nº1 de pérdida de
      succión.'
    - 'Lava y seca filtros lavables (24h): la humedad genera malos olores y reduce
      el caudal.'
    - Retira pelo/hilos del rodillo cada 1-2 semanas si hay mascotas o alfombras.
    - 'Revisa juntas y sellos: una fuga de aire baja el rendimiento incluso con motor
      correcto.'
    compra:
    - Prioriza recambios con encaje y conectores equivalentes (voltaje nominal y tipo
      de anclaje).
    - 'En filtros, elige el grado adecuado: HEPA para alergias; estándar para uso
      general.'
    - 'En rodillos, elige según suelo: soft roller para duro; multisuperficie para
      mixto.'
    - Si tu aspirador es robot, compra packs (filtros + cepillos laterales + mopas)
      para abaratar mantenimiento.
brands:
  maytronics:
    name: Maytronics / Dolphin
    notes_brand: Líder mundial en robots limpiafondos. Dolphin es la marca más buscada.
      Alta demanda en filtros, cepillos y cables.
    models:
    - model: Dolphin E20
      slug: dolphin-e20
      series: E-Series
      year_range: 2019-actual
      sku_pack: poolrobot10
      model_tokens:
      - dolphin e20
      - e20
      intro: El Dolphin E20 es el robot limpiafondos de entrada de Maytronics, ideal
        para piscinas de hasta 8m. Los filtros de cartucho y los cepillos son los
        consumibles más demandados.
      problemas:
      - key: filtro-sucio
        title: 'Dolphin E20: filtro sucio o colmatado'
        intent: info
        symptoms:
        - El robot recorre la piscina pero el agua sigue turbia al terminar el ciclo
        - El robot se mueve más despacio de lo normal o se detiene con frecuencia
        - El fondo de la piscina queda con restos de suciedad fina tras el ciclo completo
        checks:
        - Saca el cartucho de filtro y límpialo con una manguera hasta que el agua
          salga clara
        - Comprueba si el cartucho tiene grietas o deformaciones que reduzcan el filtrado
        - 'Revisa la cesta de filtro: si tiene residuos pegados en las mallas necesita
          sustitución'
        - Verifica que el cartucho está correctamente insertado y la tapa cierra bien
        - Comprueba el tiempo desde el último recambio — tras 2 temporadas el cartucho
          suele estar agotado
        causes:
        - Cartucho de filtro colmatado por acumulación de algas, cal o suciedad fina
        - Malla del cartucho deteriorada que ya no retiene las partículas pequeñas
        - Uso en piscinas con mucha carga orgánica que agota el filtro más rápido
        cta:
          catKey: filtro
          label: Ver filtros y cartuchos compatibles
      - key: cepillo-desgastado
        title: 'Dolphin E20: cepillo desgastado'
        intent: info
        symptoms:
        - El robot no desprende bien la suciedad adherida al fondo ni las paredes
        - Quedan manchas verdes o pardas en el fondo después de que el robot haya
          pasado
        - El robot resbala sobre las superficies y pierde tracción en los laterales
        checks:
        - Retira los cepillos y comprueba si las cerdas están aplastadas o han perdido
          rigidez
        - Observa si las cerdas tienen menos de la mitad de su longitud original
        - Revisa si el cepillo tiene grietas en el núcleo plástico que indiquen rotura
          estructural
        - Comprueba si el robot avanza en línea recta — un cepillo desgastado solo
          en un lado provoca desvío
        causes:
        - Desgaste natural de las cerdas por fricción con el revestimiento de la piscina
        - Exposición prolongada al cloro que fragiliza y degrada las cerdas de PVC
        - Uso en piscinas con superficie abrasiva que acelera el desgaste del cepillo
        cta:
          catKey: cepillo
          label: Ver cepillos compatibles
      recambios:
