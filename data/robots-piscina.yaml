      problemas:
      - key: bolsa-filtro-rota
        title: 'Zodiac Vortex 4: bolsa de filtrado rota'
        intent: info
        symptoms:
        - La suciedad recogida aparece en el agua de la piscina después de vaciar
          el robot
        - El agua de la piscina se enturbia cada vez que el robot termina el ciclo
        - Se ven partículas finas salir por los orificios de escape del robot durante
          la limpieza
        checks:
        - Saca la bolsa de filtrado y examínala con luz directa para detectar agujeros
          o costuras abiertas
        - Comprueba las costuras laterales de la bolsa — son el punto de rotura más
          habitual
        - Verifica que la bolsa está bien fijada al marco de sujeción sin arrugas
          ni pliegues
        - Revisa si la bolsa tiene decoloración o rigidez por exposición prolongada
          al cloro
        causes:
        - Rotura de la bolsa por desgaste del tejido de microfibra tras varias temporadas
        - Costuras deterioradas por la combinación de cloro y presión del agua
        - Daño por almacenamiento incorrecto con la bolsa húmeda y doblada
        cta:
          catKey: filtro
          label: Ver bolsas de filtrado compatibles
      - key: cepillo-desgastado
        title: 'Zodiac Vortex 4: cepillo desgastado'
        intent: info
        symptoms:
        - El robot no limpia eficazmente el fondo aunque el filtro esté en buen estado
        - Las algas adheridas al fondo no se desprenden con el paso del robot
        - El robot pierde tracción en las subidas laterales y resbala frecuentemente
        checks:
