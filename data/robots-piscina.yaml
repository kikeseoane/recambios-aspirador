      - e30
      intro: El Dolphin E30 añade limpieza de paredes respecto al E20 y es uno de
        los modelos más vendidos de Maytronics en España. Los filtros y el cable son
        los recambios más solicitados.
      problemas:
      - key: filtro-sucio
        title: 'Dolphin E30: filtro sucio o colmatado'
        intent: info
        symptoms:
        - El agua de la piscina sigue con partículas en suspensión tras el ciclo de
          limpieza
        - El robot completa el ciclo pero el fondo queda con suciedad fina
        - El robot se ralentiza o detiene antes de finalizar el programa
        checks:
        - Extrae el cartucho de filtro y límpialo con una manguera a presión moderada
        - Comprueba si las mallas del cartucho tienen roturas o deformaciones visibles
        - Verifica que el cartucho encaja correctamente y la tapa del compartimento
          cierra bien
        - Revisa el historial de limpieza del filtro — en temporadas intensas hay
          que limpiarlo cada 2-3 usos
        causes:
        - Cartucho colmatado por uso prolongado sin limpieza periódica
        - Malla del cartucho deteriorada por el cloro que ya no filtra correctamente
        - Carga orgánica elevada en la piscina que satura el filtro más rápido de
          lo habitual
        cta:
          catKey: filtro
          label: Ver filtros y cartuchos compatibles
      - key: cable-enredado
        title: 'Dolphin E30: cable enredado o rígido'
        intent: info
        symptoms:
        - El cable forma bucles o nudos durante el ciclo y el robot queda atrapado
        - El robot da vueltas en el mismo sitio sin avanzar porque el cable lo bloquea
        - El cable está tan rígido y enroscado que no se extiende correctamente
        checks:
        - Extiende el cable completamente fuera del agua y comprueba si tiene espirales
          permanentes
        - Verifica que el swivel giratorio del cable funciona libremente — gíralo
          con los dedos
        - Comprueba que la longitud del cable no excede el doble del largo de la piscina
        - Revisa si el cable tiene marcas de aplastamiento o daños en la vaina exterior
        causes:
        - Swivel giratorio desgastado o bloqueado que ya no destuerce el cable durante
          el movimiento
        - Cable envejecido que ha perdido flexibilidad por exposición al cloro y la
          luz UV
        - Cable demasiado largo para el tamaño de la piscina que siempre forma bucles
        cta:
          catKey: accesorios
          label: Ver cables y swivel compatibles
