    - model: Dolphin Supreme M400
      slug: dolphin-supreme-m400
      series: Supreme
      year_range: 2020-actual
      sku_pack: poolrobot10
      model_tokens:
      - m400
      - supreme m400
      intro: El Dolphin Supreme M400 es la opción profesional de Maytronics para piscinas
        grandes con triple cepillo. Los cepillos de PVC y los filtros de cesta son
        los recambios más solicitados.
      problemas:
      - key: cepillo-desgastado
        title: 'Dolphin M400: cepillo desgastado'
        intent: info
        symptoms:
        - El robot no limpia eficazmente las paredes y línea de agua aunque lo intente
        - La superficie de la piscina queda con película verdosa o suciedad fina tras
          el ciclo
        - El robot reduce la eficiencia de limpieza notablemente respecto a temporadas
          anteriores
        checks:
        - Retira los tres cepillos y comprueba el estado de las cerdas en cada uno
        - Verifica si las cerdas de los cepillos laterales están más desgastadas que
          las del central
        - Comprueba que los ejes de los cepillos giran libremente sin resistencia
        - Revisa si los cepillos tienen algas incrustadas que haya que eliminar antes
          de evaluar el desgaste
        causes:
        - Cerdas desgastadas por fricción con la superficie de la piscina tras varias
          temporadas
        - Degradación de la goma o PVC por la combinación de cloro y radiación UV
        - Desgaste irregular en las tres posiciones por diferente carga de trabajo
        cta:
          catKey: cepillo
          label: Ver cepillos compatibles
      - key: filtro-saturado
        title: 'Dolphin M400: filtro de cesta saturado'
        intent: info
        symptoms:
        - El agua no queda limpia después de un ciclo completo de limpieza
        - El robot reduce velocidad y parece esforzarse más de lo normal
        - La cesta de filtro tiene residuos muy pegados que no salen solo con el agua
        checks:
        - Saca la cesta de filtro y límpiala con agua a presión y un cepillo suave
        - Comprueba si la malla metálica tiene deformaciones o agujeros que comprometan
          el filtrado
        - Verifica que la tapa del compartimento de filtro cierra correctamente sin
          juego
        - Revisa si hay partículas muy finas que pasen por la malla — en ese caso
          necesitas un filtro de malla más fina
        causes:
        - Cesta de filtro colmatada por hojas, insectos o algas que bloquean el caudal
        - Malla de la cesta deteriorada que ya no retiene las partículas
        - Filtración insuficiente para el nivel de suciedad de la piscina — se requiere
          limpieza más frecuente
        cta:
          catKey: filtro
          label: Ver filtros compatibles
