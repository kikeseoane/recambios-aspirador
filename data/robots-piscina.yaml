          suelen estar agotados
        causes:
        - Desgaste de cerdas por fricción acumulada sobre el revestimiento de la piscina
        - Degradación por cloro y UV que endurece y fragiliza las cerdas de PVC
        - Desgaste más pronunciado en los cepillos delanteros que soportan mayor carga
        cta:
          catKey: cepillo
          label: Ver cepillos compatibles
