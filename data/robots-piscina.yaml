    - model: Dolphin Active 30i
      slug: dolphin-active-30i
      series: Active
      year_range: 2020-actual
      sku_pack: poolrobot10
      model_tokens:
      - active 30i
      - active30i
      intro: El Dolphin Active 30i es el primer modelo con control por app de la gama
        E. La escalada de paredes y los cepillos de PVC son su punto diferencial y
        los recambios más demandados.
      problemas:
      - key: no-sube-paredes
        title: Dolphin Active 30i no sube por las paredes
        intent: info
        symptoms:
        - El robot limpia bien el fondo pero resbala antes de llegar a la línea de
          agua
        - El robot intenta subir pero cae de vuelta al fondo repetidamente
        - Las paredes de la piscina quedan con algas o manchas verdes tras el ciclo
        checks:
        - Comprueba el estado de las cerdas del cepillo — si están aplastadas no hacen
          tracción en la pared
        - 'Revisa si el filtro está limpio: un filtro saturado reduce la succión necesaria
          para adherirse'
        - Verifica que los rodillos laterales no tienen pelo o algas enredadas que
          bloqueen su giro
        - Comprueba que la piscina tiene la presión de agua correcta y el robot está
          bien sumergido
        causes:
        - Cepillos desgastados que no generan la tracción suficiente para escalar
          paredes
        - Filtro saturado que reduce la succión y la capacidad de adherencia del robot
        - Rodillos de tracción desgastados o bloqueados que impiden el avance vertical
        cta:
          catKey: cepillo
          label: Ver cepillos compatibles
      - key: cable-enredado
        title: 'Dolphin Active 30i: cable enredado'
        intent: info
        symptoms:
        - El cable se enreda durante el ciclo y el robot queda inmovilizado
        - Al sacar el robot del agua el cable sale hecho un nudo difícil de deshacer
        - El robot describe trayectorias cortas y erráticas por culpa del cable
        checks:
        - Comprueba si el swivel anti-enredo gira libremente antes de sumergir el
          robot
        - Extiende el cable sobre el suelo para ver si tiene espirales permanentes
          que no se deshacen
        - Verifica que la longitud del cable es adecuada para el tamaño de tu piscina
        - Revisa si hay daños en la vaina del cable que puedan indicar desgaste interno
        causes:
        - Swivel desgastado que no gira con suficiente libertad para destorcer el
          cable
        - Cable con memoria de enrollado permanente por almacenamiento incorrecto
        - Cable demasiado largo que siempre genera exceso de longitud dentro de la
          piscina
        cta:
          catKey: accesorios
          label: Ver cables y swivel compatibles
      recambios:
        filtro:
        - sku: maytronics-dolphin-active-30i-filtro-pool-filter-cartridge
          title: Cartucho de filtro compatible (pack) para Dolphin Active 30i
          intent: compra
          query: Maytronics / Dolphin Dolphin Active 30i active30i filter cartridge
            Cartucho de filtro compatible (pack) para Dolphin Act
          must_include:
          - active30i
          - filter
          - cartridge
          must_not_include:
          - brush
          - cable
          - swivel
          - bag
          - caddy
          - wheel
          model_tokens: &id003
