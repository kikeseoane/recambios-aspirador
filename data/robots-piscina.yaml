      - 'Comprueba el número de modelo completo: pequeñas variantes pueden cambiar
        el sistema de fijación.'
      - 'En filtros HEPA: asegúrate de que el formato (rectangular, cilíndrico) coincide
        con tu unidad.'
      - 'En cepillos laterales: verifica número de brazos (2 o 3) y sentido de giro
        (L/R).'
      - 'En mopas y almohadillas: comprueba el sistema de sujeción (velcro, clips,
        magnético).'
      - 'Para docks y bases: algunos modelos tienen versiones con y sin autovaciado
        que no son compatibles entre sí.'
      faqs:
      - q: ¿Con qué frecuencia debo cambiar los consumibles del robot?
        a: 'Filtros HEPA: cada 2-3 meses. Cepillos laterales: cada 3-6 meses. Cepillo
          principal: cada 6-12 meses. Mopas: cada 1-2 meses con uso regular.'
      - q: ¿Cómo sé qué cepillo lateral es el correcto para mi robot?
        a: Comprueba el número de brazos (2 o 3) y el sentido de giro. Algunos modelos
          llevan uno de cada lado (L+R). Busca el número de referencia en la pieza
          original.
      - q: ¿Los kits de accesorios incluyen todo lo que necesito?
        a: Los kits suelen incluir filtros, cepillos laterales y principal. Verifica
          qué contiene cada kit ya que la composición varía según fabricante y modelo.
      - q: ¿Puedo comprar piezas de mantenimiento sueltas o solo en packs?
        a: Ambas opciones existen. Los packs suelen ser más económicos si necesitas
          varios consumibles a la vez. Las piezas sueltas son útiles si solo falla
          un componente concreto.
    - model: Dolphin Sigma
      slug: dolphin-sigma
      series: Sigma
      year_range: 2021-actual
      sku_pack: poolrobot10
      model_tokens:
      - dolphin sigma
      - sigma
      intro: El Dolphin Sigma es un robot gama alta con filtración dual de cartucho
        y bolsa. Los filtros de doble capa son el consumible más buscado por los propietarios
        de este modelo.
      problemas:
      - key: filtro-saturado
        title: 'Dolphin Sigma: filtro saturado'
        intent: info
        symptoms:
        - El agua no queda limpia tras el ciclo aunque el robot haya completado el
          programa
        - El robot reduce su velocidad de limpieza considerablemente
        - El sistema de filtración dual no retiene bien las partículas finas como
          polvo de polén
        checks:
        - Retira el cartucho de filtro y la bolsa interior y límpialos por separado
          con agua a presión
        - Comprueba si la bolsa de microfibra interior tiene roturas o costuras abiertas
        - Verifica que el cartucho exterior no tiene grietas ni mallas rotas
        - Revisa que ambas piezas están correctamente ensambladas antes de reinstalar
        causes:
        - Cartucho de filtro colmatado que impide el flujo de agua a través del sistema
        - Bolsa de microfibra interior saturada de partículas finas que no se lavan
          con agua
        - Sistema dual sobrecargado en piscinas con mucha carga orgánica o uso frecuente
        cta:
          catKey: filtro
          label: Ver filtros compatibles
      - key: cepillo-desgastado
        title: 'Dolphin Sigma: cepillo desgastado'
        intent: info
        symptoms:
        - El robot no elimina las algas adheridas al fondo ni a las paredes laterales
        - El robot sigue el programa correctamente pero la superficie queda sucia
          tras su paso
        - Se nota que el robot resbala más de lo habitual en los laterales de la piscina
        checks:
        - Saca los cepillos y mide visualmente el desgaste de las cerdas
        - Comprueba si las cerdas están aplastadas o deformadas hacia un lado
        - Revisa el número de temporadas de uso — tras 2-3 temporadas los cepillos
          suelen estar agotados
        - Verifica que el eje del cepillo no tiene algas ni suciedad enredada que
          reducen la fricción
        causes:
        - Cerdas aplastadas por uso continuado sobre superficies abrasivas
        - Degradación acelerada por exposición al cloro y la luz UV
        - Desgaste asimétrico causado por una piscina con mayor pendiente en un lado
        cta:
          catKey: cepillo
          label: Ver cepillos compatibles
