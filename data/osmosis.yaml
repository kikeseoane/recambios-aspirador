  watts-os:
    name: Watts
    notes_brand: Marca americana con fuerte presencia en España. Sistemas bajo encimera
      de alta calidad. Los filtros de 10 pulgadas son estándar y fáciles de encontrar.
    models:
    - model: Watts KWRO100-E
      slug: watts-kwro100-e
      year_range: 2017-2024
      sku_pack: osmosis10
      model_tokens:
      - kwro100
      - kwro100-e
      - watts ro
      intro: El Watts KWRO100-E es un sistema de ósmosis de 5 etapas muy popular en
        España. Su membrana de 50 GPD y los filtros de 10 pulgadas son de fácil sustitución.
      comprar_nuevo:
        query: watts kwro100 osmosis inversa 5 etapas
        label: Ver Watts KWRO100-E nuevo
      problemas:
      - key: bajo-caudal
        title: Watts KWRO100-E produce poca agua
        intent: info
        symptoms:
        - El grifo de ósmosis tiene muy poco caudal
        - El depósito tarda más de 4-5 horas en llenarse
        - El sistema lleva meses sin cambio de filtros
        checks:
        - Verifica la presión de entrada — el KWRO100-E necesita al menos 2.8 bar
          para operar
        - Cambia los filtros de sedimento y carbono si llevan más de 12 meses instalados
        - 'Comprueba el estado del depósito: si está sin presión, puede no almacenar
          agua correctamente'
        - Revisa la membrana si el caudal sigue bajo tras cambiar los filtros de etapa
        causes:
        - Filtros de etapa saturados (sedimento, GAC, CTO)
        - Depósito acumulador sin presión o con vejiga rota
        - Membrana al final de su vida útil
        cta:
          catKey: filtro
          label: Ver filtros compatibles Watts
