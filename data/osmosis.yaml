  guias_genericas:
    seguridad:
    - Desconecta el aspirador antes de manipular filtros, rodillos o batería.
    - 'No laves filtros no lavables: revisa el tipo (HEPA lavable vs. cartucho seco).'
    - 'Evita baterías no compatibles con el modelo/serie: riesgo de sobrecalentamiento
      y fallos de carga.'
    - 'Si hay olor a quemado, chispas o cortes repetidos: detén el uso y revisa obstrucciones
      y cableado.'
    mantenimiento:
    - 'Limpia el depósito y conductos: la obstrucción es la causa nº1 de pérdida de
      succión.'
    - 'Lava y seca filtros lavables (24h): la humedad genera malos olores y reduce
      el caudal.'
    - Retira pelo/hilos del rodillo cada 1-2 semanas si hay mascotas o alfombras.
    - 'Revisa juntas y sellos: una fuga de aire baja el rendimiento incluso con motor
      correcto.'
    compra:
    - Prioriza recambios con encaje y conectores equivalentes (voltaje nominal y tipo
      de anclaje).
    - 'En filtros, elige el grado adecuado: HEPA para alergias; estándar para uso
      general.'
    - 'En rodillos, elige según suelo: soft roller para duro; multisuperficie para
      mixto.'
    - Si tu aspirador es robot, compra packs (filtros + cepillos laterales + mopas)
      para abaratar mantenimiento.
brands:
  coral-os:
    name: Coral
    notes_brand: Marca española líder en ósmosis doméstica. Alta demanda de membranas,
      filtros de etapa y juntas. Muy popular en foros de acuariofilia y agua potable.
    models:
    - model: Coral CO-1000
      slug: coral-co-1000
      year_range: 2018-2024
      sku_pack: osmosis10
      model_tokens:
      - co-1000
      - co1000
      - coral osmosis
      intro: El Coral CO-1000 es uno de los sistemas de ósmosis inversa domésticos
        más vendidos en España. De 5 etapas con membrana de 50 GPD, sus filtros de
        sedimento y carbono son los consumibles más demandados.
      comprar_nuevo:
        query: coral co-1000 osmosis inversa 5 etapas
        label: Ver Coral CO-1000 nuevo
        note: Compara el precio de recambio completo frente a un sistema nuevo — a
          veces la diferencia es pequeña.
      problemas:
      - key: bajo-caudal
        title: Coral CO-1000 produce poca agua
        intent: info
        symptoms:
        - El depósito tarda mucho en llenarse o nunca llega a llenarse del todo
        - El caudal del grifo de ósmosis es muy bajo comparado con antes
        - El sistema lleva encendido mucho tiempo pero el depósito sigue casi vacío
        checks:
        - Comprueba que la llave de paso de entrada está completamente abierta
        - 'Verifica la presión de entrada: debe ser al menos 3 bar para funcionar
          correctamente'
        - Retira y revisa los filtros de sedimento y carbono — si están saturados
          (oscuros) hay que cambiarlos
        - 'Comprueba el estado de la membrana: si lleva más de 2-3 años sin cambio,
          puede estar agotada'
        causes:
        - Filtros de sedimento o carbono saturados que restringen el caudal (causa
          más frecuente)
        - Membrana agotada que no permite el paso de agua
        - Presión de red insuficiente (menos de 3 bar)
        cta:
          catKey: filtro
          label: Ver filtros y membranas compatibles
      - key: fuga-agua
        title: Coral CO-1000 tiene fuga de agua
        intent: info
        symptoms:
        - Hay agua acumulada bajo el fregadero donde está instalado el equipo
        - Una o varias carcasas de filtro gotean por la junta
        - Las conexiones de tubo entre etapas presentan humedad o goteo
        checks:
        - 'Localiza el origen de la fuga: identifica si viene de una carcasa, una
          conexión de tubo o la membrana'
        - Revisa las juntas O-ring de cada carcasa — si están deformadas o agrietadas
          hay que sustituirlas
        - Aprieta suavemente las conexiones de tubo (push-fit) y verifica que el tubo
          entra hasta el tope
        - Comprueba que las carcasas están bien cerradas — mano firme + 1/4 de vuelta
          de llave
        causes:
        - Junta O-ring deteriorada o mal colocada en la carcasa del filtro
        - Conexión de tubo push-fit mal insertada o con el tubo cortado en ángulo
        - Carcasa agrietada por apretado excesivo o golpe
        cta:
          catKey: junta
          label: Ver juntas O-ring compatibles
      recambios:
        filtro:
        - sku: coral-os-coral-co-1000-filtro-filt-pp-sediment
          title: Filtro sedimento PP 5µm compatible para Coral CO-1000
          intent: compra
          query: Coral Coral CO-1000 co1000 sediment filter Filtro sedimento PP 5µm
