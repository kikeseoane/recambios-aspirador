verticals:
  aspiradores:
    label: Recambios de Aspirador
    slug: aspiradores
    root: true
    description: Filtros, baterías, cepillos y accesorios para aspiradores, robots y barredoras sin cable.
    emoji: "🧹"
    site_name: Recambios Aspirador
    tagline: Marketplace de recambios
    primary: "#ff6a00"
    primary_2: "#ff8a33"
    color_rgb: "255,106,0"
  afeitadoras:
    label: Recambios de Afeitadora
    slug: afeitadoras
    root: false
    description: Láminas, cabezales, cargadores y accesorios para afeitadoras eléctricas Philips y Braun.
    hero_copy: "Encuentra láminas, cabezales, cargadores y accesorios compatibles para tu afeitadora eléctrica. Compra directa con verificación de compatibilidad por modelo y serie."
    emoji: "⚡"
    site_name: Recambios Afeitadora
    tagline: Láminas, cabezales y cargadores
    primary: "#0ea5e9"
    primary_2: "#38bdf8"
    color_rgb: "14,165,233"
    faq:
      - q: "¿Con qué frecuencia hay que cambiar las láminas de una afeitadora?"
        a: "Philips recomienda cada 2 años, Braun cada 18 meses con uso diario. Si notas que irrita la piel o el afeitado ya no es limpio, es momento de sustituirlas."
      - q: "¿Son compatibles las láminas Philips entre distintas series?"
        a: "No. Las láminas varían por serie (3000, 5000, 7000, 9000) y no son intercambiables entre ellas. Comprueba siempre el número de modelo antes de comprar."
      - q: "¿Puedo usar un cargador genérico para mi afeitadora Braun o Philips?"
        a: "No recomendamos cargadores no certificados: pueden dañar la batería o el circuito de carga. Usa siempre cargadores compatibles con tu modelo específico."
      - q: "¿Cómo sé si necesito cambiar el cabezal o solo las láminas?"
        a: "Si el cabezal no oscila bien o se escucha un clic al presionarlo, suele ser el cabezal. Si irrita la piel o no afeita limpio pero oscila bien, son las láminas."
    guides:
      compra:
        title: Cómo elegir láminas, cabezal o cargador para tu afeitadora
        bullets:
          - "Anota el número de modelo completo (ej: S5885, 5018s) — las láminas varían por serie, no solo por marca."
          - "Distingue serie de gama: Series 3000, 5000, 7000 y 9000 de Philips tienen láminas distintas y no son intercambiables."
          - "Para Braun: los números de referencia de la lámina aparecen grabados en el cabezal. Búscalos antes de comprar."
          - "En cargadores: comprueba el tipo de conector (redondo 2 pines vs USB-C) y el voltaje de salida."
          - "Para cabezales OneBlade (QP/QG): no son compatibles con afeitadoras de láminas de la misma marca."
          - "Compra siempre con política de devolución: la forma del anclaje puede variar aunque el modelo parezca igual."
      mantenimiento:
        title: Mantenimiento de afeitadora eléctrica para alargar su vida útil
        bullets:
          - "Limpia el cabezal después de cada uso: el vello acumulado deteriora las láminas más rápido que el propio afeitado."
          - "Sustituye láminas y cuchillas cada 18-24 meses (Braun) o cada 2 años (Philips) con uso diario."
          - "Lubrica el cabezal una vez al mes con una gota de aceite especial para afeitadoras eléctricas."
          - "Carga completa antes de guardar si vas a dejarla sin usar más de 2 semanas."
          - "No dejes la afeitadora cargando permanentemente: puede degradar la batería de litio."
          - "Inspecciona el cabezal con luz directa: si ves agujeros o deformaciones en la lámina, cámbiala."
      seguridad:
        title: Seguridad al sustituir piezas de afeitadora eléctrica
        bullets:
          - "Desconecta el cargador antes de manipular el cabezal o la lámina."
          - "No intentes abrir el cuerpo de la afeitadora para sustituir la batería si no tienes experiencia: hay riesgo de cortocircuito."
          - "Usa solo cargadores compatibles con tu modelo — los genéricos no certificados pueden dañar el circuito de carga."
          - "Si la batería está hinchada o desprende olor, no la uses y llévala a un punto de reciclaje eléctrico."
          - "Al limpiar con agua, asegúrate de que el modelo tiene certificación IPX4 o superior."
  cafeteras:
    label: Recambios de Cafetera
    slug: cafeteras
    root: false
    description: Filtros, juntas, depósitos y accesorios para cafeteras DeLonghi, Philips, Nespresso y más.
    hero_copy: "Encuentra filtros, juntas, depósitos y accesorios compatibles para tu cafetera. Mantén el sabor y la presión de tu máquina con recambios originales y alternativos verificados."
    emoji: "☕"
    site_name: Recambios Cafetera
    tagline: Filtros, juntas y accesorios
    primary: "#92400e"
    primary_2: "#b45309"
    color_rgb: "146,64,14"
    faq:
      - q: "¿Cada cuánto hay que cambiar el filtro de agua de una cafetera?"
        a: "La mayoría de fabricantes recomienda entre 1 y 3 meses según el uso y la dureza del agua. Un filtro saturado reduce la presión y altera el sabor del café."
      - q: "¿Cómo sé si la junta de mi cafetera está deteriorada?"
        a: "Si la cafetera pierde agua por el portafiltros o el café sale con menos presión, la junta suele ser la causa. Inspecciónala: si está dura o agrietada, sustitúyela."
      - q: "¿Son compatibles los accesorios DeLonghi entre distintos modelos?"
        a: "Depende de la gama. Los portafiltros y juntas de cafeteras espresso semiautomáticas suelen ser compatibles dentro de una misma familia, pero verifica siempre el número de modelo."
      - q: "¿Puedo descalcificar mi cafetera con vinagre en lugar de pastillas?"
        a: "No recomendamos vinagre: puede dañar las juntas y dejar olor residual. Usa pastillas o líquido descalcificador específico para cafeteras."
    guides:
      compra:
        title: Cómo elegir filtro, junta o accesorio para tu cafetera
        bullets:
          - "Anota la referencia completa del modelo (ej: ECAM290.21.B) — dos modelos casi idénticos pueden tener juntas distintas."
          - "Para filtros de agua: verifica la compatibilidad exacta con tu modelo. El caudal y las dimensiones varían."
          - "Las juntas de grupo se identifican por diámetro exterior, interior y grosor — lleva la vieja al comprar la nueva."
          - "Para cafeteras de cápsulas: los accesorios suelen ser exclusivos de la familia (Nespresso Vertuo ≠ Nespresso Original)."
          - "En depósitos de agua: comprueba capacidad en litros y sistema de anclaje (lateral, trasero, extraíble)."
          - "Compra con devolución garantizada: incluso piezas 'universales' pueden no encajar en tu modelo exacto."
      mantenimiento:
        title: Mantenimiento de cafetera para conservar sabor y presión
        bullets:
          - "Descalcifica cada 2-3 meses o cuando el indicador lo avise — la cal destruye la bomba y las juntas silenciosamente."
          - "Sustituye el filtro de agua cada 1-2 meses según dureza del agua de tu zona."
          - "Limpia el portafiltros y el cabezal de grupo después de cada uso para evitar acumulación de aceites del café."
          - "Inspecciona las juntas cada 6 meses: si están duras o agrietadas, cámbilas antes de que provoquen fugas."
          - "Vacía el depósito de agua si no vas a usar la cafetera más de 2 días para evitar bacterias."
          - "Usa pastillas limpiadoras específicas para cafeteras, nunca vinagre — puede dañar las juntas y dejar sabor residual."
      seguridad:
        title: Seguridad al manipular tu cafetera
        bullets:
          - "Desenchúfala y espera a que se enfríe antes de sustituir juntas, filtros o limpiar el grupo."
          - "Nunca abras la unidad de infusión con la máquina en marcha o caliente."
          - "Si hay fuga de agua hacia componentes eléctricos, no uses la cafetera hasta revisar."
          - "Usa guantes al manipular piezas que hayan estado en contacto con agua caliente."
          - "No uses la cafetera sin agua en el depósito — puede dañar irreversiblemente la bomba."
  herramientas:
    label: Recambios de Herramienta
    slug: herramientas
    root: false
    description: Baterías, cargadores y accesorios para herramientas Makita, Bosch, DeWalt y Ryobi.
    hero_copy: "Baterías, cargadores y accesorios compatibles para herramientas eléctricas Makita, Bosch, DeWalt y Ryobi. Recambios verificados por voltaje, amperaje y sistema de conexión."
    emoji: "🔧"
    site_name: Recambios Herramienta
    tagline: Baterías, cargadores y accesorios
    primary: "#16a34a"
    primary_2: "#22c55e"
    color_rgb: "22,163,74"
    faq:
      - q: "¿Son compatibles las baterías Makita 18V entre distintos modelos?"
        a: "Sí, las baterías Makita 18V BL18xx son compatibles entre todas las herramientas de la plataforma 18V LXT. Verifica que la herramienta lleve el logo LXT."
      - q: "¿Puedo usar baterías de terceros en herramientas Bosch o DeWalt?"
        a: "Existen baterías compatibles de terceros pero deben especificar el voltaje y amperaje exactos. Las baterías de poca calidad pueden dañar el circuito de la herramienta."
      - q: "¿Cómo sé cuándo hay que cambiar la batería de una herramienta?"
        a: "Cuando la autonomía cae por debajo del 50% de la original, la batería tarda mucho en cargar o la herramienta pierde potencia de forma notable, es hora de sustituirla."
      - q: "¿Son intercambiables los cargadores rápidos con los estándar?"
        a: "Los cargadores rápidos Makita, Bosch y DeWalt son compatibles con sus baterías de la misma plataforma de voltaje, pero reducen la vida útil si se usan con baterías antiguas."
    guides:
      compra:
        title: Cómo elegir batería o cargador para herramienta eléctrica
        bullets:
          - "Verifica voltaje (18V, 20V, 36V) y plataforma (LXT, FLEXVOLT, XR): baterías de distintas plataformas no son compatibles."
          - "Para Makita 18V: solo las baterías BL18xx son compatibles con herramientas LXT. Verifica el logo en la herramienta."
          - "Para DeWalt: distingue entre XR (20V MAX) y FLEXVOLT (60V/20V). Las FLEXVOLT funcionan en herramientas 20V pero no al revés."
          - "El amperaje (Ah) determina la autonomía, no la potencia: una batería de 5Ah dura más que una de 2Ah en la misma herramienta."
          - "Los cargadores rápidos son compatibles con todas las baterías de la misma plataforma de voltaje."
          - "Evita baterías de terceros sin marca reconocida: pueden dañar el circuito de gestión de la herramienta."
      mantenimiento:
        title: Mantenimiento de herramientas eléctricas con batería
        bullets:
          - "Carga las baterías antes de guardarlas: las baterías Li-ion no deben almacenarse completamente descargadas."
          - "Guarda las baterías a temperatura entre 10-25°C — el calor y el frío extremos reducen la vida útil."
          - "Limpia los contactos de la batería y la herramienta con un paño seco si notan resistencia al insertar."
          - "Si la herramienta pierde potencia de forma notable, la batería puede haber llegado al final de su vida útil (2-3 años de uso intensivo)."
          - "No dejes las baterías conectadas al cargador indefinidamente — los cargadores modernos cortan, pero es mejor desconectar."
          - "Sustituye la batería si la autonomía cae por debajo del 50% respecto a cuando era nueva."
      seguridad:
        title: Seguridad al sustituir baterías y accesorios de herramientas
        bullets:
          - "Retira siempre la batería antes de cambiar brocas, hojas de sierra o accesorios."
          - "Si la batería está hinchada, caliente o desprende olor, no la cargues — llévala a un punto de residuos eléctricos."
          - "No perfores ni desmontes las baterías — contienen celdas de litio que pueden provocar incendio."
          - "Usa el equipo de protección adecuado (gafas, guantes) aunque vayas a hacer una tarea corta."
          - "Verifica que el voltaje del cargador coincide exactamente con el de la batería antes de conectarlo."
  cepillos:
    label: Recambios de Cepillo Eléctrico
    slug: cepillos
    root: false
    description: Cabezales, cargadores y accesorios para cepillos eléctricos Oral-B y Philips Sonicare.
    hero_copy: "Cabezales, cargadores y accesorios compatibles para cepillos eléctricos Oral-B y Philips Sonicare. Higiene dental óptima con recambios verificados por modelo."
    emoji: "🦷"
    site_name: Recambios Cepillo Dental
    tagline: Cabezales, cargadores y accesorios
    primary: "#7c3aed"
    primary_2: "#a78bfa"
    color_rgb: "124,58,237"
    faq:
      - q: "¿Cada cuánto hay que cambiar el cabezal del cepillo eléctrico?"
        a: "Los fabricantes recomiendan cada 3 meses o antes si las cerdas están deformadas o decoloradas. Un cabezal desgastado reduce la eficacia de limpieza."
      - q: "¿Son compatibles los cabezales Oral-B entre distintos modelos?"
        a: "La mayoría de cabezales Oral-B con conector redondo son compatibles con todos los mangos de la marca excepto los io Series (que usan conexión magnética diferente)."
      - q: "¿Puedo cargar mi Oral-B o Sonicare con un cargador inalámbrico Qi genérico?"
        a: "No. Estos cepillos usan carga por inducción propietaria (no estándar Qi). Necesitas el soporte cargador específico de tu modelo para cargar correctamente."
      - q: "¿Cuánto dura la batería de un cepillo eléctrico y se puede sustituir?"
        a: "La batería suele durar 3-5 años. En modelos de gama alta puede sustituirse, aunque requiere apertura del mango. Evalúa si merece la pena frente a comprar uno nuevo."
    guides:
      compra:
        title: Cómo elegir cabezal o cargador para cepillo eléctrico
        bullets:
          - "Para Oral-B: la mayoría de cabezales con conector redondo son compatibles con todos los mangos excepto iO Series (conector magnético diferente)."
          - "Para Philips Sonicare: cada familia tiene su conector — C2, C3, G3, A3 no son intercambiables entre sí."
          - "Sustituye siempre el cabezal completo, nunca solo las cerdas — las cerdas desgastadas no limpian bien aunque parezcan enteras."
          - "Los cargadores son específicos de cada marca: no son compatibles entre Oral-B y Sonicare aunque el conector parezca igual."
          - "Para viaje: verifica si el modelo admite 110-220V o solo un voltaje antes de comprar adaptador."
          - "Los cabezales de terceros pueden ser válidos si especifican la compatibilidad exacta con tu modelo de mango."
      mantenimiento:
        title: Mantenimiento del cepillo eléctrico para higiene óptima
        bullets:
          - "Sustituye el cabezal cada 3 meses o antes si las cerdas están dobladas o decoloradas."
          - "Enjuaga el cabezal bajo agua corriente después de cada uso — no el mango, solo el cabezal."
          - "Deja secar el cepillo en posición vertical con el cabezal hacia arriba para evitar humedad en el mango."
          - "Limpia el soporte cargador mensualmente con un paño húmedo — la cal acumulada puede interferir con la carga."
          - "No guardes el cepillo en estuche cerrado mientras está mojado — favorece la proliferación de bacterias."
          - "Si notas vibración reducida o ciclos más cortos, la batería puede estar cerca del final de su vida útil."
      seguridad:
        title: Seguridad al usar y mantener el cepillo eléctrico
        bullets:
          - "No sumerjas el mango del cepillo en agua aunque el cabezal sea sumergible."
          - "Usa el soporte cargador original — los cargadores genéricos pueden dañar la batería interna."
          - "Si la batería no retiene carga y el mango se calienta durante el uso, deja de usarlo."
          - "Mantén el cargador alejado del lavabo cuando está enchufado — riesgo de electrocución."
          - "No uses el cepillo eléctrico si el mango tiene grietas visibles o el cabezal no encaja con firmeza."
  robots-fregar:
    label: Recambios de Robot Fregasuelos
    slug: robots-fregar
    root: false
    description: Almohadillas, filtros, cepillos, depósitos y baterías para robots fregasuelos Roborock, iRobot Braava, Ecovacs y Dreame.
    hero_copy: "Encuentra almohadillas, filtros, cepillos y baterías compatibles para tu robot fregasuelos. Recambios verificados por modelo para Roborock, iRobot Braava, Ecovacs Deebot y Dreame."
    emoji: "🫧"
    site_name: Recambios Robot Fregasuelos
    tagline: Almohadillas, filtros y baterías
    primary: "#0284c7"
    primary_2: "#38bdf8"
    color_rgb: "2,132,199"
    faq:
      - q: "¿Cada cuánto hay que cambiar las almohadillas del robot fregasuelos?"
        a: "Los fabricantes recomiendan lavar las almohadillas lavables tras cada uso y sustituirlas cada 2-3 meses con uso frecuente. Las almohadillas desechables se cambian en cada sesión o cada 2-3 usos."
      - q: "¿Son compatibles los filtros de distintos modelos Roborock?"
        a: "No. Los filtros varían por modelo y generación. Un filtro del S7 no encaja en el S8 aunque sean de la misma marca. Comprueba siempre el número de modelo exacto antes de comprar."
      - q: "¿Cómo sé cuándo cambiar el cepillo lateral de mi robot?"
        a: "Cuando las cerdas están dobladas, desgastadas o el robot deja zonas sin limpiar en las esquinas. Con uso diario, suelen durar entre 3 y 6 meses."
      - q: "¿Puedo usar recambios genéricos en mi Roborock o Ecovacs?"
        a: "Sí, los recambios genéricos compatibles pueden funcionar bien si especifican claramente el modelo. Verifica siempre las dimensiones del filtro y el tipo de anclaje del cepillo."
    guides:
      compra:
        title: Cómo elegir recambios para tu robot fregasuelos
        bullets:
          - "Anota el modelo exacto del robot (ej: Roborock S8 Pro Ultra) — los accesorios cambian entre generaciones."
          - "Para almohadillas: distingue entre lavables (microfibra) y desechables. Verifica compatibilidad y capacidad del depósito."
          - "En filtros: comprueba si es HEPA o estándar y las dimensiones exactas — un filtro levemente diferente puede no sellar bien."
          - "Para baterías: verifica voltaje y capacidad (mAh). Las baterías de terceros deben especificar el modelo exacto."
          - "Los cepillos laterales suelen ser más universales dentro de una marca, pero el cepillo principal varía por modelo."
          - "Compra packs completos (filtros + cepillos + almohadillas) para abaratar el mantenimiento anual."
      mantenimiento:
        title: Mantenimiento del robot fregasuelos para alargar su vida útil
        bullets:
          - "Vacía el depósito de agua tras cada uso — el agua estancada genera malos olores y bacterias."
          - "Lava las almohadillas lavables tras cada sesión de fregado con agua y jabón suave."
          - "Limpia el cepillo principal cada semana: el pelo y los hilos acumulados reducen la eficiencia."
          - "Sustituye los filtros cada 2-3 meses o cuando el robot avise — un filtro obstruido sobrecarga el motor."
          - "Limpia los sensores de colisión y cliff mensualmente con un paño seco para evitar fallos de navegación."
          - "Revisa las ruedas cada mes: la suciedad acumulada puede bloquearlas y dañar el motor de tracción."
      seguridad:
        title: Seguridad al usar y mantener el robot fregasuelos
        bullets:
          - "No uses el robot en suelos con agua estancada o charcos — puede dañar los componentes eléctricos."
          - "Desconecta el robot de la base de carga antes de limpiar los sensores o cambiar la batería."
          - "Si la batería está hinchada o el robot emite olor a quemado, deja de usarlo y llévalo a servicio técnico."
          - "No uses detergentes agresivos en el depósito — pueden dañar los sellos y el sistema de bombeo."
          - "Mantén el cable de alimentación de la base alejado de zonas húmedas."
  robots-piscina:
    label: Recambios de Robot Limpiafondos
    slug: robots-piscina
    root: false
    description: Filtros, cepillos, bolsas y accesorios para robots limpiafondos Maytronics Dolphin, Zodiac y Bestway.
    hero_copy: "Filtros, cepillos, bolsas y accesorios compatibles para robots limpiafondos. Mantén tu Dolphin, Zodiac o Bestway en perfecto estado con recambios verificados por modelo."
    emoji: "🏊"
    site_name: Recambios Robot Piscina
    tagline: Filtros, cepillos y accesorios
    primary: "#0369a1"
    primary_2: "#0ea5e9"
    color_rgb: "3,105,161"
    faq:
      - q: "¿Cada cuánto hay que cambiar los filtros del robot de piscina?"
        a: "Los cartuchos de filtro deben lavarse tras cada uso y sustituirse cuando estén deformados o rotos. En temporada activa, suele ser necesario cambiarlos cada 1-2 temporadas según el uso."
      - q: "¿Son intercambiables los cepillos entre modelos Dolphin?"
        a: "No. Los cepillos varían según el modelo y el tipo de fondo (liner, hormigón, gresite). Verifica siempre el modelo exacto y el tipo de superficie de tu piscina antes de comprar."
      - q: "¿Cómo sé si el cable flotante de mi robot necesita reemplazo?"
        a: "Si el cable presenta grietas, el aislamiento está deteriorado o el robot no avanza con fluidez, es hora de sustituirlo. Un cable dañado puede crear riesgo eléctrico en el agua."
      - q: "¿Puedo usar bolsas de filtrado genéricas en mi Dolphin?"
        a: "Hay bolsas compatibles disponibles, pero verifica que el tejido sea del gramaje adecuado para tu piscina (hoja/arena vs. filtrado fino). Las bolsas demasiado porosas dejan pasar la suciedad."
    guides:
      compra:
        title: Cómo elegir recambios para tu robot de piscina
        bullets:
          - "Anota el modelo exacto de tu robot (ej: Dolphin E30) — los filtros y cepillos cambian entre series."
          - "Para cepillos: verifica el tipo de superficie (liner de vinilo, hormigón o gresite) — el cepillo equivocado puede dañar el revestimiento."
          - "Para filtros/cartuchos: distingue entre cartuchos de hoja gruesa y filtros finos — cada piscina necesita el gramaje adecuado."
          - "El cable flotante debe ser del mismo diámetro y longitud que el original para no afectar al movimiento."
          - "Para bolsas de filtrado: verifica que el sistema de cierre es compatible con tu modelo antes de comprar."
          - "Compra recambios al inicio de la temporada para no quedarte sin ellos en pleno verano."
      mantenimiento:
        title: Mantenimiento del robot limpiafondos para alargar su vida útil
        bullets:
          - "Lava los filtros o bolsas tras cada uso con agua limpia — la suciedad acumulada reduce la eficiencia de filtrado."
          - "Guarda el robot en lugar fresco y seco al final de la temporada — el calor y el frío extremos dañan los sellos."
          - "Revisa el cable flotante cada temporada en busca de grietas o desgaste del aislamiento."
          - "Limpia los cepillos semanalmente para eliminar pelo, hojas y residuos que reducen la tracción."
          - "Inspecciona las juntas de estanqueidad del motor al inicio de cada temporada."
          - "Guarda el robot con los filtros limpios y secos para evitar moho durante el invierno."
      seguridad:
        title: Seguridad al usar el robot de piscina
        bullets:
          - "Nunca entres en la piscina mientras el robot está funcionando — riesgo de enredo con el cable."
          - "Desconecta siempre la fuente de alimentación antes de extraer el robot del agua."
          - "Revisa el cable flotante antes de cada uso: un cable dañado puede crear riesgo eléctrico."
          - "No uses el robot en piscinas con el nivel de agua muy bajo — puede dañar las ruedas y el motor."
          - "Guarda el transformador y la fuente de alimentación alejados del borde de la piscina."
  robots-cristales:
    label: Recambios de Robot Limpiacristales
    slug: robots-cristales
    root: false
