      compatibilidad:
      - 'Las cestas y bandejas de freidoras son específicas por capacidad (3,8L, 5,2L,
        7,6L): no son intercambiables.'
      - 'Ninja tiene varias generaciones: AF100, AF160, Foodi Dual Zone tienen cestas
        y accesorios distintos.'
      - 'Los accesorios de silicona (moldes, liner) son genéricos por tamaño: mide
        el diámetro interior de tu cesta.'
      - El papel perforado debe ser del tamaño correcto para no bloquear la circulación
        de aire.
      - 'Los filtros de carbono son específicos por modelo: comprueba la referencia
        antes de comprar.'
      problemas:
      - key: cesta-deteriorada
        intent: info
        cta_cat: cesta
        fix_hint: 'Una cesta con recubrimiento dañado debería sustituirse: los fragmentos
          pueden contaminar los alimentos.'
        title: 'Pro II CAF-L501: cesta deteriorada o antiadherente dañado'
        symptoms:
        - El recubrimiento antiadherente se pela o tiene arañazos
        - Los alimentos se pegan a la cesta
        - Hay manchas permanentes que no se eliminan
        causes:
        - Uso de utensilios metálicos que rayan el recubrimiento
        - Limpieza con estropajos abrasivos
        - Sobrepasar la temperatura máxima recomendada
        checks:
        - Revisar si el antiadherente está levantado o desprendido
        - Comprobar que no hay óxido en zonas sin recubrimiento
        - Verificar que la cesta encaja correctamente en el cajón
      - key: no-calienta-freidora
        intent: info
        cta_cat: accesorios
        fix_hint: La acumulación de grasa en la resistencia es la causa más frecuente
          de pérdida de eficiencia. Limpia tras cada uso intensivo.
        title: Pro II CAF-L501 no alcanza temperatura o calienta poco
        symptoms:
        - Los alimentos salen blandos aunque se programa mucho tiempo
        - La freidora no llega a la temperatura seleccionada
        - El tiempo de cocción es el doble del normal
        causes:
        - Resistencia eléctrica con depósitos de grasa acumulados
        - Ventilador interno con obstrucción
        - Termostato defectuoso
        checks:
        - Limpiar a fondo la resistencia con un paño húmedo (sin abrasivos)
        - Asegurarse de que el cajón y la cesta están bien colocados
        - Verificar que la ventilación exterior no está bloqueada
      - key: humo-olor-plastico
        intent: info
        cta_cat: filtro
        fix_hint: En el primer uso es normal un leve olor. Si persiste después de
          varios usos, limpia a fondo la resistencia o sustituye el filtro.
        title: Pro II CAF-L501 hace humo o desprende olor a plástico
        symptoms:
        - Sale humo visible por las rejillas
        - Olor fuerte a plástico o quemado al encender
        - El humo activa el detector de humo de casa
        causes:
        - Grasa acumulada en la resistencia calefactora
        - Primer uso con recubrimiento de fábrica (normal al principio)
        - Filtro de carbono saturado
        checks:
        - Lavar bien la cesta y bandeja antes del primer uso
        - Limpiar la resistencia si hay restos de grasa visibles
        - Sustituir el filtro de carbono si lleva más de 3 meses
      faqs:
      - q: ¿Puedo usar papel de horno normal en la freidora de aire?
        a: Sí, pero debe ser papel perforado para no bloquear la circulación de aire.
          El papel sin agujeros puede hacer que la comida no quede crujiente y sobrecalentar
          la máquina.
      - q: ¿Con qué frecuencia hay que cambiar el filtro de carbono?
        a: Cada 2-3 meses con uso regular. Si notas olores más intensos durante la
          cocción, es señal de que el filtro está saturado.
      - q: ¿Es seguro usar la cesta si el antiadherente tiene arañazos?
        a: Si el antiadherente se está desprendiendo o hay fragmentos visibles, es
          mejor sustituir la cesta. Los arañazos superficiales sin desprendimiento
          no suponen riesgo.
      - q: ¿Los accesorios de silicona son aptos para freidoras de aire?
        a: Sí, siempre que soporten al menos 200-220°C. Verifica la temperatura máxima
          del accesorio antes de usarlo y mide bien el diámetro de tu cesta.
