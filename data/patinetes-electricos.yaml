        intent: info
        cta_cat: bateria
        fix_hint: En patinetes con más de 2-3 años, la batería es la causa más habitual
          de pérdida brusca de autonomía.
        title: Cecotec Bongo Serie Z no carga o dura poco la batería
        symptoms:
        - El patinete no enciende tras cargar toda la noche
        - La autonomía ha caído mucho respecto a cuando era nuevo
        - El cargador marca verde demasiado rápido o no cambia de color
        causes:
        - Batería degradada por ciclos de carga o almacenamiento largo
        - Cargador defectuoso o con voltaje incorrecto
        - Conector de carga sucio, dañado o con mal contacto
        checks:
        - Probar el cargador en otro enchufe y revisar si cambia de rojo a verde
        - Inspeccionar el puerto de carga y limpiar polvo o humedad
        - Comprobar si la autonomía real cae en cuestas o bajo carga fuerte
      - key: pinchazo-rueda
        intent: info
        cta_cat: rueda
        fix_hint: En muchos modelos conviene cambiar cámara y cubierta a la vez si
          el neumático ya está cuarteado.
        title: Cecotec Bongo Serie Z ha pinchado o pierde presión
        symptoms:
        - La rueda se desinfla en horas o días
        - Se nota el patinete más duro o inestable al rodar
        - Aparecen grietas o desgaste plano en el neumático
        causes:
        - Cámara pinchada por bordillo, cristal o pellizco
        - Neumático exterior agrietado o gastado
        - Válvula dañada o mal cerrada
        checks:
        - Revisar la presión recomendada antes de desmontar
        - Inspeccionar el neumático por cortes, clavos o grietas
        - Verificar si la fuga viene de la válvula o de la cámara
      - key: frena-mal
        intent: info
        cta_cat: freno
        fix_hint: Un disco ligeramente doblado puede rozar siempre, pero si el problema
          es falta de frenada suele empezar por pastillas gastadas.
        title: Cecotec Bongo Serie Z frena mal o hace ruido al frenar
        symptoms:
        - Necesita más distancia para detenerse
        - Hace chirridos o roces metálicos al frenar
        - La maneta tiene tacto esponjoso o recorrido excesivo
        causes:
        - Pastillas de freno gastadas o cristalizadas
        - Disco doblado o sucio
        - Cable o ajuste de pinza descompensado
        checks:
        - Revisar grosor de las pastillas y desgaste irregular
        - Girar la rueda al aire para comprobar si el disco roza
        - Comprobar tensión del cable y centrado de la pinza
      - key: holgura-plegado
        intent: info
        cta_cat: accesorios
        fix_hint: La holgura de plegado suele empezar por piezas pequeñas y baratas.
          Conviene corregirla pronto para evitar fatiga estructural.
        title: Cecotec Bongo Serie Z tiene holgura en el plegado o hace clac
        symptoms:
        - Se oye un clac al acelerar o frenar
        - La caña tiene un pequeño juego hacia delante y atrás
        - El cierre cuesta más de encajar que antes
        causes:
        - Gancho o cierre de plegado desgastado
        - Tornillería floja en la zona de bisagra
        - Tope de goma o pieza de ajuste deformada
        checks:
        - Apretar tornillería con el par recomendado por el fabricante
        - Revisar desgaste visible del gancho o cierre
        - Comprobar si el juego desaparece con ajuste del cierre
      faqs:
      - q: ¿Cómo sé qué rueda o cámara necesita mi patinete eléctrico?
        a: Comprueba la medida exacta del neumático, el tipo de válvula y si tu modelo
          usa cámara o sistema tubeless. Dos patinetes muy parecidos pueden montar
          ruedas distintas.
      - q: ¿Puedo usar un cargador compatible en vez del original?
        a: Sí, siempre que coincidan voltaje de salida, amperaje suficiente y conector.
          Un cargador incorrecto puede dañar la batería o no cargarla por completo.
      - q: ¿Cuándo hay que cambiar las pastillas o el disco de freno?
        a: Cuando notes menos frenada, chirridos continuos o veas las pastillas muy
          finas. Si el disco está doblado o tiene surcos profundos, también conviene
          sustituirlo.
      - q: ¿Es normal que el patinete tenga algo de holgura en el mástil?
        a: No debería tener juego perceptible. Una pequeña holgura en el plegado suele
          indicar desgaste en el gancho, el cierre o la tornillería y conviene corregirla
          cuanto antes.
