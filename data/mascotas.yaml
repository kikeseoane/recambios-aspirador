    - model: Oneisall Dog Clippers A5
      slug: oneisall-a5
      series: A-Series
      year_range: 2021-actual
      sku_pack: petgroomer10
      model_tokens:
      - oneisall a5
      - a5
      intro: El Oneisall A5 es el modelo profesional de la gama con mayor potencia
        de corte. Las baterías y las cuchillas son las piezas de recambio más solicitadas
        para este cortapelos.
      problemas:
      - key: bateria-agotada
        title: 'Oneisall A5: batería dura poco'
        intent: info
        symptoms:
        - El cortapelos no termina un pelado completo antes de quedarse sin batería
        - La autonomía real es mucho menor que la especificada por el fabricante
        - El dispositivo se apaga de repente aunque el indicador no mostrara batería
          baja
        checks:
        - Comprueba cuántos años lleva el dispositivo en uso — tras 2-3 años la batería
          se degrada
        - Verifica si la carcasa tiene protuberancias que indiquen batería hinchada
        - Realiza una carga completa de 4 horas y mide la autonomía resultante en
          uso continuado
        - Comprueba que el cargador es el original o uno con la misma tensión de salida
        causes:
        - Batería de litio degradada por el número de ciclos de carga acumulados
        - Almacenamiento con batería agotada que provoca sulfatación y pérdida de
          capacidad
        - Cargador defectuoso que realiza sobrecargas que dañan la batería
        cta:
          catKey: bateria
          label: Ver baterías compatibles
      - key: cuchilla-no-corta
        title: 'Oneisall A5: cuchilla no corta bien'
        intent: info
        symptoms:
        - La cuchilla tira del pelo o lo dobla en lugar de cortarlo limpiamente
        - El cortapelos vibra más de lo habitual y produce más calor durante el uso
        - El corte queda irregular con mechones que no quedan al mismo nivel
        checks:
        - Examina los dientes de la cuchilla con una lupa para detectar muescas o
          desgaste
        - Limpia el pelo acumulado entre las hojas con el cepillo de limpieza del
          kit
        - Aplica aceite lubricante profesional entre las hojas de la cuchilla
        - Verifica la alineación de las hojas — si están desalineadas hay que recalibrar
          o sustituir
        causes:
        - Dientes embotados por uso prolongado que ya no hacen el corte limpio necesario
        - Acumulación de pelo fino entre las hojas que frena el deslizamiento de la
          cuchilla
        - Cuchilla con desgaste asimétrico que genera vibración y corte irregular
        cta:
          catKey: laminas
          label: Ver cuchillas compatibles
