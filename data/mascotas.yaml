  guias_genericas:
    seguridad:
    - Desconecta el aspirador antes de manipular filtros, rodillos o batería.
    - 'No laves filtros no lavables: revisa el tipo (HEPA lavable vs. cartucho seco).'
    - 'Evita baterías no compatibles con el modelo/serie: riesgo de sobrecalentamiento
      y fallos de carga.'
    - 'Si hay olor a quemado, chispas o cortes repetidos: detén el uso y revisa obstrucciones
      y cableado.'
    mantenimiento:
    - 'Limpia el depósito y conductos: la obstrucción es la causa nº1 de pérdida de
      succión.'
    - 'Lava y seca filtros lavables (24h): la humedad genera malos olores y reduce
      el caudal.'
    - Retira pelo/hilos del rodillo cada 1-2 semanas si hay mascotas o alfombras.
    - 'Revisa juntas y sellos: una fuga de aire baja el rendimiento incluso con motor
      correcto.'
    compra:
    - Prioriza recambios con encaje y conectores equivalentes (voltaje nominal y tipo
      de anclaje).
    - 'En filtros, elige el grado adecuado: HEPA para alergias; estándar para uso
      general.'
    - 'En rodillos, elige según suelo: soft roller para duro; multisuperficie para
      mixto.'
    - Si tu aspirador es robot, compra packs (filtros + cepillos laterales + mopas)
      para abaratar mantenimiento.
brands:
  oneisall:
    name: Oneisall
    notes_brand: Top ventas cortapelos mascotas AliExpress. P2 y S8 Pro muy buscados.
      Alta demanda en cuchillas y peines.
    models:
    - model: Oneisall P2
      slug: oneisall-p2
      series: P-Series
      year_range: 2020-actual
      sku_pack: petgroomer10
      model_tokens:
      - oneisall p2
      - p2
      intro: El Oneisall P2 es el cortapelos para mascotas más vendido de la marca,
        con sistema de aspiración integrado para recoger el pelo cortado. Las cuchillas
        y el cargador son los recambios más demandados.
      problemas:
      - key: cuchilla-no-corta
        title: 'Oneisall P2: cuchilla no corta bien'
        intent: info
        symptoms:
        - La cuchilla tira del pelo de la mascota en lugar de cortarlo limpiamente
        - El cortapelos hace más ruido de lo habitual y se calienta más rápido
        - El pelo queda irregular con mechones sin cortar aunque pases varias veces
        checks:
        - Comprueba si la cuchilla tiene muescas o dientes rotos mirándola a contraluz
        - Limpia la cuchilla con el cepillo incluido para eliminar pelo y suciedad
          entre los dientes
        - Aplica una gota de aceite lubricante entre las dos hojas de la cuchilla
          y deja actuar 30 segundos
        - Verifica que la cuchilla está bien fijada al cabezal sin juego ni inclinación
        causes:
        - Cuchilla desgastada con dientes embotados que no cortan limpiamente (causa
          más habitual)
        - Pelo acumulado entre las hojas de la cuchilla que impide el deslizamiento
          correcto
        - Falta de lubricación entre las hojas que aumenta la fricción y reduce el
          corte
        cta:
          catKey: laminas
          label: Ver cuchillas compatibles
      - key: no-carga
        title: Oneisall P2 no carga
        intent: info
        symptoms:
        - El indicador de carga no se enciende al conectar el cargador
        - El cortapelos se apaga a los pocos minutos de empezar a cortar
        - La batería no sube de nivel aunque esté conectado durante horas
        checks:
        - Prueba el cargador en otro enchufe para descartar problemas de corriente
        - Limpia el puerto de carga del cortapelos con un palillo seco
        - Verifica que el cable del cargador no tiene cortes ni dobleces bruscos
        - Revisa si la batería está hinchada — una batería abultada hay que sustituirla
          de inmediato
        causes:
        - Cargador defectuoso o deteriorado que no entrega la corriente correcta
        - Puerto de carga con corrosión o suciedad que impide el contacto eléctrico
        - Batería de litio agotada por ciclos acumulados tras años de uso
        cta:
          catKey: cargador
          label: Ver cargadores compatibles
