      intro: El Oneisall S8 Pro combina cortapelos y aspiración del pelo en un kit
        completo. Las cuchillas son el consumible más solicitado para mantener el
        corte preciso.
      problemas:
      - key: cuchilla-tira-pelo
        title: 'Oneisall S8 Pro: cuchilla tira del pelo'
        intent: info
        symptoms:
        - La mascota se mueve incómoda o se queja durante el corte
        - La cuchilla arrastra el pelo en lugar de cortarlo con un golpe limpio
        - El pelo queda irregular y con tirones visibles tras el paso de la cuchilla
        checks:
        - Examina la cuchilla a contraluz para detectar dientes rotos o muescas
        - Limpia el pelo acumulado entre las hojas con el cepillo de limpieza incluido
        - Aplica aceite lubricante entre las hojas y deja actuar antes de usar
        - Verifica que la velocidad seleccionada es la adecuada para el tipo de pelo
          de la mascota
        causes:
        - Dientes de la cuchilla desgastados o con muescas que enganchan el pelo en
          lugar de cortarlo
        - Pelo acumulado entre las dos hojas que impide el deslizamiento suave
        - Cuchilla desalineada por un golpe o caída que hace que los dientes no se
          deslicen correctamente
        cta:
          catKey: laminas
          label: Ver cuchillas compatibles
      - key: bateria-agotada
        title: 'Oneisall S8 Pro: batería dura poco'
        intent: info
        symptoms:
        - El cortapelos se apaga antes de terminar el pelado completo de la mascota
        - La autonomía ha bajado a menos de 20 minutos cuando antes duraba 60
        - El indicador de batería baja de lleno a vacío muy rápidamente
        checks:
        - Comprueba cuántos años tiene el dispositivo — tras 2-3 años la batería suele
          estar degradada
        - Verifica si la batería está hinchada palpando la carcasa del cortapelos
        - Realiza una carga completa de 3-4 horas y mide la autonomía real resultante
        - Asegúrate de que el cargador entrega la tensión correcta especificada en
          el manual
        causes:
        - Batería de litio al final de su vida útil por ciclos de carga acumulados
        - Almacenamiento con la batería muy descargada que provoca degradación acelerada
        - Cargador defectuoso que realiza cargas incompletas y envejece la batería
          prematuramente
        cta:
          catKey: bateria
          label: Ver baterías compatibles
