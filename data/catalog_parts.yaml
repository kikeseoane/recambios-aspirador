globals:
  categorias_recambios:
    - key: bateria
      label: "Batería"
      icon: "battery"
      buy_intent: "compra"
    - key: filtro
      label: "Filtros"
      icon: "filter"
      buy_intent: "compra"
    - key: cepillo
      label: "Cepillos y rodillos"
      icon: "brush"
      buy_intent: "compra"
    - key: cargador
      label: "Cargadores y fuentes"
      icon: "plug"
      buy_intent: "compra"
    - key: soporte
      label: "Soportes y bases"
      icon: "mount"
      buy_intent: "compra"
    - key: accesorios
      label: "Accesorios"
      icon: "tools"
      buy_intent: "compra"

  guias_genericas:
    seguridad:
      - "Desconecta el aspirador antes de manipular filtros, rodillos o batería."
      - "No laves filtros no lavables: revisa el tipo (HEPA lavable vs. cartucho seco)."
      - "Evita baterías no compatibles con el modelo/serie: riesgo de sobrecalentamiento y fallos de carga."
      - "Si hay olor a quemado, chispas o cortes repetidos: detén el uso y revisa obstrucciones y cableado."
    mantenimiento:
      - "Limpia el depósito y conductos: la obstrucción es la causa nº1 de pérdida de succión."
      - "Lava y seca filtros lavables (24h): la humedad genera malos olores y reduce el caudal."
      - "Retira pelo/hilos del rodillo cada 1-2 semanas si hay mascotas o alfombras."
      - "Revisa juntas y sellos: una fuga de aire baja el rendimiento incluso con motor correcto."
    compra:
      - "Prioriza recambios con encaje y conectores equivalentes (voltaje nominal y tipo de anclaje)."
      - "En filtros, elige el grado adecuado: HEPA para alergias; estándar para uso general."
      - "En rodillos, elige según suelo: soft roller para duro; multisuperficie para mixto."
      - "Si tu aspirador es robot, compra packs (filtros + cepillos laterales + mopas) para abaratar mantenimiento."

# =========================================================
# PACKS (build_catalog.py genera recambios a partir de aquí)
# REGLA: cada pack debe producir EXACTAMENTE 10 items
# =========================================================
sku_packs:
  # Stick / escoba sin cable:
  # 10 EXACTOS: 2 bateria + 2 filtro + 2 cepillo + 1 cargador + 1 soporte + 2 accesorios
  stick10:
    - catKey: bateria
      sku_suffix: bat-std
      intent: "compra"
      title_tpl: "Batería compatible para {model}"
      must_include_tpl: ["{model_token}", "battery"]
      must_not_include: ["trigger", "switch", "button", "filter", "charger", "dock", "wall mount"]
    - catKey: bateria
      sku_suffix: bat-high
      intent: "compra"
      title_tpl: "Batería compatible alta capacidad para {model}"
      must_include_tpl: ["{model_token}", "battery", "capacity"]
      must_not_include: ["trigger", "switch", "button", "filter", "charger", "dock", "wall mount"]

    - catKey: filtro
      sku_suffix: filt-post-hepa
      intent: "compra"
      title_tpl: "Filtro HEPA post-motor compatible para {model}"
      must_include_tpl: ["{model_token}", "filter", "hepa"]
      must_not_include: ["battery", "charger", "trigger", "switch", "button"]
    - catKey: filtro
      sku_suffix: filt-pre-pack2
      intent: "compra"
      title_tpl: "Filtro pre-motor compatible (pack 2) para {model}"
      must_include_tpl: ["{model_token}", "filter", "pre"]
      must_not_include: ["battery", "charger", "trigger", "switch", "button"]

    - catKey: cepillo
      sku_suffix: brush-roller-main
      intent: "compra"
      title_tpl: "Rodillo/cepillo principal compatible para {model}"
      must_include_tpl: ["{model_token}", "roller"]
      must_not_include: ["battery", "filter", "charger", "trigger", "switch", "button"]
    - catKey: cepillo
      sku_suffix: brush-soft-fluffy
      intent: "compra"
      title_tpl: "Rodillo Soft/Fluffy compatible para {model}"
      must_include_tpl: ["{model_token}", "roller", "fluffy"]
      must_not_include: ["battery", "filter", "charger", "trigger", "switch", "button"]

    - catKey: cargador
      sku_suffix: charger-eu
      intent: "compra"
      title_tpl: "Cargador compatible EU para {model}"
      must_include_tpl: ["{model_token}", "charger"]
      must_not_include: ["battery", "filter", "trigger", "switch", "button", "pcb", "board"]

    - catKey: soporte
      sku_suffix: dock-wall
      intent: "compra"
      title_tpl: "Soporte de pared / dock compatible para {model}"
      must_include_tpl: ["{model_token}", "dock", "wall"]
      must_not_include: ["trigger", "switch", "button", "pcb", "board", "handle", "motor"]

    - catKey: accesorios
      sku_suffix: acc-kit-accessory
      intent: "compra"
      title_tpl: "Kit accessory compatible para {model} (boquillas y cepillos)"
      must_include_tpl: ["{model_token}", "accessory", "kit"]
      must_not_include: ["trigger", "switch", "button", "pcb", "board"]
    - catKey: accesorios
      sku_suffix: acc-pet
      intent: "compra"
      title_tpl: "Kit pet accessory compatible para {model} (mini cepillo)"
      must_include_tpl: ["{model_token}", "pet", "accessory"]
      must_not_include: ["trigger", "switch", "button", "pcb", "board"]

  # Robot:
  # 10 EXACTOS (con señales que pasan tu CATEGORY_PART_TERMS):
  # 2 filtros + 2 cepillos + 3 accesorios (mop/bag/kit) + 1 soporte (dock/base) + 2 accesorios (wheel/cover con 'accessory')
  robot10:
    - catKey: filtro
      sku_suffix: robot-filter-pack
      intent: "compra"
      title_tpl: "Filtros compatibles (pack) para {model}"
      must_include_tpl: ["{model_token}", "filter"]
    - catKey: filtro
      sku_suffix: robot-hepa-pack
      intent: "compra"
      title_tpl: "Filtros HEPA compatibles (pack) para {model}"
      must_include_tpl: ["{model_token}", "hepa", "filter"]

    - catKey: cepillo
      sku_suffix: robot-main-brush
      intent: "compra"
      title_tpl: "Main brush compatible para {model}"
      must_include_tpl: ["{model_token}", "main", "brush"]
      must_not_include: ["battery", "charger", "trigger", "switch", "button"]
    - catKey: cepillo
      sku_suffix: robot-side-brush-pack
      intent: "compra"
      title_tpl: "Side brush compatibles (pack) para {model}"
      must_include_tpl: ["{model_token}", "side", "brush"]
      must_not_include: ["battery", "charger", "trigger", "switch", "button"]

    - catKey: accesorios
      sku_suffix: robot-mop-accessory
      intent: "compra"
      title_tpl: "Mop accessory compatible (pack) para {model}"
      must_include_tpl: ["{model_token}", "mop", "accessory"]
    - catKey: accesorios
      sku_suffix: robot-dust-bag-accessory
      intent: "compra"
      title_tpl: "Dust bag accessory compatible (pack) para {model}"
      must_include_tpl: ["{model_token}", "dust", "bag", "accessory"]
    - catKey: accesorios
      sku_suffix: robot-kit-accessory
      intent: "compra"
      title_tpl: "Accessory kit compatible para {model} (brush+filter)"
      must_include_tpl: ["{model_token}", "kit", "accessory"]

    - catKey: soporte
      sku_suffix: robot-dock-base
      intent: "compra"
      title_tpl: "Dock base compatible para {model}"
      must_include_tpl: ["{model_token}", "dock", "base"]
      must_not_include: ["trigger", "switch", "button", "pcb", "board"]

    - catKey: accesorios
      sku_suffix: robot-wheel-accessory
      intent: "compra"
      title_tpl: "Wheel accessory compatible para {model}"
      must_include_tpl: ["{model_token}", "wheel", "accessory"]
    - catKey: accesorios
      sku_suffix: robot-cover-accessory
      intent: "compra"
      title_tpl: "Brush cover accessory compatible para {model}"
      must_include_tpl: ["{model_token}", "cover", "accessory"]

# =========================================================
# PROBLEM PACKS
# REGLA: {model} y {model_token} se sustituyen en compilación
# =========================================================
problem_packs:
  cordless_base:
    - key: no-carga
      title: "{model} no carga"
      intent: info
      cta_cat: bateria
      symptoms:
        - No enciende tras cargar
        - La luz de carga parpadea pero no mantiene carga
        - La batería se descarga muy rápido
      causes:
        - Batería degradada o agotada
        - Cargador defectuoso o mal contacto
        - Contactos de carga oxidados
      checks:
        - Probar con otro enchufe o base de carga
        - Revisar que los contactos estén limpios y sin óxido
        - Comprobar si el cargador original calienta o hace ruido
      fix_hint: "Si el cargador funciona correctamente, lo más probable es que necesites sustituir la batería."

    - key: pierde-potencia
      title: "{model} ha perdido potencia de aspiración"
      intent: info
      cta_cat: filtro
      symptoms:
        - Aspira menos que antes
        - Se obstruye con facilidad
        - El motor suena más fuerte de lo normal
      causes:
        - Filtro saturado o sucio
        - Conductos o tubo obstruidos
        - Rodillo con pelo o hilos enredados
      checks:
        - Limpiar o sustituir el filtro
        - Revisar el tubo y la boquilla por obstrucciones
        - Limpiar el rodillo de pelo y suciedad
      fix_hint: "Si tras limpiar el filtro y eliminar obstrucciones no mejora, considera sustituir el filtro por uno nuevo."

    - key: cepillo-no-gira
      title: "{model}: el cepillo o rodillo no gira"
      intent: info
      cta_cat: cepillo
      symptoms:
        - El rodillo no gira al encender
        - Se escucha el motor pero el cepillo está parado
        - La aspiración es muy débil sobre alfombras
      causes:
        - Pelo o hilos enredados bloqueando el rodillo
        - Rodillo desgastado o roto
        - Fallo en el módulo de tracción del cepillo
      checks:
        - Retirar manualmente pelo e hilos del rodillo
        - Verificar que el rodillo encaja y gira libremente a mano
        - Comprobar que no hay objetos atrapados en el eje
      fix_hint: "Si el rodillo gira libre a mano pero no con el motor, puede que el módulo de transmisión esté dañado."

  robot_base:
    - key: no-aspira
      title: "{model} no aspira bien"
      intent: info
      cta_cat: filtro
      symptoms:
        - El robot pasa pero el suelo sigue sucio
        - Hace ruido pero no recoge bien
        - El depósito se llena muy rápido o nada
      causes:
        - Filtro saturado o bloqueado
        - Cepillo lateral o principal con pelo enredado
        - Depósito mal colocado o lleno
      checks:
        - Limpiar o sustituir el filtro HEPA
        - Retirar pelo del cepillo principal y laterales
        - Vaciar y recolocar el depósito correctamente
      fix_hint: "Un filtro saturado es la causa más común. Sustitúyelo si lleva más de 2-3 meses en uso."

    - key: mopas-no-mojan
      title: "{model}: las mopas no mojan o manchan"
      intent: info
      cta_cat: accesorios
      symptoms:
        - El suelo queda igual tras el fregado
        - La mopa sale seca después del ciclo
        - Deja marcas o rayas en el suelo
      causes:
        - Mopa desgastada o sucia
        - Depósito de agua vacío o mal colocado
        - Módulo de mopa obstruido
      checks:
        - Rellenar el depósito de agua con agua limpia
        - Revisar que la mopa está bien sujeta al módulo
        - Sustituir la mopa si está muy usada o deformada
      fix_hint: "Las mopas de microfibra se desgastan con el uso. Sustitúyelas cada 1-2 meses con uso regular."

    - key: ruido-cepillo
      title: "{model} hace ruido en el cepillo"
      intent: info
      cta_cat: cepillo
      symptoms:
        - Sonido extraño o rasqueo durante la limpieza
        - Vibración inusual en el robot
        - El robot se detiene al pasar por ciertas zonas
      causes:
        - Pelo o hilos enredados en el cepillo principal
        - Cepillo lateral doblado o roto
        - Objeto atrapado en la rueda o cepillo
      checks:
        - Retirar pelo del cepillo principal con tijeras
        - Inspeccionar cepillos laterales y sustituir si están doblados
        - Revisar las ruedas por objetos atrapados
      fix_hint: "Los cepillos laterales suelen doblarse con el uso. Son piezas baratas de cambiar y mejoran notablemente el resultado."

# =========================================================
# COMPATIBILITY PACKS
# =========================================================
compatibility_packs:
  cordless_base:
    - "Confirma el modelo exacto (variante Animal, Absolute, etc.) antes de comprar cualquier recambio."
    - "En baterías: verifica voltaje nominal, capacidad (Ah) y tipo de conector (click-in vs. tornillos)."
    - "En filtros: comprueba si es HEPA lavable o cartucho seco y las medidas exactas."
    - "En rodillos: elige entre soft roller (suelos duros) o multisuperficie (mixto) según tu caso."
    - "Compara fotos reales del recambio con tu pieza original antes de comprar."

  robot_base:
    - "Comprueba el número de modelo completo: pequeñas variantes pueden cambiar el sistema de fijación."
    - "En filtros HEPA: asegúrate de que el formato (rectangular, cilíndrico) coincide con tu unidad."
    - "En cepillos laterales: verifica número de brazos (2 o 3) y sentido de giro (L/R)."
    - "En mopas y almohadillas: comprueba el sistema de sujeción (velcro, clips, magnético)."
    - "Para docks y bases: algunos modelos tienen versiones con y sin autovaciado que no son compatibles entre sí."

# =========================================================
# FAQ PACKS
# =========================================================
faq_packs:
  recambio_base:
    - q: "¿Cómo compruebo si este recambio es compatible con mi aspirador?"
      a: "Revisa el modelo exacto, la serie y, si hay variantes (Animal, Absolute, Pro...), confirma cuál tienes. Compara encajes, conectores y medidas con la pieza original."
    - q: "¿Los recambios compatibles son igual de buenos que los originales?"
      a: "Depende del fabricante. Muchos compatibles de calidad ofrecen rendimiento similar a menor precio, pero revisa valoraciones y que indiquen compatibilidad explícita con tu modelo."
    - q: "¿Con qué frecuencia debo cambiar el filtro?"
      a: "Lo habitual es cada 3-6 meses con uso normal, o antes si notas pérdida de succión. Los filtros lavables se limpian mensualmente y se sustituyen anualmente."
    - q: "¿Puedo usar una batería de mayor capacidad que la original?"
      a: "Solo si el voltaje es idéntico y el formato físico encaja. Una batería de mayor Ah dará más autonomía sin dañar el motor, pero verifica siempre la compatibilidad de voltaje."

  robot_base:
    - q: "¿Con qué frecuencia debo cambiar los consumibles del robot?"
      a: "Filtros HEPA: cada 2-3 meses. Cepillos laterales: cada 3-6 meses. Cepillo principal: cada 6-12 meses. Mopas: cada 1-2 meses con uso regular."
    - q: "¿Cómo sé qué cepillo lateral es el correcto para mi robot?"
      a: "Comprueba el número de brazos (2 o 3) y el sentido de giro. Algunos modelos llevan uno de cada lado (L+R). Busca el número de referencia en la pieza original."
    - q: "¿Los kits de accesorios incluyen todo lo que necesito?"
      a: "Los kits suelen incluir filtros, cepillos laterales y principal. Verifica qué contiene cada kit ya que la composición varía según fabricante y modelo."
    - q: "¿Puedo comprar piezas de mantenimiento sueltas o solo en packs?"
      a: "Ambas opciones existen. Los packs suelen ser más económicos si necesitas varios consumibles a la vez. Las piezas sueltas son útiles si solo falla un componente concreto."
