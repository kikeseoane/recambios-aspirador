    - "Los accesorios de silicona (moldes, liner) son genéricos por tamaño: mide el diámetro interior de tu cesta."
    - "El papel perforado debe ser del tamaño correcto para no bloquear la circulación de aire."
    - "Los filtros de carbono son específicos por modelo: comprueba la referencia antes de comprar."

# =========================================================
# FAQ PACKS
# =========================================================
faq_packs:
  recambio_base:
    - q: "¿Cómo compruebo si este recambio es compatible con mi aspirador?"
      a: "Revisa el modelo exacto, la serie y, si hay variantes (Animal, Absolute, Pro...), confirma cuál tienes. Compara encajes, conectores y medidas con la pieza original."
    - q: "¿Los recambios compatibles son igual de buenos que los originales?"
      a: "Depende del fabricante. Muchos compatibles de calidad ofrecen rendimiento similar a menor precio, pero revisa valoraciones y que indiquen compatibilidad explícita con tu modelo."
    - q: "¿Con qué frecuencia debo cambiar el filtro?"
      a: "Lo habitual es cada 3-6 meses con uso normal, o antes si notas pérdida de succión. Los filtros lavables se limpian mensualmente y se sustituyen anualmente."
    - q: "¿Puedo usar una batería de mayor capacidad que la original?"
      a: "Solo si el voltaje es idéntico y el formato físico encaja. Una batería de mayor Ah dará más autonomía sin dañar el motor, pero verifica siempre la compatibilidad de voltaje."

  robot_base:
    - q: "¿Con qué frecuencia debo cambiar los consumibles del robot?"
      a: "Filtros HEPA: cada 2-3 meses. Cepillos laterales: cada 3-6 meses. Cepillo principal: cada 6-12 meses. Mopas: cada 1-2 meses con uso regular."
    - q: "¿Cómo sé qué cepillo lateral es el correcto para mi robot?"
      a: "Comprueba el número de brazos (2 o 3) y el sentido de giro. Algunos modelos llevan uno de cada lado (L+R). Busca el número de referencia en la pieza original."
    - q: "¿Los kits de accesorios incluyen todo lo que necesito?"
      a: "Los kits suelen incluir filtros, cepillos laterales y principal. Verifica qué contiene cada kit ya que la composición varía según fabricante y modelo."
    - q: "¿Puedo comprar piezas de mantenimiento sueltas o solo en packs?"
      a: "Ambas opciones existen. Los packs suelen ser más económicos si necesitas varios consumibles a la vez. Las piezas sueltas son útiles si solo falla un componente concreto."

  shaver_base:
    - q: "¿Con qué frecuencia debo cambiar las láminas de mi afeitadora?"
      a: "Philips recomienda cada 2 años; Braun cada 18 meses con uso diario. Si notas que la piel se irrita o el afeitado tira más de lo normal, es momento de cambiarlas."
    - q: "¿Los cabezales compatibles son tan buenos como los originales?"
      a: "Los compatibles de calidad ofrecen un rendimiento muy similar. Busca que indiquen explícitamente compatibilidad con tu modelo y serie."
    - q: "¿Puedo usar el cargador de otra afeitadora Philips con la mía?"
      a: "Solo si el voltaje de salida y el conector son idénticos. Los modelos más recientes usan USB-C mientras los antiguos tienen conector redondo de 2 pines."
    - q: "¿Es normal que la afeitadora genere calor al cargar?"
      a: "Sí, es normal que se caliente ligeramente. Si está muy caliente al tacto o el indicador de carga parpadea rápidamente, puede haber un problema con la batería o el cargador."

  cafetera_base:
    - q: "¿Cada cuánto debo descalcificar mi cafetera?"
      a: "Cada 2-3 meses con agua dura, o cuando el programa de la máquina lo indique. La cal es la causa principal de averías en cafeteras de presión."
    - q: "¿Los filtros de agua de cafetera son universales?"
      a: "No. Cada fabricante tiene su sistema de filtrado. Comprueba el número de referencia de tu modelo antes de comprar."
    - q: "¿Puedo cambiar la junta de mi cafetera yo mismo?"
      a: "Sí, en la mayoría de modelos es una operación sencilla. Solo necesitas la junta correcta (verifica las medidas en mm) y seguir un tutorial del modelo específico."
    - q: "¿Por qué la cafetera pierde presión después de años de uso?"
      a: "La acumulación de cal deteriora las juntas y obstruye la bomba. Un descalcificado regular y la sustitución de juntas cada 2-3 años suelen resolver el problema."

  power_tool_base:
    - q: "¿Puedo usar una batería de mayor Ah en mi herramienta?"
      a: "Sí, siempre que el voltaje sea el mismo. Una batería de mayor capacidad (Ah) dará más autonomía sin afectar al motor."
    - q: "¿Las baterías compatibles dañan la herramienta?"
      a: "Las baterías compatibles de calidad con BMS (sistema de gestión de batería) son seguras. Evita las de marcas desconocidas sin protecciones electrónicas."
    - q: "¿Con qué frecuencia debo cambiar las brocas o discos?"
      a: "Cuando notes que el corte requiere más presión, el resultado es rugoso o la broca se calienta rápido. Una broca gastada daña tanto el material como la herramienta."
    - q: "¿Puedo dejar la batería cargando toda la noche?"
      a: "Los cargadores modernos tienen corte automático al llegar al 100%, por lo que no debería haber problema. Aun así, evitar la carga prolongada permanente prolonga la vida de la batería."

  scooter_base:
    - q: "¿Cómo sé qué rueda o cámara necesita mi patinete eléctrico?"
      a: "Comprueba la medida exacta del neumático, el tipo de válvula y si tu modelo usa cámara o sistema tubeless. Dos patinetes muy parecidos pueden montar ruedas distintas."
    - q: "¿Puedo usar un cargador compatible en vez del original?"
      a: "Sí, siempre que coincidan voltaje de salida, amperaje suficiente y conector. Un cargador incorrecto puede dañar la batería o no cargarla por completo."
    - q: "¿Cuándo hay que cambiar las pastillas o el disco de freno?"
      a: "Cuando notes menos frenada, chirridos continuos o veas las pastillas muy finas. Si el disco está doblado o tiene surcos profundos, también conviene sustituirlo."
    - q: "¿Es normal que el patinete tenga algo de holgura en el mástil?"
      a: "No debería tener juego perceptible. Una pequeña holgura en el plegado suele indicar desgaste en el gancho, el cierre o la tornillería y conviene corregirla cuanto antes."

  toothbrush_base:
    - q: "¿Con qué frecuencia debo cambiar el cabezal del cepillo eléctrico?"
      a: "Los dentistas recomiendan cada 3 meses o antes si las cerdas indicadoras pierden el color. Con uso intensivo puede ser necesario cada 2 meses."
    - q: "¿Los cabezales compatibles son igual de buenos que los originales?"
      a: "Los cabezales compatibles de calidad ofrecen limpieza similar. Busca que especifiquen compatibilidad con tu modelo exacto y que las cerdas sean de nylon suave."
    - q: "¿Puedo usar el cargador de otro cepillo Oral-B con el mío?"
      a: "La mayoría de cargadores Oral-B son compatibles entre modelos de la misma gama. Sin embargo, los modelos iO usan un cargador diferente. Verifica siempre el voltaje de salida."
    - q: "¿Es seguro dejar el cepillo cargando toda la noche?"
      a: "Sí, los cargadores modernos tienen protección de sobrecarga. Sin embargo, para prolongar la vida de la batería es mejor evitar mantenerlo conectado permanentemente."

  airfryer_base:
    - q: "¿Puedo usar papel de horno normal en la freidora de aire?"
      a: "Sí, pero debe ser papel perforado para no bloquear la circulación de aire. El papel sin agujeros puede hacer que la comida no quede crujiente y sobrecalentar la máquina."
    - q: "¿Con qué frecuencia hay que cambiar el filtro de carbono?"
      a: "Cada 2-3 meses con uso regular. Si notas olores más intensos durante la cocción, es señal de que el filtro está saturado."
    - q: "¿Es seguro usar la cesta si el antiadherente tiene arañazos?"
      a: "Si el antiadherente se está desprendiendo o hay fragmentos visibles, es mejor sustituir la cesta. Los arañazos superficiales sin desprendimiento no suponen riesgo."
    - q: "¿Los accesorios de silicona son aptos para freidoras de aire?"
      a: "Sí, siempre que soporten al menos 200-220°C. Verifica la temperatura máxima del accesorio antes de usarlo y mide bien el diámetro de tu cesta."
