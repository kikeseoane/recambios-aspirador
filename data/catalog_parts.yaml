    - "Philips Sonicare tiene cabezales con distintos sistemas de clic: C1, C2, G3... no todos encajan en todos los modelos."
    - "Los cargadores de cepillos eléctricos tienen voltajes específicos: no uses un cargador de otro dispositivo."
    - "La mayoría de cepillos eléctricos tienen carga inductiva (sin contacto): el cargador debe ser el correcto para ese modelo."
    - "Los cabezales de Oral-B Pro/Vitality son distintos a los de la serie iO aunque el mango sea similar."

  airfryer_base:
