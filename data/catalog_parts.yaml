# =========================================================
# PROBLEM PACKS
# REGLA: {model} y {model_token} se sustituyen en compilación
# =========================================================
problem_packs:
  cordless_base:
    - key: no-carga
      title: "{model} no carga"
      intent: info
      cta_cat: bateria
      symptoms:
        - No enciende tras cargar
        - La luz de carga parpadea pero no mantiene carga
        - La batería se descarga muy rápido
      causes:
        - Batería degradada o agotada
        - Cargador defectuoso o mal contacto
        - Contactos de carga oxidados
      checks:
        - Probar con otro enchufe o base de carga
        - Revisar que los contactos estén limpios y sin óxido
        - Comprobar si el cargador original calienta o hace ruido
      fix_hint: "Si el cargador funciona correctamente, lo más probable es que necesites sustituir la batería."

    - key: pierde-potencia
      title: "{model} ha perdido potencia de aspiración"
      intent: info
      cta_cat: filtro
      symptoms:
        - Aspira menos que antes
        - Se obstruye con facilidad
        - El motor suena más fuerte de lo normal
      causes:
        - Filtro saturado o sucio
        - Conductos o tubo obstruidos
        - Rodillo con pelo o hilos enredados
      checks:
        - Limpiar o sustituir el filtro
        - Revisar el tubo y la boquilla por obstrucciones
        - Limpiar el rodillo de pelo y suciedad
      fix_hint: "Si tras limpiar el filtro y eliminar obstrucciones no mejora, considera sustituir el filtro por uno nuevo."

    - key: cepillo-no-gira
      title: "{model}: el cepillo o rodillo no gira"
      intent: info
      cta_cat: cepillo
      symptoms:
        - El rodillo no gira al encender
        - Se escucha el motor pero el cepillo está parado
        - La aspiración es muy débil sobre alfombras
      causes:
        - Pelo o hilos enredados bloqueando el rodillo
        - Rodillo desgastado o roto
        - Fallo en el módulo de tracción del cepillo
      checks:
        - Retirar manualmente pelo e hilos del rodillo
        - Verificar que el rodillo encaja y gira libremente a mano
        - Comprobar que no hay objetos atrapados en el eje
      fix_hint: "Si el rodillo gira libre a mano pero no con el motor, puede que el módulo de transmisión esté dañado."

    - key: se-apaga-solo
      title: "{model} se apaga solo sin avisar"
      intent: info
      cta_cat: bateria
      symptoms:
        - El aspirador se apaga a mitad del uso
        - Se reinicia o corta la alimentación de repente
        - La luz de batería parpadea justo antes de apagarse
      causes:
        - Batería con celdas degradadas que no aguantan la carga de pico
        - Sobrecalentamiento del motor por filtro saturado o rodillo bloqueado
        - Protección térmica activada por uso prolongado
      checks:
        - Limpiar el filtro y el rodillo antes de volver a encender
        - Dejar reposar 10 minutos si se ha usado mucho rato seguido
        - Comprobar si la autonomía mejora después de un ciclo de carga completo
      fix_hint: "Si el problema ocurre desde el principio del uso y no tras uso prolongado, la batería suele ser la causa raíz."

    - key: hace-ruido
      title: "{model} hace ruido extraño o fuerte"
      intent: info
      cta_cat: cepillo
      symptoms:
        - Sonido nuevo o más fuerte de lo normal al aspirar
        - Vibración inusual en el mango o cabezal
        - Ruido de raspado o clic al pasar por suelos
      causes:
        - Pelo, hilo o pequeño objeto atrapado en el rodillo o eje
        - Rodillo desgastado que roza la carcasa
        - Obstrucción parcial en el tubo o boquilla
      checks:
        - Apagar y retirar el rodillo para inspeccionarlo manualmente
        - Revisar el tubo y la boquilla por objetos que puedan vibrar
        - Comprobar si el ruido desaparece sin la boquilla conectada
      fix_hint: "Un raspado rítmico suele indicar objeto en el rodillo. Un silbido agudo suele indicar obstrucción en el conducto."

    - key: mal-olor
      title: "{model} desprende mal olor al aspirar"
      intent: info
      cta_cat: filtro
      symptoms:
        - Olor a quemado, polvo o a sucio al encender
        - El olor aumenta al aspirar alfombras o pelo de mascotas
        - El ambiente queda con mal olor después de aspirar
      causes:
        - Filtro saturado que recircula el polvo por el aire
        - Rodillo con pelo acumulado que se calienta con el motor
        - Depósito o contenedor sin limpiar durante mucho tiempo
      checks:
        - Limpiar o sustituir el filtro
        - Limpiar el rodillo y retirar todo el pelo acumulado
        - Vaciar y lavar el depósito o contenedor de polvo
      fix_hint: "Si el mal olor persiste con filtro limpio y rodillo limpio, puede que el motor haya absorbido partículas. Revisa el filtro post-motor."

    - key: no-arranca
      title: "{model} no enciende o no arranca"
      intent: info
      cta_cat: bateria
      symptoms:
        - No responde al pulsar el botón de encendido
        - El LED no parpadea ni se enciende
        - Arranca un segundo y se vuelve a apagar
      causes:
        - Batería completamente descargada o dañada
        - Cargador sin alimentación o con conector suelto
        - Bloqueo de seguridad por rodillo bloqueado o sobrecalentamiento previo
      checks:
        - Conectar el cargador y esperar 30 minutos antes de volver a intentar
        - Verificar que el cargador está conectado a la corriente y la luz está encendida
        - Comprobar que el rodillo gira libre y no hay obstrucciones
      fix_hint: "Si tras carga completa sigue sin arrancar, el problema puede ser la batería o el controlador. La batería es la pieza más fácil de sustituir primero."

  robot_base:
    - key: no-aspira
      title: "{model} no aspira bien"
      intent: info
      cta_cat: filtro
      symptoms:
        - El robot pasa pero el suelo sigue sucio
        - Hace ruido pero no recoge bien
        - El depósito se llena muy rápido o nada
      causes:
        - Filtro saturado o bloqueado
        - Cepillo lateral o principal con pelo enredado
        - Depósito mal colocado o lleno
      checks:
        - Limpiar o sustituir el filtro HEPA
        - Retirar pelo del cepillo principal y laterales
        - Vaciar y recolocar el depósito correctamente
      fix_hint: "Un filtro saturado es la causa más común. Sustitúyelo si lleva más de 2-3 meses en uso."

    - key: mopas-no-mojan
      title: "{model}: las mopas no mojan o manchan"
      intent: info
      cta_cat: accesorios
      symptoms:
        - El suelo queda igual tras el fregado
        - La mopa sale seca después del ciclo
        - Deja marcas o rayas en el suelo
      causes:
        - Mopa desgastada o sucia
        - Depósito de agua vacío o mal colocado
        - Módulo de mopa obstruido
      checks:
        - Rellenar el depósito de agua con agua limpia
        - Revisar que la mopa está bien sujeta al módulo
        - Sustituir la mopa si está muy usada o deformada
      fix_hint: "Las mopas de microfibra se desgastan con el uso. Sustitúyelas cada 1-2 meses con uso regular."

    - key: ruido-cepillo
      title: "{model} hace ruido en el cepillo"
      intent: info
      cta_cat: cepillo
      symptoms:
        - Sonido extraño o rasqueo durante la limpieza
        - Vibración inusual en el robot
        - El robot se detiene al pasar por ciertas zonas
      causes:
        - Pelo o hilos enredados en el cepillo principal
        - Cepillo lateral doblado o roto
        - Objeto atrapado en la rueda o cepillo
      checks:
        - Retirar pelo del cepillo principal con tijeras
        - Inspeccionar cepillos laterales y sustituir si están doblados
        - Revisar las ruedas por objetos atrapados
      fix_hint: "Los cepillos laterales suelen doblarse con el uso. Son piezas baratas de cambiar y mejoran notablemente el resultado."

    - key: no-vuelve-base
      title: "{model} no encuentra la base de carga o no vuelve"
      intent: info
      cta_cat: accesorios
      symptoms:
        - El robot termina la limpieza en mitad de la habitación
        - El robot gira en círculos buscando la base sin encontrarla
        - La app indica "buscando base" pero nunca regresa
      causes:
        - Sensor de infrarrojos de la base sucio o bloqueado
        - Base de carga movida o colocada en posición incorrecta
        - Obstáculos entre la última posición del robot y la base
      checks:
        - Limpiar los sensores frontales del robot con un paño seco
        - Reubicar la base en una pared libre y sin muebles a los lados
        - Asegurarse de que la base tiene alimentación y la luz está encendida
      fix_hint: "La base debe estar en una pared despejada, sin objetos a menos de 1m a cada lado y a 1,5m de escaleras."

    - key: ruedas-bloqueadas
      title: "{model}: las ruedas están bloqueadas o el robot no se mueve"
      intent: info
      cta_cat: accesorios
      symptoms:
        - El robot gira sobre sí mismo sin avanzar
        - Una rueda parece atascada o hace ruido al rodar
        - El robot se detiene y emite un error de movimiento
      causes:
        - Pelo o suciedad enredada en los ejes de las ruedas
        - Rueda caída en un escalón o atrapada bajo un mueble
        - Módulo de rueda dañado por impacto
      checks:
        - Levantar el robot y girar las ruedas manualmente
        - Retirar todo el pelo e hilos del eje de cada rueda
        - Comprobar que las ruedas muestran resistencia elástica (muelle interno)
      fix_hint: "Si una rueda no hace retorno elástico al presionarla hacia arriba, el muelle interno puede estar roto y la rueda puede necesitar sustitución."

    - key: mapa-errores
      title: "{model}: el mapa es incorrecto o el robot se pierde"
      intent: info
      cta_cat: accesorios
      symptoms:
        - El mapa de la app no se corresponde con la distribución real
        - El robot pasa dos veces por el mismo sitio o se salta zonas
        - Después de mover el robot, el mapa queda inconsistente
      causes:
        - Sensor LiDAR o de pared sucio que lee mal las distancias
        - Entorno con mucha luz directa que interfiere con los sensores
        - Firmware desactualizado con bugs de mapeo corregidos en versiones nuevas
      checks:
        - Limpiar el sensor LiDAR (torreta giratoria) con un paño suave
        - Borrar el mapa guardado y hacer una limpieza completa desde cero
        - Verificar si hay actualización de firmware disponible en la app
      fix_hint: "Borrar el mapa y dejar que el robot explore de nuevo suele corregir la mayoría de errores de cartografía."

    - key: no-arranca-robot
      title: "{model} no enciende o no inicia la limpieza"
      intent: info
      cta_cat: filtro
      symptoms:
        - El robot no responde al pulsar el botón o desde la app
        - La base de carga está encendida pero el robot no carga
        - La app muestra el robot como "desconectado" o "sin batería"
      causes:
        - Batería interna muy descargada o degradada
        - Contactos de la base de carga sucios u oxidados
        - Fallo en la conexión WiFi que impide el control desde la app
      checks:
        - Limpiar los contactos metálicos del robot y de la base con un paño seco
        - Colocar el robot manualmente sobre la base y esperar 2 horas
        - Reiniciar el robot pulsando el botón de encendido 5-10 segundos
      fix_hint: "Si los contactos están limpios pero el robot sigue sin cargar, el problema puede ser la batería interna. Es la pieza más habitual de sustituir en robots con más de 3 años."

  shaver_base:
    - key: lamina-desgastada
      title: "{model}: lámina desgastada o raya la piel"
      intent: info
      cta_cat: laminas
      symptoms:
        - La afeitadora raya o irrita la piel
        - El afeitado ya no es tan apurado como antes
        - Nota que el vello "tira" en lugar de cortarse limpiamente
      causes:
        - Lámina metálica desgastada por el uso
        - Cabezal con más de 18-24 meses de uso intensivo
        - Pelo muy grueso o rizado que desgasta más la lámina
      checks:
        - Revisar la lámina a contraluz: si hay agujeros o deformaciones hay que cambiarla
        - Comprobar si el problema mejora tras limpiar bien el cabezal
        - Verificar que el cabezal está correctamente encajado
      fix_hint: "Philips recomienda sustituir la lámina cada 2 años; Braun cada 18 meses con uso diario."

    - key: no-carga-afeitadora
      title: "{model} no carga o tiene poca autonomía"
      intent: info
      cta_cat: cargador
      symptoms:
        - La batería dura menos de 20 minutos
        - El indicador de carga no responde al conectar
        - Se apaga sin avisar durante el afeitado
      causes:
        - Batería degradada tras 2-3 años de uso
        - Cargador o cable dañado
        - Contactos de carga sucios u oxidados
      checks:
        - Limpiar los contactos con un paño seco
        - Probar con otra toma de corriente o adaptador
        - Verificar que el cargador está caliente (normal) o frío (fallo)
      fix_hint: "Si la batería no aguanta más de 15 minutos tras carga completa, es probable que necesite reemplazarse."

    - key: cabezal-no-oscila
      title: "{model}: el cabezal no oscila o gira mal"
      intent: info
      cta_cat: cabezal
      symptoms:
        - El cabezal está rígido y no se adapta al contorno de la cara
        - Se escucha un clic o ruido al presionar el cabezal
        - El afeitado es desigual por zonas
      causes:
        - Mecanismo de oscilación bloqueado por acumulación de residuos
        - Cabezal dañado o deformado por caída
        - Resorte del cabezal roto
      checks:
        - Desmonta el cabezal y elimina acumulaciones de vello
        - Verifica que el cabezal encaja correctamente al volver a montarlo
        - Comprueba si el cabezal oscila libremente a mano sin la máquina
      fix_hint: "Si después de limpiar el cabezal sigue rígido, sustituirlo suele ser la solución más económica frente a reparación."

  cafetera_base:
    - key: no-hace-presion
      title: "{model} no hace presión o el café sale aguado"
      intent: info
      cta_cat: filtro
      symptoms:
        - El café gotea en lugar de salir en chorro
        - El espresso no tiene crema o es muy fina
        - La máquina hace ruido pero apenas sale líquido
      causes:
        - Filtro de agua obstruido o saturado
        - Junta de grupo desgastada o reseca
        - Bomba de presión deteriorada
      checks:
        - Sustituir el filtro de agua si lleva más de 2 meses
        - Revisar que la junta del portafiltros está en buen estado
        - Ejecutar ciclo de descalcificación si hace más de 3 meses
      fix_hint: "Una junta de grupo endurecida es la causa más habitual de pérdida de presión en cafeteras de cápsulas."

    - key: pierde-agua
      title: "{model} pierde agua o hace goteo"
      intent: info
      cta_cat: junta
      symptoms:
        - Hay charco de agua bajo la cafetera
        - Goteo desde el portafiltros durante el ciclo
        - El depósito se vacía más rápido de lo normal
      causes:
        - Junta de grupo desgastada o fisurada
        - Depósito mal encajado o con grieta
        - Tuberías internas con acumulación de cal que rompe el sellado
      checks:
        - Retirar y revisar la junta del portafiltros
        - Comprobar que el depósito está bien encajado sin grietas
        - Descalcificar si hay mucha acumulación de cal en el circuito
      fix_hint: "Las juntas de goma se endurecen con el calor y la cal. Suelen costar menos de 5€ y son fáciles de cambiar."

    - key: no-calienta-cafe
      title: "{model} no calienta o el café sale frío"
      intent: info
      cta_cat: accesorios
      symptoms:
        - El café sale tibio en lugar de caliente
        - La máquina tarda más de lo normal en calentar
        - El vapor es débil o no sale
      causes:
        - Acumulación de cal en el thermoblock
        - Resistencia eléctrica deteriorada
        - Termostato defectuoso
      checks:
        - Ejecutar ciclo de descalcificación completo
        - Precalentar la taza antes del café
        - Verificar que la temperatura está en el ajuste máximo
      fix_hint: "El descalcificado regular (cada 3 meses) previene el 80% de los problemas de temperatura. Usa descalcificador específico para cafeteras."

  power_tool_base:
    - key: bateria-no-carga
      title: "{model}: batería no carga o poca duración"
      intent: info
      cta_cat: bateria
      symptoms:
        - La herramienta se apaga a los pocos minutos
        - El cargador no emite señal de carga
        - La batería no aguanta ni una tarea sencilla
      causes:
        - Celdas de la batería degradadas por ciclos de carga
        - Cargador defectuoso o sobrecalentado
        - Contactos de la batería sucios u oxidados
      checks:
        - Limpiar los contactos de la batería con contacto eléctrico limpiador
        - Probar con otro cargador si está disponible
        - Verificar que la batería no está excesivamente caliente al cargar
      fix_hint: "Las baterías de herramientas duran 3-5 años con uso intensivo. Una batería compatible de buena calidad puede costar la mitad que la original."

    - key: no-arranca-herramienta
      title: "{model} no arranca o pierde par"
      intent: info
      cta_cat: accesorios
      symptoms:
        - La herramienta no responde al gatillo
        - Arranca pero sin fuerza suficiente
        - Se para sola bajo carga
      causes:
        - Batería con carga insuficiente
        - Interruptor de gatillo desgastado
        - Carbones del motor gastados (en modelos con escobillas)
      checks:
        - Cargar la batería completamente antes de volver a probar
        - Verificar que la batería hace contacto correcto en el alojamiento
        - Comprobar si hay protección térmica activada (esperar 15 min)
      fix_hint: "Si el problema persiste con batería cargada, el gatillo o el motor pueden necesitar revisión en servicio técnico."

    - key: vibra-herramienta
      title: "{model} vibra o hace ruido excesivo"
      intent: info
      cta_cat: accesorios
      symptoms:
        - Vibración inusual al trabajar
        - Ruido metálico o traqueteo
        - Calentamiento excesivo del cuerpo
      causes:
        - Accesorio (disco, broca) desequilibrado o desgastado
        - Rodamientos internos desgastados
        - Portabrocas flojo o con holgura
      checks:
        - Cambiar la broca o disco por uno nuevo y verificar si desaparece la vibración
        - Apretar correctamente el portabrocas con llave
        - Comprobar que el accesorio está bien centrado y en buen estado
      fix_hint: "Un disco o broca desgastados son la causa más frecuente de vibración. Cambiarlos es barato y rápido."

  scooter_base:
    - key: no-carga
      title: "{model} no carga o dura poco la batería"
      intent: info
      cta_cat: bateria
      symptoms:
        - El patinete no enciende tras cargar toda la noche
        - La autonomía ha caído mucho respecto a cuando era nuevo
        - El cargador marca verde demasiado rápido o no cambia de color
      causes:
        - Batería degradada por ciclos de carga o almacenamiento largo
        - Cargador defectuoso o con voltaje incorrecto
        - Conector de carga sucio, dañado o con mal contacto
      checks:
        - Probar el cargador en otro enchufe y revisar si cambia de rojo a verde
        - Inspeccionar el puerto de carga y limpiar polvo o humedad
        - Comprobar si la autonomía real cae en cuestas o bajo carga fuerte
      fix_hint: "En patinetes con más de 2-3 años, la batería es la causa más habitual de pérdida brusca de autonomía."

    - key: pinchazo-rueda
      title: "{model} ha pinchado o pierde presión"
      intent: info
      cta_cat: rueda
      symptoms:
        - La rueda se desinfla en horas o días
        - Se nota el patinete más duro o inestable al rodar
        - Aparecen grietas o desgaste plano en el neumático
      causes:
        - Cámara pinchada por bordillo, cristal o pellizco
        - Neumático exterior agrietado o gastado
        - Válvula dañada o mal cerrada
      checks:
        - Revisar la presión recomendada antes de desmontar
        - Inspeccionar el neumático por cortes, clavos o grietas
        - Verificar si la fuga viene de la válvula o de la cámara
      fix_hint: "En muchos modelos conviene cambiar cámara y cubierta a la vez si el neumático ya está cuarteado."

    - key: frena-mal
      title: "{model} frena mal o hace ruido al frenar"
      intent: info
      cta_cat: freno
      symptoms:
        - Necesita más distancia para detenerse
        - Hace chirridos o roces metálicos al frenar
        - La maneta tiene tacto esponjoso o recorrido excesivo
      causes:
        - Pastillas de freno gastadas o cristalizadas
        - Disco doblado o sucio
        - Cable o ajuste de pinza descompensado
      checks:
        - Revisar grosor de las pastillas y desgaste irregular
        - Girar la rueda al aire para comprobar si el disco roza
        - Comprobar tensión del cable y centrado de la pinza
      fix_hint: "Un disco ligeramente doblado puede rozar siempre, pero si el problema es falta de frenada suele empezar por pastillas gastadas."

    - key: holgura-plegado
      title: "{model} tiene holgura en el plegado o hace clac"
      intent: info
      cta_cat: accesorios
      symptoms:
        - Se oye un clac al acelerar o frenar
        - La caña tiene un pequeño juego hacia delante y atrás
        - El cierre cuesta más de encajar que antes
      causes:
        - Gancho o cierre de plegado desgastado
        - Tornillería floja en la zona de bisagra
        - Tope de goma o pieza de ajuste deformada
      checks:
        - Apretar tornillería con el par recomendado por el fabricante
        - Revisar desgaste visible del gancho o cierre
        - Comprobar si el juego desaparece con ajuste del cierre
      fix_hint: "La holgura de plegado suele empezar por piezas pequeñas y baratas. Conviene corregirla pronto para evitar fatiga estructural."

  toothbrush_base:
    - key: no-carga-cepillo
      title: "{model} no carga o batería dura poco"
      intent: info
      cta_cat: cargador
      symptoms:
        - El cepillo no se enciende tras la carga
        - La batería dura menos de 5 minutos
        - El indicador de batería parpadea inmediatamente
      causes:
        - Batería interna degradada por ciclos
        - Cargador o base de carga dañada
        - Fallo en la carga inalámbrica (acumulación de humedad)
      checks:
        - Limpiar la base de carga y los contactos con un paño seco
        - Probar en otra toma de corriente
        - Dejar el cepillo en carga 24h sin interrumpir el ciclo
      fix_hint: "Si el cepillo lleva más de 3 años en uso, la batería interna puede estar al final de su vida útil."

    - key: cabezal-gastado
      title: "{model}: cabezal muy gastado, no limpia bien"
      intent: info
      cta_cat: cabezal
      symptoms:
        - Las cerdas están dobladas o desgastadas
        - La limpieza ya no es tan eficaz
        - Las cerdas indicadoras han perdido el color
      causes:
        - Cabezal con más de 3 meses de uso
        - Presión excesiva al cepillar
        - Uso de pasta muy abrasiva
      checks:
        - Revisar si las cerdas indicadoras han perdido el color azul
        - Verificar que las cerdas no están dobladas hacia los lados
        - Asegurarse de que el cabezal encaja correctamente en el mango
      fix_hint: "Los dentistas recomiendan cambiar el cabezal cada 3 meses o antes si las cerdas se doblan. Los packs de 4 son la opción más económica."

    - key: vibra-menos-cepillo
      title: "{model} vibra menos o parece más lento"
      intent: info
      cta_cat: accesorios
      symptoms:
        - La vibración se siente más débil que antes
        - El modo de limpieza seleccionado no parece activo
        - El mango se calienta durante el uso
      causes:
        - Batería baja o degradada
        - Cabezal mal encajado que frena el motor
        - Humedad interna por exposición excesiva al agua
      checks:
        - Cargar completamente el cepillo (1-2 horas)
        - Retirar y volver a encajar el cabezal firmemente
        - Verificar que el cabezal no tiene obstrucción en el eje de vibración
      fix_hint: "Si tras una carga completa sigue con poca potencia, prueba sin cabezal para ver si el eje vibra con normalidad."

  airfryer_base:
    - key: cesta-deteriorada
      title: "{model}: cesta deteriorada o antiadherente dañado"
      intent: info
      cta_cat: cesta
      symptoms:
        - El recubrimiento antiadherente se pela o tiene arañazos
        - Los alimentos se pegan a la cesta
        - Hay manchas permanentes que no se eliminan
      causes:
        - Uso de utensilios metálicos que rayan el recubrimiento
        - Limpieza con estropajos abrasivos
        - Sobrepasar la temperatura máxima recomendada
      checks:
        - Revisar si el antiadherente está levantado o desprendido
        - Comprobar que no hay óxido en zonas sin recubrimiento
        - Verificar que la cesta encaja correctamente en el cajón
      fix_hint: "Una cesta con recubrimiento dañado debería sustituirse: los fragmentos pueden contaminar los alimentos."

    - key: no-calienta-freidora
      title: "{model} no alcanza temperatura o calienta poco"
      intent: info
      cta_cat: accesorios
      symptoms:
        - Los alimentos salen blandos aunque se programa mucho tiempo
        - La freidora no llega a la temperatura seleccionada
        - El tiempo de cocción es el doble del normal
      causes:
        - Resistencia eléctrica con depósitos de grasa acumulados
        - Ventilador interno con obstrucción
        - Termostato defectuoso
      checks:
        - Limpiar a fondo la resistencia con un paño húmedo (sin abrasivos)
        - Asegurarse de que el cajón y la cesta están bien colocados
        - Verificar que la ventilación exterior no está bloqueada
      fix_hint: "La acumulación de grasa en la resistencia es la causa más frecuente de pérdida de eficiencia. Limpia tras cada uso intensivo."

    - key: humo-olor-plastico
      title: "{model} hace humo o desprende olor a plástico"
      intent: info
      cta_cat: filtro
      symptoms:
        - Sale humo visible por las rejillas
        - Olor fuerte a plástico o quemado al encender
        - El humo activa el detector de humo de casa
      causes:
        - Grasa acumulada en la resistencia calefactora
        - Primer uso con recubrimiento de fábrica (normal al principio)
        - Filtro de carbono saturado
      checks:
        - Lavar bien la cesta y bandeja antes del primer uso
        - Limpiar la resistencia si hay restos de grasa visibles
        - Sustituir el filtro de carbono si lleva más de 3 meses
      fix_hint: "En el primer uso es normal un leve olor. Si persiste después de varios usos, limpia a fondo la resistencia o sustituye el filtro."

# =========================================================
# COMPATIBILITY PACKS
# =========================================================
compatibility_packs:
  cordless_base:
    - "Confirma el modelo exacto (variante Animal, Absolute, etc.) antes de comprar cualquier recambio."
    - "En baterías: verifica voltaje nominal, capacidad (Ah) y tipo de conector (click-in vs. tornillos)."
    - "En filtros: comprueba si es HEPA lavable o cartucho seco y las medidas exactas."
    - "En rodillos: elige entre soft roller (suelos duros) o multisuperficie (mixto) según tu caso."
    - "Compara fotos reales del recambio con tu pieza original antes de comprar."

  robot_base:
    - "Comprueba el número de modelo completo: pequeñas variantes pueden cambiar el sistema de fijación."
    - "En filtros HEPA: asegúrate de que el formato (rectangular, cilíndrico) coincide con tu unidad."
    - "En cepillos laterales: verifica número de brazos (2 o 3) y sentido de giro (L/R)."
    - "En mopas y almohadillas: comprueba el sistema de sujeción (velcro, clips, magnético)."
    - "Para docks y bases: algunos modelos tienen versiones con y sin autovaciado que no son compatibles entre sí."

  shaver_base:
    - "Comprueba la serie exacta (Series 3000, 5000, 7000...) antes de comprar láminas o cabezal."
    - "Las láminas y cuchillas varían según la serie del modelo (Series 3000, 5000, 7000): no son intercambiables entre series."
    - "Los cargadores Philips usan distintos conectores según la antigüedad del modelo (redondo 2 pines vs. USB-C)."
    - "Los accesorios OneBlade (QP/QG) no son compatibles con las afeitadoras de láminas de la misma marca."
    - "Verifica siempre el año de fabricación para cabezales: los modelos antiguos pueden tener anclaje diferente."

  cafetera_base:
    - "Comprueba el número de modelo completo (ECAM290.61, EP3221/40...) ya que pequeñas variantes cambian las piezas."
    - "Las juntas de cafetera tienen medidas precisas en milímetros: un milímetro de diferencia puede impedir el sellado."
    - "Los depósitos de agua suelen ser específicos por serie aunque visualmente parezcan iguales."
    - "Para cápsulas Nespresso, verifica si tu máquina es Original Line o Vertuo: sus cápsulas y piezas son distintas."
    - "Los descalcificadores son casi siempre universales, pero algunos fabricantes invalidan garantías si no usan el suyo."

  power_tool_base:
    - "Verifica el voltaje de la batería (10,8V / 12V / 18V / 20V): no son intercambiables aunque parezca que encajan."
    - "Makita usa sistemas de batería LXT (18V) y CXT (12V) incompatibles entre sí aunque la forma sea parecida."
    - "Bosch Professional y Bosch DIY (verde) tienen baterías distintas aunque sean del mismo voltaje."
    - "En accesorios de corte (discos, hojas), verifica el diámetro y el tamaño del agujero central."
    - "Los portabrocas tienen rosca específica: comprueba el paso de rosca antes de comprar uno compatible."

  scooter_base:
    - "Comprueba el modelo exacto y la versión de rueda: algunos patinetes cambian entre 8,5 y 10 pulgadas dentro de la misma familia."
    - "En baterías y cargadores, verifica voltaje nominal y tipo de conector antes de comprar."
    - "En frenos, distingue entre disco, tambor y freno electrónico: las piezas no son intercambiables."
    - "En neumáticos y cámaras, confirma medida, tipo de válvula y si tu rueda es tubeless o con cámara."
    - "Compara anclajes y tornillería en guardabarros y piezas de plegado: cambian mucho entre revisiones."

  toothbrush_base:
