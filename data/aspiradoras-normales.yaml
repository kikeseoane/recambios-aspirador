        - Saca el filtro pre-motor y lávalo bajo el grifo si es lavable; si no lo
          es, reemplázalo
        - Retira el filtro HEPA AirClean de la rejilla de salida y comprueba su estado;
          cámbialo si lleva más de 12 meses
        - 'Verifica que la bolsa esté correctamente encajada en su soporte: una bolsa
          mal colocada provoca fugas de aire'
        causes:
        - Bolsa AirClean llena o casi llena que limita el caudal de aire al motor
        - Filtro pre-motor colmatado por uso prolongado o por haber aspirado polvo
          muy fino
        - Filtro HEPA de escape saturado que impide la expulsión del aire limpio
        - Bolsa mal encajada en el soporte que deja una ranura de fuga de vacío
        cta:
          catKey: bolsa
          label: Ver bolsas AirClean compatibles
      - key: huele-mal
        title: 'Miele Complete C1 Classic: mal olor al aspirar'
        intent: info
        symptoms:
        - Olor a polvo o a cerrado que sale por la rejilla de escape
        - El olor es especialmente intenso al inicio de cada uso
        - El olor se nota incluso con bolsa nueva recién instalada
        checks:
        - Limpia el compartimento interior de la bolsa con un paño húmedo con vinagre
          diluido
        - 'Cambia el filtro HEPA si lleva más de un año: acumula bacterias invisibles
          que producen olor'
        - Si el olor persiste con bolsa y filtros nuevos, revisa el cepillo de suelo
          y elimina restos de pelo quemado
        causes:
        - Filtro HEPA muy usado que acumula partículas orgánicas y las libera con
          el calor del motor
        - Residuos húmedos aspirados que han generado moho dentro de la bolsa
        - Interior del cuerpo con polvo acumulado durante años que se calienta con
          el motor
        cta:
          catKey: filtro
          label: Ver filtros HEPA AirClean compatibles
      - key: se-apaga-sola
        title: Miele Complete C1 Classic se apaga sola
        intent: info
        symptoms:
        - La aspiradora se detiene a los pocos minutos de empezar a usar
        - Se apaga con un clic audible y no vuelve a arrancar hasta enfriarse
        - El problema ocurre con más frecuencia cuando se aspira a potencia máxima
        checks:
        - Espera 30 minutos con la aspiradora desenchufada antes de volver a encenderla
        - Cambia la bolsa y limpia todos los filtros antes de volver a probar
        - Comprueba que el cepillo y el tubo no tengan obstrucciones que fuercen el
          motor
        - Asegúrate de que las rejillas de ventilación del cuerpo no estén tapadas
        causes:
        - Protector térmico del motor que corta el circuito ante el riesgo de sobrecalentamiento
        - Filtros o bolsa obstruidos que reducen el caudal de refrigeración del motor
        - Uso prolongado a potencia máxima en ambientes con poca ventilación
        cta:
