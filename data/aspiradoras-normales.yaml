  dyson-asp:
    name: Dyson
    notes_brand: Marca británica de referencia en aspiradores ciclónicos sin bolsa
      de gama alta. Alta demanda en filtros HEPA lavables, cepillos de suelo y depósitos.
      Los modelos Ball y DC son los más buscados para el segmento de aspiradoras de
      trineo sin cable.
    models:
    - model: Dyson Ball Animal 2
      slug: dyson-ball-animal-2
      year_range: 2016-2024
      sku_pack: vacuumcyclone10
      model_tokens:
      - ball animal 2
      - dyson ball animal 2
      intro: El Dyson Ball Animal 2 es el aspirador de trineo con cable más potente
        de Dyson, diseñado específicamente para hogares con mascotas. Su tecnología
        de bola articulada facilita el giro alrededor de muebles y su turbine tool
        elimina el pelo de mascota de alfombras y tapicerías con gran eficacia. El
        filtro HEPA lavable retiene los alérgenos y el depósito higiénico se vacía
        con un solo botón.
      comprar_nuevo:
        query: dyson ball animal 2 vacuum cleaner
        label: Ver Dyson Ball Animal 2 nuevo
      problemas:
      - key: pierde-succion
        title: Dyson Ball Animal 2 pierde succión
        intent: info
        symptoms:
        - La aspiradora no recoge pelo de mascota de alfombras con la misma eficacia
        - El depósito se llena más rápido de lo habitual aunque el suelo no esté muy
          sucio
        - Se nota que el cono del ciclón tiene polvo fino pegado en las paredes interiores
        checks:
        - Vacía el depósito y límpialo con un paño húmedo, prestando especial atención
          a la zona del ciclón
        - Retira y lava el filtro HEPA bajo agua fría; déjalo secar al menos 24 horas
          antes de reinstalar
        - Comprueba que la junta de silicona del depósito esté íntegra y bien colocada
        - Inspecciona el tubo y los accesorios buscando obstrucciones de pelo o cuerpos
          extraños
        causes:
        - Filtro HEPA lavable saturado que no se ha limpiado con la frecuencia recomendada
        - Polvo fino compactado en el cono del ciclón que reduce la eficiencia de
          la separación
        - Junta del depósito deteriorada que provoca micro-fugas de vacío
        - Acumulación de pelo de mascota en el codo del tubo o en la entrada de los
          accesorios
        cta:
          catKey: filtro
          label: Ver filtros HEPA compatibles
      - key: filtros-atascados
        title: 'Dyson Ball Animal 2: filtros sucios o atascados'
        intent: info
        symptoms:
        - El filtro HEPA está completamente negro aunque se haya lavado recientemente
        - Después de lavar y secar el filtro, la succión no mejora
        - Noto que el motor trabaja más fuerte con el filtro instalado que sin él
        checks:
        - Lava el filtro bajo agua fría (sin jabón) hasta que el agua salga transparente
        - Asegúrate de que el filtro haya secado al menos 24 horas en posición vertical;
          un filtro húmedo atasca más
        - Si el filtro lleva más de 12 meses o más de 50 lavados, reemplázalo aunque
          parezca limpio
        - Comprueba que estés usando el filtro correcto para el modelo Ball Animal
          2 (no el de otros modelos Dyson)
        causes:
        - Filtro lavado con frecuencia insuficiente que acumula polvo muy fino imposible
          de eliminar con agua
        - Filtro reinstalado húmedo que ha generado moho obstruyendo los poros del
          material filtrante
        - Filtro genérico de baja calidad que no encaja correctamente y deja pasar
          polvo al motor
        cta:
          catKey: filtro
          label: Ver filtros HEPA compatibles
      - key: deposito-no-cierra
        title: 'Dyson Ball Animal 2: el depósito no cierra o pierde polvo'
        intent: info
        symptoms:
        - El depósito no encaja con firmeza en el cuerpo de la aspiradora
        - Sale polvo por la unión entre el depósito y el cuerpo durante el uso
        - El botón de vaciado del depósito no hace clic o se queda atascado
        checks:
        - 'Limpia el borde del depósito y la ranura de encaje con un paño húmedo:
          el polvo fino impide el sellado'
        - Inspecciona la junta de goma del cierre del depósito buscando grietas o
          deformaciones
        - Comprueba que el mecanismo del botón de vaciado no tenga ningún cuerpo extraño
          bloqueándolo
        causes:
        - Junta de goma del depósito envejecida o dañada por el uso o por caídas
        - Residuos de polvo compactado en el rebaje de cierre que impide el sellado
          completo
        - Mecanismo del botón de vaciado roto por un golpe o por abrir el depósito
          de forma brusca
        cta:
          catKey: deposito
          label: Ver depósitos y juntas compatibles
