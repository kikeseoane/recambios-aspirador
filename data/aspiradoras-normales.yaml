  guias_genericas:
    seguridad:
    - Desconecta el aspirador antes de manipular filtros, rodillos o batería.
    - 'No laves filtros no lavables: revisa el tipo (HEPA lavable vs. cartucho seco).'
    - 'Evita baterías no compatibles con el modelo/serie: riesgo de sobrecalentamiento
      y fallos de carga.'
    - 'Si hay olor a quemado, chispas o cortes repetidos: detén el uso y revisa obstrucciones
      y cableado.'
    mantenimiento:
    - 'Limpia el depósito y conductos: la obstrucción es la causa nº1 de pérdida de
      succión.'
    - 'Lava y seca filtros lavables (24h): la humedad genera malos olores y reduce
      el caudal.'
    - Retira pelo/hilos del rodillo cada 1-2 semanas si hay mascotas o alfombras.
    - 'Revisa juntas y sellos: una fuga de aire baja el rendimiento incluso con motor
      correcto.'
    compra:
    - Prioriza recambios con encaje y conectores equivalentes (voltaje nominal y tipo
      de anclaje).
    - 'En filtros, elige el grado adecuado: HEPA para alergias; estándar para uso
      general.'
    - 'En rodillos, elige según suelo: soft roller para duro; multisuperficie para
      mixto.'
    - Si tu aspirador es robot, compra packs (filtros + cepillos laterales + mopas)
      para abaratar mantenimiento.
brands:
  rowenta-asp:
    name: Rowenta
    notes_brand: Marca francesa de referencia en aspiradoras de trineo con bolsa.
      Alta demanda en bolsas tipo Rohs, filtros HEPA y cepillos de suelo. Los modelos
      Silence Force son los más buscados por su bajo nivel de ruido.
    models:
    - model: Rowenta Silence Force RO7690
      slug: rowenta-silence-force-ro7690
      year_range: 2018-2024
      sku_pack: vacuumbag10
      model_tokens:
      - ro7690
      - silence force ro7690
      intro: El Rowenta Silence Force RO7690 es uno de los aspiradores de trineo más
        silenciosos del mercado, con motor de 3000 W y bolsas tipo Rohs / ZR200520
        de alta filtración. Su tecnología ProSilence garantiza menos de 68 dB en uso,
        ideal para hogares con bebés o mascotas. El filtro HEPA lavable retiene el
        99,97 % de las partículas finas, lo que lo convierte en una opción excelente
        para personas con alergias.
      comprar_nuevo:
        query: rowenta silence force RO7690 vacuum cleaner
        label: Ver Rowenta Silence Force RO7690 nuevo
      problemas:
      - key: pierde-succion
        title: Rowenta Silence Force RO7690 pierde succión
        intent: info
        symptoms:
        - La aspiradora no recoge el polvo con la misma eficacia que antes
        - Hay que pasar el cepillo varias veces por el mismo sitio para recoger la
          suciedad
        - El sonido del motor se vuelve más agudo o inusualmente silencioso
        - El indicador de potencia baja solo aunque la aspiradora esté en modo máximo
        checks:
        - 'Comprueba el indicador de bolsa en el cuerpo: si está en rojo, cambia la
          bolsa aunque no parezca llena'
        - Retira y sacude suavemente el filtro pre-motor; si está gris oscuro, cámbialo
        - Lava el filtro HEPA bajo agua fría y déjalo secar al menos 24 horas antes
          de reinstalarlo
        - Inspecciona el tubo telescópico y el manguito flexible buscando grietas
          o fugas de aire
        - Comprueba que el cepillo de suelo gire con libertad y no tenga pelos ni
          hilos enredados
        causes:
        - Bolsa Rohs llena o compactada que corta el flujo de aire aunque no esté
          visiblemente inflada
        - Filtro pre-motor saturado de polvo fino que actúa como tapón
        - Filtro HEPA colmatado que restringe la salida de aire y reduce la depresión
        - Obstrucción parcial en el codo del tubo o en la entrada del cepillo de suelo
        cta:
          catKey: bolsa
          label: Ver bolsas compatibles Rohs
      - key: huele-mal
        title: Rowenta Silence Force RO7690 desprende mal olor al aspirar
        intent: info
        symptoms:
        - Sale un olor a polvo quemado o rancio cada vez que se enciende la aspiradora
        - El olor aumenta cuando se pasa por alfombras o zonas con pelo de mascota
        - El olor persiste aunque se haya vaciado la bolsa recientemente
        checks:
        - Retira la bolsa y examina si hay humedad, moho o restos orgánicos en su
          interior
        - Limpia el compartimento de la bolsa con un paño húmedo con unas gotas de
          vinagre blanco
        - 'Revisa el filtro HEPA: un filtro muy antiguo acumula bacterias y emite
          mal olor'
        - Comprueba que el cepillo de suelo no tenga pelo quemado enredado en el rodillo
        causes:
        - Bolsa usada con restos húmedos que han generado hongos o bacterias en su
          interior
        - Filtros saturados que retienen partículas orgánicas y desprenden olor al
          calentar el motor
        - Residuos acumulados en el interior del cuerpo de la aspiradora, especialmente
          en zonas de codo
        - Pelo de mascota quemado por fricción en el cepillo de suelo motorizado
        cta:
          catKey: filtro
          label: Ver filtros compatibles
      - key: se-apaga-sola
        title: Rowenta Silence Force RO7690 se apaga sola durante el uso
        intent: info
        symptoms:
        - La aspiradora se detiene de forma repentina a los pocos minutos de encenderla
        - Se apaga y no vuelve a arrancar hasta que ha pasado un tiempo
        - El motor arranca pero se corta antes de alcanzar la potencia máxima
        checks:
        - 'Deja la aspiradora apagada y sin usar al menos 30 minutos: el termostato
          necesita enfriarse'
        - Verifica que todos los filtros estén instalados correctamente y que la bolsa
          no esté llena
        - Comprueba que el cepillo de suelo y el tubo no tengan ninguna obstrucción
        - Asegúrate de que las rejillas de ventilación del cuerpo no estén tapadas
          por polvo o suciedad
        causes:
        - Termostato de seguridad activado por sobrecalentamiento del motor
        - Filtros obstruidos que impiden la refrigeración del motor por falta de flujo
          de aire
        - Bolsa llena que provoca un aumento de temperatura por sobreesfuerzo del
          motor
        - Rejillas de ventilación tapadas que impiden la disipación del calor
        cta:
          catKey: filtro
          label: Ver filtros compatibles
