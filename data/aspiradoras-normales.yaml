        reconocido por su excepcional durabilidad y su sistema de filtración AirClean
        con bolsas Tipo G/N. Su motor de 1200 W y la turboboquilla STB 35-2 lo hacen
        muy eficaz en alfombras y suelos duros. Es una de las aspiradoras más vendidas
        en España en su segmento de precio por la relación calidad-precio y la disponibilidad
        de recambios oficiales.
      comprar_nuevo:
