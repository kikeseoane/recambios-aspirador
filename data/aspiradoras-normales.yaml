    - model: Rowenta RO6834
      slug: rowenta-ro6834
      year_range: 2017-2023
      sku_pack: vacuumcyclone10
      model_tokens:
      - ro6834
      - rowenta ro6834
      intro: El Rowenta RO6834 es un aspirador de trineo ciclónico sin bolsa de la
        serie Silence Force, con tecnología multicíclón que separa el polvo en seco
        sin necesidad de bolsa. Su depósito de 1,5 litros es fácil de vaciar y su
        filtro lavable reduce el coste de mantenimiento. Resulta especialmente práctico
        para hogares con mascotas gracias al cepillo turbo incluido.
      comprar_nuevo:
        query: rowenta RO6834 cyclone bagless vacuum cleaner
        label: Ver Rowenta RO6834 nuevo
      problemas:
      - key: pierde-succion
        title: Rowenta RO6834 pierde succión
        intent: info
        symptoms:
        - La aspiradora recoge menos suciedad de lo habitual aunque el depósito esté
          vacío
        - Noto que el aire de salida tiene menos fuerza
        - El motor suena más forzado que de costumbre
        checks:
        - Vacía y lava el depósito con agua tibia; comprueba que esté completamente
          seco antes de reinstalar
        - Retira el filtro lavable y lávalo bajo el grifo con agua fría; déjalo secar
          24 horas
        - Comprueba que la junta del ciclón esté bien colocada y no esté deteriorada
        - Inspecciona el tubo y el cepillo buscando obstrucciones o cuerpos extraños
        causes:
        - Filtro lavable saturado que no se ha limpiado con la frecuencia recomendada
        - Depósito con polvo fino compactado en las paredes del ciclón que reduce
          el giro
        - Junta del ciclón desgastada que provoca micro-fugas de vacío
        - Obstrucción parcial en el tubo o en el cepillo de suelo
