      intro: 'El Rowenta Compact Power RO3731 es la propuesta de gama media de Rowenta:
        compacto, ligero y con bolsa tipo Rohs de gran capacidad. Con un motor de
        750 W y hasta 78 dB, ofrece un buen equilibrio entre potencia y precio para
        pisos de tamaño mediano. Su diseño ergonómico con asa de transporte lo hace
        especialmente cómodo de guardar y llevar de una habitación a otra.'
      comprar_nuevo:
        query: rowenta compact power RO3731 vacuum cleaner
        label: Ver Rowenta Compact Power RO3731 nuevo
      problemas:
      - key: pierde-succion
        title: Rowenta Compact Power RO3731 pierde succión
        intent: info
        symptoms:
        - La aspiradora no recoge la suciedad superficial del suelo
        - El tubo flexible vibra de forma inusual, señal de pérdida de presión
        - La bolsa no parece llena pero el rendimiento es muy bajo
        checks:
        - 'Cambia la bolsa: incluso al 50 % de capacidad puede reducir la succión
          notablemente'
        - Retira el filtro pre-motor y límpialo dando golpecitos suaves; si está muy
          oscuro, cámbialo
        - Inspecciona el tubo rígido y el manguito buscando roturas o conexiones flojas
        - Revisa que el cepillo de suelo no tenga el conducto de entrada bloqueado
        causes:
        - Bolsa saturada que no permite la circulación de aire aunque no esté visiblemente
          llena
        - Filtro pre-motor colmatado por uso prolongado sin reemplazarlo
        - Grieta en el tubo o en el codo del manguito que provoca fuga de vacío
        cta:
          catKey: bolsa
          label: Ver bolsas compatibles Rohs
      - key: no-recoge-bien-alfombra
        title: Rowenta Compact Power RO3731 no recoge bien en alfombra
        intent: info
        symptoms:
        - El cepillo de suelo se arrastra con dificultad por la moqueta
        - Quedan restos visibles de pelo y pelusa después de pasar la aspiradora
        - El cepillo avanza pero no levanta el polvo incrustado en las fibras
        checks:
        - Comprueba que el regulador de altura del cepillo esté en la posición correcta
          para alfombra
        - Retira el cepillo y elimina los pelos y fibras enredados en las cerdas con
          unas tijeras
        - Verifica que las cerdas del cepillo no estén aplastadas o desgastadas
        - Aumenta la potencia de aspiración al máximo antes de pasar por alfombra
        causes:
        - Cepillo de suelo con cerdas desgastadas que ya no crean el efecto de agitación
          necesario
        - Pelo y fibras enredadas en el eje del cepillo que frenan su movimiento
        - Potencia de succión insuficiente por filtros o bolsa parcialmente saturados
        cta:
          catKey: cepillo
          label: Ver cepillos de suelo compatibles
      - key: huele-mal
        title: Rowenta Compact Power RO3731 huele mal al usarla
        intent: info
        symptoms:
        - Olor a polvo o a quemado al encender la aspiradora
        - El olor es más intenso cuando se aspiran alfombras o zonas con pelo de animal
        - El olor persiste aunque la bolsa sea nueva
        checks:
        - Limpia el interior del compartimento de la bolsa con un paño seco
        - Reemplaza el filtro pre-motor si lleva más de 6 meses en uso
        - Revisa el cepillo de suelo y elimina cualquier resto de pelo quemado por
          fricción
        causes:
        - Filtro pre-motor saturado que acumula bacterias y desprende olor al calentarse
        - Restos orgánicos dentro del cuerpo de la aspiradora que se calientan con
          el motor
        - Pelo de mascota quemado por fricción en el cepillo de suelo
        cta:
          catKey: filtro
          label: Ver filtros compatibles
