        label: Ver Miele Complete C1 Classic nuevo
      problemas:
      - key: pierde-succion
        title: Miele Complete C1 Classic pierde succión
        intent: info
        symptoms:
        - El indicador de cambio de bolsa se ilumina aunque la bolsa parezca semivacía
        - La aspiradora no levanta la suciedad de alfombras de pelo largo
        - El ruido del motor ha cambiado a un tono más alto y esforzado
        checks:
