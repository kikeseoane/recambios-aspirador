        - Revisa si el rodillo tiene daños visibles en los extremos del eje que impidan
          la rotación
        causes:
        - Acumulación de pelo y fibras en el eje del rodillo que bloquea físicamente
          la rotación
        - Rodillo desgastado con cerdas aplastadas que aumentan la fricción hasta
          detenerlo
        - Contacto eléctrico entre el tubo y la electrobrush defectuoso que interrumpe
