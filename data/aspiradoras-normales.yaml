  philips-asp:
    name: Philips
    notes_brand: Marca holandesa con amplia presencia en el mercado español de aspiradoras
      de trineo. Usa bolsas s-bag en prácticamente todos sus modelos de gama media
      y alta. Alta demanda en bolsas s-bag, filtros de escape y cepillos triactivos.
    models:
    - model: Philips PowerPro FC8761
      slug: philips-powerpro-fc8761
      year_range: 2016-2022
      sku_pack: vacuumbag10
      model_tokens:
      - fc8761
      - powerpro fc8761
      intro: El Philips PowerPro FC8761 es el aspirador de gama alta de la serie PowerPro
        Compact, con motor de 650 W de potencia absorbida, bolsas s-bag de alta filtración
        y filtro EPA de salida. Su cepillo TriActive+ con tres tipos de acción de
        limpieza lo hace especialmente eficaz en suelos duros con grietas y juntas.
        Pesa apenas 5 kg y su diseño compacto facilita el almacenamiento en espacios
        reducidos.
      comprar_nuevo:
        query: philips powerpro FC8761 vacuum cleaner
        label: Ver Philips PowerPro FC8761 nuevo
      problemas:
      - key: pierde-succion
        title: Philips PowerPro FC8761 pierde succión
        intent: info
        symptoms:
        - El aspirador no recoge la suciedad visible en el suelo
        - El indicador de bolsa llena se ilumina aunque la bolsa sea reciente
        - La potencia de succión fluctúa durante el uso
        checks:
        - 'Cambia la bolsa s-bag: estas bolsas reducen notablemente la succión al
          superar el 70 % de capacidad'
        - Retira el filtro de motor y límpialo o cámbialo si lleva más de 6 meses
        - Saca el filtro de salida EPA y comprueba su estado; si está grisáceo, cámbialo
        - Revisa que el cepillo TriActive no tenga la entrada de aire bloqueada por
          acumulación de suciedad
        causes:
        - Bolsa s-bag llena o con polvo muy fino compactado que impide el flujo de
          aire
        - Filtro de motor sucio que actúa como barrera al paso del aire de refrigeración
        - Filtro EPA de salida obstruido que no permite expulsar el aire limpio
        cta:
          catKey: bolsa
          label: Ver bolsas s-bag compatibles
      - key: cepillo-triactive-no-funciona
        title: 'Philips PowerPro FC8761: el cepillo TriActive+ no limpia bien'
        intent: info
        symptoms:
        - El cepillo se arrastra por las juntas del suelo sin limpiarlas
        - Las tiras de limpieza laterales del cepillo están deformadas o rotas
        - Quedan restos de polvo en las esquinas aunque se pase el cepillo varias
          veces
        checks:
        - 'Inspecciona las láminas de limpieza laterales del cepillo TriActive: deben
          ser flexibles y estar íntegras'
        - Limpia la placa inferior del cepillo con un paño húmedo para retirar el
          polvo compactado
        - Comprueba que las ruedas del cepillo giren libremente sin fricción
        causes:
        - Láminas de limpieza del cepillo TriActive desgastadas que ya no hacen contacto
          con las juntas
