  bosch-lav:
    name: Bosch
    notes_brand: Referencia de calidad alemana en el segmento medio-alto español.
      Las series 6, 8 y la tecnología i-DOS son muy populares. Alta durabilidad general,
      pero rodamientos y resistencias son los recambios más demandados.
    models:
    - model: Bosch WAU28PHSPE
      slug: bosch-wau28phspe
      year_range: 2020-2024
      sku_pack: washing10
      model_tokens:
      - wau28phspe
      - wau28ph
      intro: La Bosch WAU28PHSPE pertenece a la Serie 8 de Bosch y destaca por el
        sistema i-DOS, que dosifica automáticamente la cantidad exacta de detergente
        líquido, evitando el exceso de espuma y alargando la vida de las piezas de
        goma. Su motor EcoSilence Drive es extremadamente silencioso y tiene garantía
        de 10 años, lo que la convierte en una de las lavadoras más silenciosas y
        duraderas del mercado español.
      comprar_nuevo:
        query: bosch wau28phspe serie 8 lavadora
        label: Ver Bosch WAU28PHSPE nueva
      problemas:
      - key: no-desagua
        title: Bosch WAU28PHSPE no desagua
        intent: info
        symptoms:
        - El programa se para mostrando el código F21 o E18 y el tambor queda con
          agua
        - La ropa sale sin centrifugar y completamente empapada
        - Se escucha la bomba trabajar durante varios minutos sin que el agua salga
        - El ciclo intenta drenar repetidamente antes de mostrar el error
        checks:
        - Abre el panel inferior y localiza el tapón del filtro de la bomba; protege
          el suelo con toallas antes de abrir
        - Retira y limpia el filtro eliminando cualquier objeto sólido; en este modelo
          suelen acumularse residuos del dosificador i-DOS
        - Con el filtro retirado, comprueba que el impulsor de la bomba gire libremente
          sin resistencia
        - Verifica que la manguera de desagüe no tenga altura de descarga superior
          a 100 cm ni esté sumergida en el sifón
        causes:
        - 'Filtro de bomba obstruido: causa más habitual, solucionable sin herramientas'
        - Bomba de desagüe averiada con impulsor bloqueado o bobina quemada
        - Manguera de desagüe mal instalada que crea una trampa de agua
        - Residuos del sistema i-DOS acumulados en el filtro si no se limpia periódicamente
        cta:
          catKey: bomba
          label: Ver bombas de desagüe compatibles
      - key: vibra-mucho
        title: Bosch WAU28PHSPE vibra y hace ruido al centrifugar
        intent: info
        symptoms:
        - Un ruido de rodamiento grave y continuo durante el centrifugado que se escucha
          en toda la casa
        - La lavadora se desplaza sobre el suelo pese a estar bien nivelada
        - El ruido ha ido empeorando progresivamente en los últimos meses
        - Al mover el tambor manualmente se nota un juego lateral excesivo
        checks:
        - Comprueba la nivelación con las patas regulables; la Serie 8 de Bosch es
          especialmente sensible al desnivel
        - 'Abre la puerta y empuja el tambor hacia los lados y hacia arriba: más de
          1 cm de juego indica rodamientos en mal estado'
        - 'Escucha si el ruido aparece desde los primeros minutos del centrifugado
          o solo a alta velocidad: los rodamientos generan ruido ya desde bajas rpm'
        - Revisa si hay objetos (monedas, botones) entre el tambor y la cuba golpeando
          en cada vuelta
        causes:
        - 'Rodamientos del tambor desgastados: es el fallo más común en lavadoras
          Bosch con más de 5 años de uso intensivo'
        - Amortiguadores que han perdido su capacidad de amortiguación
        - Objeto sólido atrapado entre el tambor y la cuba que produce un golpe rítmico
        - Desnivel del suelo o de las patas que amplifica las vibraciones naturales
          del centrifugado
        cta:
          catKey: rodamiento
          label: Ver rodamientos compatibles
      - key: no-calienta
        title: Bosch WAU28PHSPE no calienta el agua
        intent: info
        symptoms:
        - Los programas con temperatura (40 °C, 60 °C, 90 °C) no eliminan manchas
          de grasa ni bacterias
        - Tocando la puerta tras 15-20 minutos de programa caliente, el cristal permanece
          frío
        - El display muestra código de error E09 o similar relacionado con el calentamiento
        - El tiempo total del programa es idéntico independientemente de la temperatura
          seleccionada
        checks:
        - 'Mide la resistencia calefactora con el multímetro en modo ohmios: valor
          esperado entre 20-30 Ω; infinito confirma que está fundida'
        - 'Verifica el sensor NTC: su resistencia varía con la temperatura del agua;
          un valor fijo o fuera de rango indica fallo'
        - Comprueba que no haya exceso de cal en la resistencia (depósito blanquecino)
          que reduzca su eficiencia hasta fundirla
        - Revisa el termostato de seguridad (klixon) que puede haberse disparado por
          sobrecalentamiento
        causes:
        - Resistencia calefactora fundida por cal acumulada o por un pico de tensión
          eléctrica
        - Sensor NTC defectuoso que reporta temperatura incorrecta y detiene el calentamiento
          prematuramente
        - Termostato de seguridad disparado en modo permanente que corta el circuito
          de calefacción
        - Fallo en la placa electrónica que no activa el relé de la resistencia
        cta:
          catKey: resistencia
          label: Ver resistencias calefactoras compatibles
