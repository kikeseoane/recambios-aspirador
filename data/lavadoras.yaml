  guias_genericas:
    seguridad:
    - Desconecta el aspirador antes de manipular filtros, rodillos o batería.
    - 'No laves filtros no lavables: revisa el tipo (HEPA lavable vs. cartucho seco).'
    - 'Evita baterías no compatibles con el modelo/serie: riesgo de sobrecalentamiento
      y fallos de carga.'
    - 'Si hay olor a quemado, chispas o cortes repetidos: detén el uso y revisa obstrucciones
      y cableado.'
    mantenimiento:
    - 'Limpia el depósito y conductos: la obstrucción es la causa nº1 de pérdida de
      succión.'
    - 'Lava y seca filtros lavables (24h): la humedad genera malos olores y reduce
      el caudal.'
    - Retira pelo/hilos del rodillo cada 1-2 semanas si hay mascotas o alfombras.
    - 'Revisa juntas y sellos: una fuga de aire baja el rendimiento incluso con motor
      correcto.'
    compra:
    - Prioriza recambios con encaje y conectores equivalentes (voltaje nominal y tipo
      de anclaje).
    - 'En filtros, elige el grado adecuado: HEPA para alergias; estándar para uso
      general.'
    - 'En rodillos, elige según suelo: soft roller para duro; multisuperficie para
      mixto.'
    - Si tu aspirador es robot, compra packs (filtros + cepillos laterales + mopas)
      para abaratar mantenimiento.
brands:
  samsung-lav:
    name: Samsung
    notes_brand: Líder en gama alta en España. Destacan los modelos AddWash con escotilla
      frontal y la tecnología EcoBubble. Alta demanda de juntas de puerta, bombas
      de desagüe y correas.
    models:
    - model: Samsung WW90T684DLH
      slug: samsung-ww90t684dlh
      year_range: 2020-2024
      sku_pack: washing10
      model_tokens:
      - ww90t684
      - ww90t684dlh
      intro: La Samsung WW90T684DLH es una lavadora de 9 kg con escotilla AddWash
        y tecnología EcoBubble que convierte el detergente en espuma fría antes de
        lavar, protegiendo la ropa. Su motor Digital Inverter tiene garantía de 10
        años y consume muy poco, lo que la convierte en una de las lavadoras más fiables
        de la gama media-alta de Samsung en España.
      comprar_nuevo:
        query: samsung ww90t684 washing machine
        label: Ver Samsung WW90T684DLH nueva
      problemas:
      - key: pierde-agua-puerta
        title: Samsung WW90T684DLH pierde agua por la puerta
        intent: info
        symptoms:
        - Aparece un charco de agua bajo la puerta al final del programa
        - Se nota humedad o restos de detergente en el cerco de goma de la escotilla
        - La junta de puerta presenta grietas visibles, manchas negras de moho o deformaciones
        - El agua gotea también durante el lavado, no solo al vaciar
        checks:
        - Abre la puerta y dobla el fuelle hacia afuera para inspeccionar toda la
          superficie en busca de cortes o agujeros
        - Comprueba si hay objetos pequeños (monedas, grapas) atrapados en los pliegues
          del fuelle que puedan haberlo perforado
        - Limpia el fuelle con un trapo húmedo y vinagre blanco para eliminar cal
          acumulada que endurece y agrieta la goma
        - 'Verifica que la puerta cierre con firmeza: si hay holgura, el problema
          puede estar en el cierre y no en la junta'
        causes:
        - 'Junta de puerta deteriorada por el uso continuado: la goma pierde elasticidad
          y aparecen grietas'
        - Acumulación de cal que endurece el fuelle hasta quebrarlo, especialmente
          en zonas de agua dura
        - Objeto extraño (moneda, piedra) atrapado en el fuelle que ha provocado un
          corte
        - Mala postura de la ropa muy voluminosa que fuerza la junta al cerrar la
          puerta
        cta:
          catKey: junta
          label: Ver juntas de puerta compatibles
      - key: no-desagua
        title: Samsung WW90T684DLH no desagua o se queda con agua
        intent: info
        symptoms:
        - El programa se detiene a mitad y el tambor queda lleno o medio lleno de
          agua
        - Aparece el código de error 5E, SE o nE en el display
        - El ciclo dura mucho más de lo normal y no avanza al centrifugado
        - Se escucha el motor de la bomba intentando trabajar pero sin expulsar agua
        checks:
        - Localiza el tapón del filtro en la parte inferior frontal de la lavadora
          y protege el suelo con una toalla antes de abrirlo
        - 'Retira y limpia el filtro de la bomba: es muy frecuente que monedas, botones
          o pelusas lo obstruyan completamente'
        - Comprueba que la manguera de desagüe no esté doblada, aplastada ni tenga
          el extremo sumergido más de 15 cm en el sifón
        - Con el filtro quitado, gira el impulsor de la bomba con el dedo; si está
          atascado o no gira, la bomba puede estar averiada
        causes:
        - 'Filtro de bomba obstruido por objetos sólidos: es la causa más frecuente
          y la más fácil de reparar'
        - Bomba de desagüe averiada cuyo motor se ha quemado o el impulsor está bloqueado
        - Manguera de desagüe mal colocada o con un pliegue que impide el flujo de
          agua
        - Fallo en la tarjeta electrónica que no activa la bomba en el momento correcto
        cta:
          catKey: bomba
          label: Ver bombas de desagüe compatibles
      - key: vibra-mucho
        title: Samsung WW90T684DLH vibra mucho y hace ruido al centrifugar
        intent: info
        symptoms:
        - La lavadora golpea o se desplaza durante el centrifugado
        - 'Se escucha un ruido de rodamiento: grave y continuo que aumenta con las
          rpm'
        - El tambor tiene un ligero movimiento de vaivén al moverlo manualmente con
          la puerta abierta
        - Las vibraciones han aumentado progresivamente con los meses
        checks:
        - Comprueba que las cuatro patas estén bien apoyadas en el suelo y ajusta
          las regulables hasta eliminar cualquier bamboleo
        - Verifica que los tornillos de transporte (los que bloquean el tambor para
          el envío) hayan sido retirados
        - 'Abre la puerta y mueve el tambor hacia arriba, abajo y los lados: un juego
          excesivo indica rodamientos gastados'
        - Revisa que los amortiguadores delanteros no estén rotos ni desenganchados
          inspeccionando por el panel inferior
        causes:
        - 'Rodamientos del tambor desgastados: es la causa más habitual de ruido grave
          y creciente al centrifugar'
        - Amortiguadores deteriorados que ya no absorben las vibraciones del tambor
          en alta velocidad
        - 'Carga desequilibrada puntual: una sola prenda voluminosa puede provocar
          golpes fuertes en un ciclo concreto'
        - Tornillos de transporte no retirados en instalaciones recientes, que bloquean
          el movimiento del tambor
        cta:
          catKey: rodamiento
          label: Ver rodamientos compatibles
