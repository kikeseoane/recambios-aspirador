    - model: Samsung WW70T4040EE
      slug: samsung-ww70t4040ee
      year_range: 2020-2023
      sku_pack: washing10
      model_tokens:
      - ww70t4040
      - ww70t4040ee
      intro: La Samsung WW70T4040EE es una lavadora de 7 kg de la gama esencial de
        Samsung, con motor Digital Inverter y clasificación energética D. Es una de
        las lavadoras Samsung más vendidas en España por su relación calidad-precio,
        con un precio de entrada y la fiabilidad que caracteriza a la marca en motores
        y electrónica.
      comprar_nuevo:
        query: samsung ww70t4040 lavadora 7kg
        label: Ver Samsung WW70T4040EE nueva
      problemas:
      - key: no-centrifuga
        title: Samsung WW70T4040EE no centrifuga
        intent: info
        symptoms:
        - El programa termina pero la ropa sale empapada, como si solo hubiera escurrido
        - El tambor gira lentamente en el lavado pero no alcanza las rpm altas del
          centrifugado
        - Aparece el código de error dC o UE en la pantalla antes de que empiece el
          centrifugado
        - Se escucha el motor intentar arrancar a alta velocidad pero reduciendo enseguida
        checks:
        - 'Redistribuye la ropa dentro del tambor: una carga muy desequilibrada activa
          el sensor de seguridad y cancela el centrifugado'
        - Comprueba si el tambor gira libremente a mano con la puerta abierta; si
          ofrece resistencia, revisa si hay ropa atrapada entre el tambor y la cuba
        - Accede al panel trasero y verifica visualmente que la correa de transmisión
          esté en su sitio y no presente grietas ni desgaste excesivo
        - 'Revisa las escobillas de carbón del motor si el modelo las lleva: las escobillas
          cortas dejan de hacer contacto y el motor no arranca a plena potencia'
        causes:
        - Correa de transmisión rota o deslizante que impide que el motor mueva el
          tambor a alta velocidad
        - Escobillas de carbón del motor desgastadas que reducen la potencia hasta
          impedir el centrifugado
        - Carga desequilibrada que activa el sistema de protección del tambor
        - Fallo en el módulo de control que no envía la señal correcta para aumentar
          las rpm
        cta:
          catKey: correa
          label: Ver correas compatibles
      - key: no-calienta
        title: Samsung WW70T4040EE no calienta el agua
        intent: info
        symptoms:
        - La ropa sale sin el nivel de limpieza esperado en programas de 60 °C o 90
          °C
        - El agua en el tambor se nota fría al tacto al abrir la puerta a mitad de
          programa
        - El programa de 60 °C dura exactamente lo mismo que el de 30 °C, sin tiempo
          adicional de calentamiento
        - Aparece el código de error HE1 o E7 en el display
        checks:
        - 'Realiza un programa de 60 °C y comprueba con la mano la temperatura de
          la puerta tras 15 minutos: debería estar caliente al tacto'
        - 'Comprueba la resistencia calefactora con un multímetro en modo ohmios:
          un valor de infinito (circuito abierto) confirma que está fundida'
        - 'Mide la resistencia del termostato: debe estar en rango; si marca cero
          o infinito está defectuoso'
        - Verifica el sensor NTC de temperatura con el multímetro; su resistencia
          varía con la temperatura y un valor fijo indica fallo
        causes:
        - 'Resistencia calefactora fundida: es el fallo más habitual y directo cuando
          la lavadora no calienta'
        - Termostato de seguridad disparado o defectuoso que corta el circuito de
          calefacción
        - Sensor NTC de temperatura averiado que informa de una temperatura incorrecta
          y detiene el calentamiento
        - Fallo en la tarjeta de control que no activa el relé de la resistencia
        cta:
          catKey: resistencia
          label: Ver resistencias calefactoras compatibles
      - key: pierde-agua-puerta
        title: Samsung WW70T4040EE pierde agua por la puerta
        intent: info
        symptoms:
        - Charcos de agua bajo la puerta al acabar el programa o durante el lavado
        - La junta de goma huele a moho o tiene manchas negras persistentes
        - Se notan grietas o endurecimiento en algún punto del fuelle de la puerta
        - El agua sale específicamente por la parte inferior de la junta cuando el
          tambor está lleno
        checks:
        - Inspecciona todo el perímetro del fuelle doblándolo hacia afuera para ver
          la cara trasera
        - Busca objetos extraños (monedas, botones, grapas) que puedan haber perforado
          el fuelle desde dentro
        - Comprueba que el aro de sujeción del fuelle (muelle o brida) esté bien asentado
          y no haya cedido
        - Limpia el fuelle con una solución de vinagre blanco al 50% para disolver
          la cal que puede haber endurecido y agrietado la goma
        causes:
        - Junta de puerta dañada físicamente por un objeto atrapado entre el tambor
          y el fuelle
        - Deterioro por cal y detergente que endurece la goma hasta provocar grietas
          por donde escapa el agua
        - Aro de retención del fuelle desencajado que deja una zona del fuelle sin
          sujeción y pierde el sellado
        - Uso frecuente de demasiado detergente que deja residuos y debilita la goma
          con el tiempo
        cta:
          catKey: junta
          label: Ver juntas de puerta compatibles
