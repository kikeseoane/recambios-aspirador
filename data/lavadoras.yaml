        - Mide la resistencia calefactora con el multímetro; valor esperado 20-30
          Ω; infinito = fundida
        - 'Comprueba el sensor NTC de temperatura: debe variar su resistencia con
          el calor'
        - Revisa el termostato de seguridad (bimétalico) que puede haberse disparado
        - Inspecciona visualmente la resistencia buscando cal acumulada o marcas de
          quemado
        causes:
        - 'Resistencia calefactora fundida: fallo habitual en modelos con varios años
          de uso y agua dura'
        - Sensor NTC de temperatura averiado
        - Termostato de seguridad disparado de forma permanente
        - Fallo en la tarjeta de control
        cta:
          catKey: resistencia
          label: Ver resistencias calefactoras compatibles
      - key: pierde-agua-puerta
        title: Indesit MTWF61252WSPE pierde agua por la puerta
