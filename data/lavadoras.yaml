  balay-lav:
    name: Balay
    notes_brand: Marca española del grupo BSH (Bosch-Siemens-Hausgeräte), fabricada
      en Zaragoza. Sus modelos comparten plataforma y piezas con Bosch y Siemens,
      lo que facilita encontrar recambios. Muy apreciada por su robustez y el servicio
      técnico en España.
    models:
    - model: Balay 3TS994XD
      slug: balay-3ts994xd
      year_range: 2019-2024
      sku_pack: washing10
      model_tokens:
      - 3ts994
      - 3ts994xd
      intro: La Balay 3TS994XD es una lavadora de 9 kg fabricada en la planta de BSH
        en Zaragoza, con motor EcoSilence Drive y clasificación energética A++. Es
        uno de los modelos más vendidos de Balay en España por su amplia capacidad,
        bajo nivel de ruido y la garantía del servicio técnico de la marca en todo
        el territorio nacional.
      comprar_nuevo:
        query: balay 3ts994xd lavadora 9kg
        label: Ver Balay 3TS994XD nueva
      problemas:
      - key: vibra-mucho
        title: Balay 3TS994XD vibra mucho y hace ruido
        intent: info
        symptoms:
        - Ruido grave y continuo que comienza durante el centrifugado y aumenta con
          las rpm
        - La lavadora se desplaza o golpea contra los muebles de la cocina
        - Al mover el tambor a mano se nota un juego excesivo o un ruido de traqueteo
        - El ruido ha ido empeorando progresivamente a lo largo de varios meses
        checks:
        - Nivela las cuatro patas con un nivel de burbuja; ajusta las patas regulables
          hasta eliminar cualquier bamboleo
        - 'Mueve el tambor hacia arriba y los lados con las dos manos: más de 1-2
          cm de juego indica rodamientos desgastados'
        - Introduce la mano en el tambor y empuja hacia el fondo de la cuba; si se
          nota golpe o dureza inusual puede haber un objeto entre tambor y cuba
        - Busca en el panel inferior si los amortiguadores están rotos o si el tambor
          toca la estructura
        causes:
        - 'Rodamientos del eje desgastados: fallo más frecuente en lavadoras BSH/Balay
          con más de 5-6 años de uso'
        - Amortiguadores traseros o delanteros deteriorados que ya no controlan el
          movimiento del tambor
        - Objeto metálico atrapado entre tambor y cuba
        - Patas desniveladas que convierten pequeños desequilibrios en grandes vibraciones
        cta:
          catKey: rodamiento
          label: Ver rodamientos compatibles
      - key: no-calienta
        title: Balay 3TS994XD no calienta el agua
        intent: info
        symptoms:
        - Los programas de 60 °C y 90 °C no eliminan manchas difíciles con la eficacia
          habitual
        - Tocando la puerta a mitad de un programa caliente, el cristal está frío
        - 'El programa de 40 °C dura lo mismo que el de 90 °C: sin tiempo de calentamiento'
        - La pantalla puede mostrar un código de error relacionado con la temperatura
        checks:
        - 'Comprueba la resistencia calefactora con el multímetro: valor esperado
          20-30 Ω; infinito = resistencia fundida'
        - 'Verifica el sensor NTC: si no varía su resistencia al cambiar la temperatura
          del agua está averiado'
        - 'Revisa si la resistencia tiene una gruesa capa de cal que pudo haberla
          fundido: es habitual en zonas de agua dura'
        - 'Comprueba el termostato de seguridad o klixon: puede haberse disparado
          definitivamente'
        causes:
        - Resistencia calefactora fundida, a menudo por acumulación de cal en zonas
          de agua dura de España
        - Sensor NTC defectuoso que reporta temperatura incorrecta
        - Termostato de seguridad disparado permanentemente
        - Fallo en la tarjeta de control que no activa la resistencia
        cta:
          catKey: resistencia
          label: Ver resistencias calefactoras compatibles
      - key: pierde-agua-puerta
        title: Balay 3TS994XD pierde agua por la puerta
        intent: info
        symptoms:
        - Agua en el suelo cada vez que se usa la lavadora
        - La junta de goma de la puerta presenta manchas negras de moho difícil de
          eliminar o pequeñas grietas
        - El goteo aparece principalmente durante el lavado, cuando el nivel de agua
          es máximo
        - Al inspeccionar el fuelle se notan zonas endurecidas o deformadas
        checks:
        - Inspecciona todo el perímetro del fuelle doblando cada sección hacia afuera
        - Revisa los pliegues internos del fuelle buscando objetos como monedas o
          grapas que lo hayan perforado
        - Verifica que el aro de sujeción plástico o metálico esté completamente encajado
          en su ranura
        - Limpia el fuelle con vinagre blanco diluido y comprueba si las grietas son
          superficiales o atraviesan la goma
        causes:
        - Fuelle de puerta con corte o perforación por objeto extraño
        - Goma endurecida por cal que se ha agrietado con el tiempo
        - Aro de retención desencajado que deja el fuelle sin sujeción
        - Uso de pastillas de lavavajillas u otros productos no recomendados que degradan
          las gomas
        cta:
          catKey: junta
          label: Ver juntas de puerta compatibles
