        title: Indesit MTWF61252WSPE no centrifuga
        intent: info
        symptoms:
        - La ropa sale muy húmeda al acabar el programa
        - El tambor gira despacio durante el lavado pero no acelera en el centrifugado
        - Se escucha el motor intentar arrancar a alta velocidad pero deteniéndose
          enseguida
        - El programa salta directamente al vaciado sin centrifugar
        checks:
        - 'Accede al panel trasero y revisa la correa de transmisión: en los modelos
          Indesit de esta gama la correa es la causa número uno de falta de centrifugado'
        - Verifica las escobillas de carbón del motor; este modelo usa un motor de
          carbones clásico y las escobillas se desgastan en 5-8 años con uso normal
        - Redistribuye la ropa y lanza solo el programa de centrifugado para descartar
          desequilibrio
        - Comprueba que el cierre de puerta esté activado correctamente; una cerradura
          dañada impide el centrifugado por seguridad
        causes:
        - 'Correa de transmisión rota o desgastada: es el fallo más frecuente en este
          modelo'
        - Escobillas de carbón del motor agotadas que no transmiten corriente al motor
          de forma fiable
        - Carga muy desequilibrada que activa la protección automática
        - Cerradura de puerta defectuosa cuyo sensor no confirma que la puerta está
          cerrada
        cta:
