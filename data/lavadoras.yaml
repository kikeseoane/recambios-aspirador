      - 3ts876bde
      intro: La Balay 3TS876BDE es una lavadora de 7 kg de la gama media de Balay,
        también fabricada en Zaragoza bajo la plataforma BSH. Comparte piezas clave
        con los modelos equivalentes de Bosch y Siemens de la misma serie, lo que
        facilita enormemente la disponibilidad de recambios a buen precio en el mercado
        español.
      comprar_nuevo:
        query: balay 3ts876bde lavadora 7kg
        label: Ver Balay 3TS876BDE nueva
      problemas:
      - key: no-centrifuga
        title: Balay 3TS876BDE no centrifuga
        intent: info
        symptoms:
        - El programa acaba pero la ropa sale empapada, sin señales de centrifugado
        - El tambor gira despacio en el lavado pero no llega a las rpm de centrifugado
        - Se muestra un código de error o el centrifugado se cancela automáticamente
        - Se escucha un intento de arranque del motor a alta velocidad seguido de
          parada brusca
        checks:
        - 'Redistribuye la ropa manualmente y selecciona solo el programa de centrifugado:
          si funciona el problema era de desequilibrio'
        - 'Accede al panel trasero y revisa la correa de transmisión: busca si está
          rota, deslizante o fuera de las poleas'
        - Verifica las escobillas de carbón del motor si son accesibles; si han llegado
          al límite de desgaste el motor no arranca con potencia suficiente
        - Comprueba que el cierre de puerta funcione correctamente; si el sensor no
          detecta la puerta cerrada, bloquea el centrifugado por seguridad
        causes:
        - Correa de transmisión rota o desgastada
        - Escobillas de carbón del motor agotadas
        - Carga desequilibrada que activa la protección automática
        - Fallo en el sensor de cierre de puerta
        cta:
          catKey: correa
          label: Ver correas compatibles
      - key: no-desagua
        title: Balay 3TS876BDE no desagua
        intent: info
        symptoms:
        - El programa se detiene con el tambor lleno de agua
        - Aparece código de error E18 o F21 en la pantalla
        - La ropa sale sin centrifugar, completamente empapada
        - La bomba se escucha pero el agua no sale por la manguera
        checks:
        - 'Abre el panel inferior y limpia el filtro de la bomba de desagüe: es la
          causa más habitual'
        - Con el filtro fuera, gira el impulsor de la bomba con el dedo para verificar
          que gira libremente
        - Revisa la manguera de desagüe en busca de pliegues, aplastamientos o altura
          de descarga incorrecta
        - Si el filtro está limpio y la bomba gira libre, comprueba la toma de la
          manguera en el sifón
        causes:
        - Filtro de bomba obstruido por objetos sólidos
        - Bomba de desagüe averiada
        - Manguera de desagüe mal instalada
        - Fallo en la tarjeta electrónica
        cta:
          catKey: bomba
          label: Ver bombas de desagüe compatibles
      - key: vibra-mucho
        title: Balay 3TS876BDE vibra mucho al centrifugar
        intent: info
        symptoms:
        - Ruido grave y creciente al centrifugar que aumenta con los meses
        - La lavadora da pequeños saltos o se desplaza durante el centrifugado
        - El tambor tiene un juego excesivo al empujarlo manualmente
        - El ruido empieza ya a baja velocidad y se vuelve insoportable a alta velocidad
        checks:
        - Nivela las patas con un nivel de burbuja
        - 'Mueve el tambor a mano en todas las direcciones: más de 1-2 cm indica rodamientos
          desgastados'
        - Inspecciona los amortiguadores desde el panel inferior
        - Busca objetos duros que puedan haberse caído entre el tambor y la cuba
        causes:
        - Rodamientos del eje desgastados
        - Amortiguadores deteriorados
        - Objeto sólido atrapado entre tambor y cuba
        - Patas desniveladas
        cta:
          catKey: rodamiento
          label: Ver rodamientos compatibles
