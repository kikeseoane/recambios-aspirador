        intent: info
        symptoms:
        - El programa se para y el tambor queda lleno de agua sin desaguar
        - El display muestra el código OE (error de desagüe)
        - La bomba de desagüe se escucha funcionando pero el agua no sale
        - El programa tarda el doble de lo normal porque intenta drenar varias veces
        checks:
        - Abre el tapón del filtro de la bomba (panel inferior derecho) con una toalla
