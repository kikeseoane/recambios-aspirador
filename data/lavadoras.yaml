        - Revisa que no haya un lazo o pliegue en la manguera de desagüe que impida
          el flujo
        causes:
        - 'Filtro de la bomba obstruido por objetos sólidos: causa más del 60% de
          los fallos de desagüe'
        - Bomba de desagüe averiada con el impulsor bloqueado o el motor quemado
        - Manguera de desagüe mal instalada o doblada que forma una bolsa de agua
          que impide el vaciado
        - Fallo en la tarjeta electrónica que no activa la bomba en el ciclo correcto
        cta:
          catKey: bomba
          label: Ver bombas de desagüe compatibles
      - key: vibra-mucho
        title: LG F4WR509SBW vibra y hace ruido al centrifugar
        intent: info
        symptoms:
        - La lavadora produce un ruido de zumbido grave que aumenta con la velocidad
        - Se desplaza o golpea contra los muebles adyacentes durante el centrifugado
        - El ruido ha ido aumentando con el tiempo y ya es claramente audible desde
          otra habitación
        - Al empujar el tambor manualmente hay más juego del normal
        checks:
        - Nivela la lavadora con sus patas regulables usando un nivel de burbuja;
          una sola pata mal apoyada genera vibraciones desproporcionadas
        - 'Mueve el tambor hacia arriba y los lados con las dos manos: el juego debe
          ser mínimo; más de 1-2 cm indica rodamientos desgastados'
        - 'Revisa los amortiguadores inferiores: si están rotos o muy blandos el tambor
          oscila demasiado al centrifugar'
        - Comprueba que no haya objetos duros (monedas, tornillos) dentro del tambor
          golpeando la cuba
        causes:
        - 'Rodamientos del eje del tambor desgastados: fallo clásico entre 5 y 8 años
          de uso con ruido grave y creciente'
        - Amortiguadores deteriorados que han perdido su capacidad de absorción de
          vibraciones
        - Objeto duro atrapado entre el tambor y la cuba que golpea en cada vuelta
        - Patas desniveladas que amplifican cualquier desequilibrio de la carga
        cta:
          catKey: rodamiento
          label: Ver rodamientos compatibles
      - key: no-calienta
        title: LG F4WR509SBW no calienta el agua
        intent: info
        symptoms:
        - Los programas de 40 °C, 60 °C o 90 °C no eliminan manchas difíciles como
          antes
        - El agua en el tambor no se nota caliente aunque el programa lleve 20 minutos
        - El código de error tE o tCL aparece en la pantalla durante el calentamiento
        - El programa dura lo mismo independientemente de la temperatura seleccionada
        checks:
        - 'Mide la continuidad de la resistencia calefactora con un multímetro: debe
          marcar entre 20 y 30 ohmios; infinito indica que está fundida'
        - 'Comprueba el sensor NTC de temperatura: su valor en ohmios cambia con la
          temperatura; un valor fijo o infinito indica fallo'
        - 'Verifica que la presión del agua de entrada sea suficiente: si el llenado
          es lento la lavadora puede no alcanzar el nivel mínimo para activar el calentamiento'
        - Revisa visualmente la resistencia buscando quemaduras o depósitos de cal
          que puedan haber cortado el elemento
        causes:
        - Resistencia calefactora fundida o calcificada que no genera calor
        - Sensor NTC de temperatura defectuoso que envía lecturas erróneas a la tarjeta
          de control
        - Termostato de seguridad disparado que corta el circuito de calefacción para
          prevenir sobrecalentamiento
        - Nivel de agua insuficiente en la cuba por un fallo en la válvula de entrada
          que impide activar la resistencia
        cta:
          catKey: resistencia
          label: Ver resistencias calefactoras compatibles
