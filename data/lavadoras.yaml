      problemas:
      - key: pierde-agua-puerta
        title: LG F2WN5S6S0 pierde agua por la puerta
        intent: info
        symptoms:
        - Goteo constante por la parte inferior de la puerta durante el programa
        - La junta de goma presenta manchas negras de moho, rigidez o pequeños cortes
          visibles
        - El suelo bajo la lavadora aparece mojado después de cada lavado
        - Al abrir la puerta se nota que el fuelle no está completamente asentado
          en el aro de sujeción
        checks:
        - Dobla el fuelle completamente hacia afuera y revisa la cara interna buscando
          cortes, agujeros o zonas endurecidas
        - Verifica que el aro de sujeción del fuelle (clip metálico o plástico) esté
          bien cerrado en todo su perímetro
        - Comprueba si hay objetos pequeños atrapados en los pliegues del fuelle que
          puedan haberlo perforado
        - Limpia el fuelle con vinagre blanco y agua caliente para ablandar los depósitos
          de cal y comprobar si hay grietas ocultas bajo la cal
        causes:
        - Junta de puerta con corte provocado por un objeto extraño que cayó entre
          el tambor y el fuelle
        - Deterioro por cal acumulada que endurece y agrieta la goma del fuelle
        - Aro de retención del fuelle mal colocado que deja una zona sin sujeción
        - Moho profundo que degrada la estructura de la goma hasta hacerla porosa
        cta:
          catKey: junta
          label: Ver juntas de puerta compatibles
      - key: no-entra-agua
        title: LG F2WN5S6S0 no entra agua o llena muy lento
        intent: info
        symptoms:
        - El programa arranca pero el tambor no se llena y la lavadora se queda parada
        - El llenado tarda más de 10 minutos para los primeros litros
        - Aparece el código de error IE en la pantalla
        - Se escucha la electroválvula intentando abrirse pero no pasa agua
        checks:
        - Cierra el grifo de entrada y desconecta la manguera de la lavadora para
          comprobar que el filtro de malla de la entrada no esté obstruido por cal
          o suciedad
        - Verifica que el grifo de alimentación esté completamente abierto y la presión
          de la red sea suficiente (mínimo 0,5 bar)
        - Comprueba que la manguera de entrada no esté aplastada, doblada o con el
          interior obstruido
        - 'Mide con el multímetro la continuidad de la electroválvula de entrada:
          una bobina abierta (infinito) indica que la válvula está averiada'
        causes:
        - Filtro de malla de la electroválvula obstruido por sedimentos de cal o partículas
          de la red
        - Electroválvula de entrada averiada cuya bobina no abre el paso de agua
        - Presión de red insuficiente, especialmente en pisos superiores o zonas con
          baja presión
        - Manguera de entrada aplastada o con un doblez que impide el flujo
        cta:
          catKey: accesorios
          label: Ver válvulas y accesorios de entrada
