    - model: Bosch WAN28281ES
      slug: bosch-wan28281es
      year_range: 2019-2023
      sku_pack: washing10
      model_tokens:
      - wan28281
      - wan28281es
      intro: La Bosch WAN28281ES es una lavadora de 8 kg de la Serie 4, diseñada para
        el segmento medio del mercado español. Su motor EcoSilence Drive ofrece un
        funcionamiento silencioso y la hace especialmente popular en pisos y apartamentos.
        Combina la fiabilidad característica de Bosch con un precio accesible dentro
        de la gama.
      comprar_nuevo:
        query: bosch wan28281 serie 4 lavadora 8kg
        label: Ver Bosch WAN28281ES nueva
      problemas:
      - key: pierde-agua-puerta
        title: Bosch WAN28281ES pierde agua por la puerta
        intent: info
        symptoms:
        - Agua en el suelo bajo la puerta al finalizar o durante el programa
        - La junta de goma de la puerta presenta decoloración, dureza o fisuras visibles
        - Al cerrar la puerta se nota que el fuelle no hace un sellado uniforme
        - Las manchas de agua aparecen especialmente en la parte inferior del marco
          de la puerta
        checks:
        - Inspecciona el fuelle completamente, doblando cada sección hacia afuera
          para ver las zonas ocultas en los pliegues
        - Busca objetos metálicos pequeños en los pliegues del fuelle, ya que monedas
          y grapas son la causa más frecuente de perforaciones
        - Comprueba que el aro metálico de sujeción del fuelle esté correctamente
          asentado en su ranura en todo el perímetro
        - Realiza un programa corto y observa desde qué punto exacto del fuelle sale
          el agua para localizar la zona dañada
        causes:
        - Fuelle de puerta con corte o perforación por un objeto extraño
        - Deterioro del caucho por uso prolongado y acumulación de cal
        - Aro de sujeción parcialmente desencajado que deja una sección del fuelle
          sin soporte
        - Exceso de detergente habitual que genera espuma en exceso y fuerza las juntas
        cta:
          catKey: junta
          label: Ver juntas de puerta compatibles
      - key: no-centrifuga
        title: Bosch WAN28281ES no centrifuga
        intent: info
        symptoms:
        - La ropa sale muy húmeda aunque el programa haya concluido sin error visible
        - El tambor gira durante el lavado pero se detiene antes de llegar a la velocidad
          de centrifugado
        - Se muestra el código F43 o el programa salta directamente al final sin centrifugar
        - Se escucha un intento de aceleración seguido de una reducción brusca de
          velocidad
        checks:
        - 'Comprueba el equilibrado de la carga: añade prendas similares o redistribuye
          la ropa y repite el centrifugado manualmente'
        - 'Revisa visualmente la correa de transmisión accediendo por el panel trasero:
          busca grietas, desgaste o que se haya salido de la polea'
        - 'Verifica que las escobillas de carbón del motor no estén desgastadas: si
          miden menos de 5 mm ya no hacen buen contacto'
        - Comprueba que la puerta cierre perfectamente y el seguro esté activado;
          la lavadora no centrífuga si detecta que la puerta no está bloqueada
        causes:
        - Correa de transmisión rota o deslizante que impide transmitir el giro del
          motor al tambor
        - Escobillas de carbón desgastadas que reducen la potencia del motor
        - Carga desequilibrada que activa el sistema de protección y cancela el centrifugado
        - Fallo en el cierre de puerta que el sensor detecta como puerta abierta
        cta:
          catKey: correa
          label: Ver correas compatibles
      - key: no-entra-agua
        title: Bosch WAN28281ES no entra agua
        intent: info
        symptoms:
        - La lavadora arranca pero no se escucha el agua entrar y el programa queda
          bloqueado en el llenado
        - Aparece el código de error F17 o E17 en el display
        - El cajón del detergente no se vacía porque no pasa agua a través de él
        - Se escucha un clic de la electroválvula pero sin flujo de agua
        checks:
        - Comprueba que el grifo de alimentación esté totalmente abierto
        - Desconecta la manguera de entrada y limpia el filtro de malla en el conector
          de la lavadora con agua corriente y un cepillo suave
        - 'Verifica la presión de la red: en zonas de baja presión o pisos altos puede
          no alcanzar el mínimo requerido'
        - 'Mide con el multímetro la electroválvula de entrada: las bobinas deben
          marcar entre 3 y 5 kΩ; un valor infinito indica bobina quemada'
        causes:
        - Filtro de malla de la entrada de agua obstruido por sedimentos y cal
        - Electroválvula de entrada averiada con bobina quemada o membrana atascada
        - Presión de red insuficiente para abrir la electroválvula de entrada
        - Manguera de entrada aplastada o con la rosca de conexión obstruida
        cta:
          catKey: accesorios
          label: Ver válvulas y accesorios de entrada
