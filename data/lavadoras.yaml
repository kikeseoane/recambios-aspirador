    name: Beko
    notes_brand: Marca turca de gran volumen en el segmento económico y medio español.
      Muy presentes en grandes superficies, con modelos fiables y recambios accesibles.
      Las bombas de desagüe y juntas de puerta son los recambios más solicitados.
    models:
    - model: Beko WTE7512BXSST
      slug: beko-wte7512bxsst
      year_range: 2019-2023
      sku_pack: washing10
      model_tokens:
      - wte7512
      - wte7512bxsst
      intro: La Beko WTE7512BXSST es una lavadora de 7,5 kg de la gama media-baja
        de Beko, una de las más vendidas en grandes superficies españolas por su precio
        competitivo y sus dimensiones estándar. Cuenta con motor de inducción sin
        escobillas que alarga la vida útil del electrodoméstico y reduce el mantenimiento
        en comparación con modelos de motor de carbones.
      comprar_nuevo:
        query: beko wte7512 lavadora 7.5kg
        label: Ver Beko WTE7512BXSST nueva
      problemas:
      - key: no-desagua
        title: Beko WTE7512BXSST no desagua
        intent: info
        symptoms:
        - El programa queda bloqueado con agua en el tambor
        - Aparece el código de error E3 o la lavadora parpadea sin avanzar
        - La ropa sale completamente empapada al final del programa
        - La bomba de desagüe suena pero no expulsa agua
        checks:
        - Abre el tapón del filtro de la bomba (panel inferior izquierdo) con una
          toalla en el suelo
        - 'Limpia el filtro: en los modelos Beko es habitual encontrar monedas, botones
          y fibras compactadas'
        - 'Gira el impulsor de la bomba a mano: debe girar con suavidad; si está duro
          o bloqueado la bomba está averiada'
        - Revisa la manguera de desagüe buscando pliegues o alturas de descarga incorrectas
        causes:
        - 'Filtro de bomba obstruido: la causa más frecuente en los modelos Beko de
          esta gama'
        - Bomba de desagüe averiada con impulsor atascado
        - Manguera de desagüe con pliegue o mala instalación
        - Fallo electrónico en la tarjeta de control
        cta:
          catKey: bomba
          label: Ver bombas de desagüe compatibles
      - key: pierde-agua-puerta
        title: Beko WTE7512BXSST pierde agua por la puerta
        intent: info
        symptoms:
        - Goteo o charco de agua bajo la puerta durante o tras el programa
        - La junta de goma de la puerta presenta manchas negras de moho muy marcadas
          o pequeños cortes
        - El agua sale por un punto concreto del fuelle, no de forma uniforme
        - La fuga aparece especialmente cuando el nivel de agua en el tambor es máximo
        checks:
        - Inspecciona el fuelle doblando cada sección hacia afuera para ver la parte
          trasera y los pliegues interiores
        - Comprueba si hay objetos metálicos en los pliegues del fuelle que lo hayan
          perforado
        - Verifica que el aro de retención del fuelle esté completamente encajado
          en su ranura
        - Realiza un programa corto y observa desde qué punto exacto del fuelle sale
          el agua
        causes:
        - 'Junta de puerta con corte por objeto extraño: causa más habitual'
        - Deterioro del caucho por envejecimiento, cal y moho
        - Aro de sujeción desencajado
        - Exceso de detergente habitual que deteriora la goma a largo plazo
        cta:
          catKey: junta
          label: Ver juntas de puerta compatibles
      - key: no-calienta
        title: Beko WTE7512BXSST no calienta el agua
        intent: info
        symptoms:
        - La ropa no sale con el nivel de higiene esperado en programas de 60 °C
        - El agua en el tambor está fría al tacto a mitad de un programa caliente
        - El código de error E5 o similar aparece en el display
        - Los programas calientes tardan lo mismo que los fríos
        checks:
        - 'Mide la resistencia calefactora con el multímetro: valor normal 20-30 Ω;
          infinito = fundida'
        - 'Verifica el sensor NTC de temperatura: su resistencia debe variar con el
          calor; fija = averiado'
        - Comprueba visualmente la resistencia buscando depósitos blancos de cal o
          marcas de quemado
        - Revisa el termostato de seguridad que puede haberse disparado por sobrecalentamiento
        causes:
        - Resistencia calefactora fundida
        - Sensor NTC defectuoso
        - Termostato de seguridad disparado
        - Fallo en la tarjeta de control
        cta:
          catKey: resistencia
          label: Ver resistencias calefactoras compatibles
