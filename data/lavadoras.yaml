        - La ropa no queda limpia en programas de 60 °C o 90 °C
        - El agua está fría al tacto aunque el programa lleve 20 minutos
        - El programa de alta temperatura dura lo mismo que el de 30 °C
        - Aparece un código de error F07 o similar en el display
