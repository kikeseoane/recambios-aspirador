        symptoms:
        - Las cerdas están dobladas o desgastadas
        - La limpieza ya no es tan eficaz
        - Las cerdas indicadoras han perdido el color
        causes:
        - Cabezal con más de 3 meses de uso
        - Presión excesiva al cepillar
        - Uso de pasta muy abrasiva
        checks:
