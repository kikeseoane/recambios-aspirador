      compatibilidad:
      - Los cabezales Oral-B son casi universales entre modelos, salvo los de la serie
        IO que tienen conector diferente.
      - 'Philips Sonicare tiene cabezales con distintos sistemas de clic: C1, C2,
        G3... no todos encajan en todos los modelos.'
      - 'Los cargadores de cepillos eléctricos tienen voltajes específicos: no uses
        un cargador de otro dispositivo.'
      - 'La mayoría de cepillos eléctricos tienen carga inductiva (sin contacto):
        el cargador debe ser el correcto para ese modelo.'
      - Los cabezales de Oral-B Pro/Vitality son distintos a los de la serie iO aunque
        el mango sea similar.
      problemas:
      - key: no-carga-cepillo
        intent: info
        cta_cat: cargador
        fix_hint: Si el cepillo lleva más de 3 años en uso, la batería interna puede
          estar al final de su vida útil.
        title: iO Series 6 no carga o batería dura poco
        symptoms:
        - El cepillo no se enciende tras la carga
        - La batería dura menos de 5 minutos
        - El indicador de batería parpadea inmediatamente
        causes:
        - Batería interna degradada por ciclos
        - Cargador o base de carga dañada
        - Fallo en la carga inalámbrica (acumulación de humedad)
        checks:
        - Limpiar la base de carga y los contactos con un paño seco
        - Probar en otra toma de corriente
        - Dejar el cepillo en carga 24h sin interrumpir el ciclo
      - key: cabezal-gastado
        intent: info
        cta_cat: cabezal
        fix_hint: Los dentistas recomiendan cambiar el cabezal cada 3 meses o antes
          si las cerdas se doblan. Los packs de 4 son la opción más económica.
        title: 'iO Series 6: cabezal muy gastado, no limpia bien'
        symptoms:
        - Las cerdas están dobladas o desgastadas
        - La limpieza ya no es tan eficaz
        - Las cerdas indicadoras han perdido el color
        causes:
        - Cabezal con más de 3 meses de uso
        - Presión excesiva al cepillar
        - Uso de pasta muy abrasiva
        checks:
        - Revisar si las cerdas indicadoras han perdido el color azul
        - Verificar que las cerdas no están dobladas hacia los lados
        - Asegurarse de que el cabezal encaja correctamente en el mango
      - key: vibra-menos-cepillo
        intent: info
        cta_cat: accesorios
        fix_hint: Si tras una carga completa sigue con poca potencia, prueba sin cabezal
          para ver si el eje vibra con normalidad.
        title: iO Series 6 vibra menos o parece más lento
        symptoms:
        - La vibración se siente más débil que antes
        - El modo de limpieza seleccionado no parece activo
        - El mango se calienta durante el uso
        causes:
        - Batería baja o degradada
        - Cabezal mal encajado que frena el motor
        - Humedad interna por exposición excesiva al agua
        checks:
        - Cargar completamente el cepillo (1-2 horas)
        - Retirar y volver a encajar el cabezal firmemente
        - Verificar que el cabezal no tiene obstrucción en el eje de vibración
      faqs:
      - q: ¿Con qué frecuencia debo cambiar el cabezal del cepillo eléctrico?
        a: Los dentistas recomiendan cada 3 meses o antes si las cerdas indicadoras
          pierden el color. Con uso intensivo puede ser necesario cada 2 meses.
      - q: ¿Los cabezales compatibles son igual de buenos que los originales?
        a: Los cabezales compatibles de calidad ofrecen limpieza similar. Busca que
          especifiquen compatibilidad con tu modelo exacto y que las cerdas sean de
          nylon suave.
      - q: ¿Puedo usar el cargador de otro cepillo Oral-B con el mío?
        a: La mayoría de cargadores Oral-B son compatibles entre modelos de la misma
          gama. Sin embargo, los modelos iO usan un cargador diferente. Verifica siempre
          el voltaje de salida.
      - q: ¿Es seguro dejar el cepillo cargando toda la noche?
        a: Sí, los cargadores modernos tienen protección de sobrecarga. Sin embargo,
          para prolongar la vida de la batería es mejor evitar mantenerlo conectado
          permanentemente.
