        - Verificar que las cerdas no están dobladas hacia los lados
        - Asegurarse de que el cabezal encaja correctamente en el mango
      - key: vibra-menos-cepillo
        intent: info
        cta_cat: accesorios
        fix_hint: Si tras una carga completa sigue con poca potencia, prueba sin cabezal
          para ver si el eje vibra con normalidad.
        title: DiamondClean HX9352 vibra menos o parece más lento
        symptoms:
        - La vibración se siente más débil que antes
        - El modo de limpieza seleccionado no parece activo
        - El mango se calienta durante el uso
        causes:
        - Batería baja o degradada
        - Cabezal mal encajado que frena el motor
        - Humedad interna por exposición excesiva al agua
        checks:
        - Cargar completamente el cepillo (1-2 horas)
        - Retirar y volver a encajar el cabezal firmemente
        - Verificar que el cabezal no tiene obstrucción en el eje de vibración
      faqs:
      - q: ¿Con qué frecuencia debo cambiar el cabezal del cepillo eléctrico?
        a: Los dentistas recomiendan cada 3 meses o antes si las cerdas indicadoras
          pierden el color. Con uso intensivo puede ser necesario cada 2 meses.
      - q: ¿Los cabezales compatibles son igual de buenos que los originales?
        a: Los cabezales compatibles de calidad ofrecen limpieza similar. Busca que
          especifiquen compatibilidad con tu modelo exacto y que las cerdas sean de
          nylon suave.
      - q: ¿Puedo usar el cargador de otro cepillo Oral-B con el mío?
        a: La mayoría de cargadores Oral-B son compatibles entre modelos de la misma
          gama. Sin embargo, los modelos iO usan un cargador diferente. Verifica siempre
          el voltaje de salida.
      - q: ¿Es seguro dejar el cepillo cargando toda la noche?
        a: Sí, los cargadores modernos tienen protección de sobrecarga. Sin embargo,
          para prolongar la vida de la batería es mejor evitar mantenerlo conectado
          permanentemente.
