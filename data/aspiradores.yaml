      - key: ruido-cepillo
        intent: info
        cta_cat: cepillo
        fix_hint: Los cepillos laterales suelen doblarse con el uso. Son piezas baratas
          de cambiar y mejoran notablemente el resultado.
        title: Conga 1090 hace ruido en el cepillo
        symptoms:
        - Sonido extraño o rasqueo durante la limpieza
        - Vibración inusual en el robot
        - El robot se detiene al pasar por ciertas zonas
        causes:
        - Pelo o hilos enredados en el cepillo principal
        - Cepillo lateral doblado o roto
        - Objeto atrapado en la rueda o cepillo
        checks:
        - Retirar pelo del cepillo principal con tijeras
        - Inspeccionar cepillos laterales y sustituir si están doblados
        - Revisar las ruedas por objetos atrapados
      - key: no-vuelve-base
        intent: info
        cta_cat: accesorios
        fix_hint: La base debe estar en una pared despejada, sin objetos a menos de
          1m a cada lado y a 1,5m de escaleras.
        title: Conga 1090 no encuentra la base de carga o no vuelve
        symptoms:
        - El robot termina la limpieza en mitad de la habitación
        - El robot gira en círculos buscando la base sin encontrarla
        - La app indica "buscando base" pero nunca regresa
        causes:
        - Sensor de infrarrojos de la base sucio o bloqueado
        - Base de carga movida o colocada en posición incorrecta
        - Obstáculos entre la última posición del robot y la base
        checks:
        - Limpiar los sensores frontales del robot con un paño seco
        - Reubicar la base en una pared libre y sin muebles a los lados
        - Asegurarse de que la base tiene alimentación y la luz está encendida
      - key: ruedas-bloqueadas
        intent: info
        cta_cat: accesorios
        fix_hint: Si una rueda no hace retorno elástico al presionarla hacia arriba,
          el muelle interno puede estar roto y la rueda puede necesitar sustitución.
        title: 'Conga 1090: las ruedas están bloqueadas o el robot no se mueve'
        symptoms:
        - El robot gira sobre sí mismo sin avanzar
        - Una rueda parece atascada o hace ruido al rodar
        - El robot se detiene y emite un error de movimiento
        causes:
        - Pelo o suciedad enredada en los ejes de las ruedas
        - Rueda caída en un escalón o atrapada bajo un mueble
        - Módulo de rueda dañado por impacto
        checks:
        - Levantar el robot y girar las ruedas manualmente
        - Retirar todo el pelo e hilos del eje de cada rueda
        - Comprobar que las ruedas muestran resistencia elástica (muelle interno)
      - key: mapa-errores
        intent: info
        cta_cat: accesorios
        fix_hint: Borrar el mapa y dejar que el robot explore de nuevo suele corregir
          la mayoría de errores de cartografía.
        title: 'Conga 1090: el mapa es incorrecto o el robot se pierde'
        symptoms:
        - El mapa de la app no se corresponde con la distribución real
        - El robot pasa dos veces por el mismo sitio o se salta zonas
        - Después de mover el robot, el mapa queda inconsistente
        causes:
        - Sensor LiDAR o de pared sucio que lee mal las distancias
        - Entorno con mucha luz directa que interfiere con los sensores
        - Firmware desactualizado con bugs de mapeo corregidos en versiones nuevas
        checks:
        - Limpiar el sensor LiDAR (torreta giratoria) con un paño suave
        - Borrar el mapa guardado y hacer una limpieza completa desde cero
        - Verificar si hay actualización de firmware disponible en la app
      - key: no-arranca-robot
        intent: info
        cta_cat: filtro
        fix_hint: Si los contactos están limpios pero el robot sigue sin cargar, el
          problema puede ser la batería interna. Es la pieza más habitual de sustituir
          en robots con más de 3 años.
        title: Conga 1090 no enciende o no inicia la limpieza
        symptoms:
        - El robot no responde al pulsar el botón o desde la app
        - La base de carga está encendida pero el robot no carga
        - La app muestra el robot como "desconectado" o "sin batería"
        causes:
        - Batería interna muy descargada o degradada
        - Contactos de la base de carga sucios u oxidados
        - Fallo en la conexión WiFi que impide el control desde la app
        checks:
        - Limpiar los contactos metálicos del robot y de la base con un paño seco
        - Colocar el robot manualmente sobre la base y esperar 2 horas
        - Reiniciar el robot pulsando el botón de encendido 5-10 segundos
      faqs:
      - q: ¿Con qué frecuencia debo cambiar los consumibles del robot?
        a: 'Filtros HEPA: cada 2-3 meses. Cepillos laterales: cada 3-6 meses. Cepillo
          principal: cada 6-12 meses. Mopas: cada 1-2 meses con uso regular.'
      - q: ¿Cómo sé qué cepillo lateral es el correcto para mi robot?
        a: Comprueba el número de brazos (2 o 3) y el sentido de giro. Algunos modelos
          llevan uno de cada lado (L+R). Busca el número de referencia en la pieza
          original.
      - q: ¿Los kits de accesorios incluyen todo lo que necesito?
        a: Los kits suelen incluir filtros, cepillos laterales y principal. Verifica
          qué contiene cada kit ya que la composición varía según fabricante y modelo.
      - q: ¿Puedo comprar piezas de mantenimiento sueltas o solo en packs?
        a: Ambas opciones existen. Los packs suelen ser más económicos si necesitas
          varios consumibles a la vez. Las piezas sueltas son útiles si solo falla
          un componente concreto.
