      problemas:
      - key: no-carga
        intent: info
        cta_cat: bateria
        fix_hint: Si el cargador funciona correctamente, lo más probable es que necesites
          sustituir la batería.
        title: Xiaomi Vacuum Cleaner G20 no carga
        symptoms:
        - No enciende tras cargar
        - La luz de carga parpadea pero no mantiene carga
        - La batería se descarga muy rápido
        causes:
        - Batería degradada o agotada
        - Cargador defectuoso o mal contacto
        - Contactos de carga oxidados
        checks:
        - Probar con otro enchufe o base de carga
        - Revisar que los contactos estén limpios y sin óxido
        - Comprobar si el cargador original calienta o hace ruido
      - key: pierde-potencia
        intent: info
        cta_cat: filtro
        fix_hint: Si tras limpiar el filtro y eliminar obstrucciones no mejora, considera
          sustituir el filtro por uno nuevo.
        title: Xiaomi Vacuum Cleaner G20 ha perdido potencia de aspiración
        symptoms:
        - Aspira menos que antes
        - Se obstruye con facilidad
        - El motor suena más fuerte de lo normal
        causes:
        - Filtro saturado o sucio
        - Conductos o tubo obstruidos
        - Rodillo con pelo o hilos enredados
        checks:
        - Limpiar o sustituir el filtro
        - Revisar el tubo y la boquilla por obstrucciones
        - Limpiar el rodillo de pelo y suciedad
      - key: cepillo-no-gira
        intent: info
        cta_cat: cepillo
        fix_hint: Si el rodillo gira libre a mano pero no con el motor, puede que
          el módulo de transmisión esté dañado.
        title: 'Xiaomi Vacuum Cleaner G20: el cepillo o rodillo no gira'
        symptoms:
        - El rodillo no gira al encender
        - Se escucha el motor pero el cepillo está parado
        - La aspiración es muy débil sobre alfombras
        causes:
        - Pelo o hilos enredados bloqueando el rodillo
        - Rodillo desgastado o roto
        - Fallo en el módulo de tracción del cepillo
        checks:
        - Retirar manualmente pelo e hilos del rodillo
        - Verificar que el rodillo encaja y gira libremente a mano
        - Comprobar que no hay objetos atrapados en el eje
      - key: se-apaga-solo
        intent: info
        cta_cat: bateria
        fix_hint: Si el problema ocurre desde el principio del uso y no tras uso prolongado,
          la batería suele ser la causa raíz.
        title: Xiaomi Vacuum Cleaner G20 se apaga solo sin avisar
        symptoms:
        - El aspirador se apaga a mitad del uso
        - Se reinicia o corta la alimentación de repente
        - La luz de batería parpadea justo antes de apagarse
        causes:
        - Batería con celdas degradadas que no aguantan la carga de pico
        - Sobrecalentamiento del motor por filtro saturado o rodillo bloqueado
        - Protección térmica activada por uso prolongado
        checks:
        - Limpiar el filtro y el rodillo antes de volver a encender
        - Dejar reposar 10 minutos si se ha usado mucho rato seguido
        - Comprobar si la autonomía mejora después de un ciclo de carga completo
      - key: hace-ruido
        intent: info
        cta_cat: cepillo
        fix_hint: Un raspado rítmico suele indicar objeto en el rodillo. Un silbido
          agudo suele indicar obstrucción en el conducto.
        title: Xiaomi Vacuum Cleaner G20 hace ruido extraño o fuerte
        symptoms:
        - Sonido nuevo o más fuerte de lo normal al aspirar
        - Vibración inusual en el mango o cabezal
        - Ruido de raspado o clic al pasar por suelos
        causes:
        - Pelo, hilo o pequeño objeto atrapado en el rodillo o eje
        - Rodillo desgastado que roza la carcasa
        - Obstrucción parcial en el tubo o boquilla
        checks:
        - Apagar y retirar el rodillo para inspeccionarlo manualmente
        - Revisar el tubo y la boquilla por objetos que puedan vibrar
        - Comprobar si el ruido desaparece sin la boquilla conectada
      - key: mal-olor
        intent: info
        cta_cat: filtro
        fix_hint: Si el mal olor persiste con filtro limpio y rodillo limpio, puede
          que el motor haya absorbido partículas. Revisa el filtro post-motor.
        title: Xiaomi Vacuum Cleaner G20 desprende mal olor al aspirar
        symptoms:
        - Olor a quemado, polvo o a sucio al encender
        - El olor aumenta al aspirar alfombras o pelo de mascotas
        - El ambiente queda con mal olor después de aspirar
        causes:
        - Filtro saturado que recircula el polvo por el aire
        - Rodillo con pelo acumulado que se calienta con el motor
        - Depósito o contenedor sin limpiar durante mucho tiempo
        checks:
        - Limpiar o sustituir el filtro
        - Limpiar el rodillo y retirar todo el pelo acumulado
        - Vaciar y lavar el depósito o contenedor de polvo
      - key: no-arranca
        intent: info
        cta_cat: bateria
        fix_hint: Si tras carga completa sigue sin arrancar, el problema puede ser
          la batería o el controlador. La batería es la pieza más fácil de sustituir
          primero.
        title: Xiaomi Vacuum Cleaner G20 no enciende o no arranca
        symptoms:
        - No responde al pulsar el botón de encendido
        - El LED no parpadea ni se enciende
        - Arranca un segundo y se vuelve a apagar
        causes:
        - Batería completamente descargada o dañada
        - Cargador sin alimentación o con conector suelto
        - Bloqueo de seguridad por rodillo bloqueado o sobrecalentamiento previo
        checks:
        - Conectar el cargador y esperar 30 minutos antes de volver a intentar
        - Verificar que el cargador está conectado a la corriente y la luz está encendida
        - Comprobar que el rodillo gira libre y no hay obstrucciones
      faqs:
      - q: ¿Cómo compruebo si este recambio es compatible con mi aspirador?
        a: Revisa el modelo exacto, la serie y, si hay variantes (Animal, Absolute,
          Pro...), confirma cuál tienes. Compara encajes, conectores y medidas con
          la pieza original.
      - q: ¿Los recambios compatibles son igual de buenos que los originales?
        a: Depende del fabricante. Muchos compatibles de calidad ofrecen rendimiento
          similar a menor precio, pero revisa valoraciones y que indiquen compatibilidad
          explícita con tu modelo.
      - q: ¿Con qué frecuencia debo cambiar el filtro?
        a: Lo habitual es cada 3-6 meses con uso normal, o antes si notas pérdida
          de succión. Los filtros lavables se limpian mensualmente y se sustituyen
          anualmente.
      - q: ¿Puedo usar una batería de mayor capacidad que la original?
        a: Solo si el voltaje es idéntico y el formato físico encaja. Una batería
          de mayor Ah dará más autonomía sin dañar el motor, pero verifica siempre
          la compatibilidad de voltaje.
