        - sku: panasonic-af-panasonic-es-la93-accesorios-acc-kit-shaver
          title: Kit accesorios compatible para ES-LA93 Arc4
          intent: compra
          query: Panasonic ES-LA93 Arc4 kit accessory accesorios
