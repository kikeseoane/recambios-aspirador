          model_tokens: *id022
      compatibilidad:
      - Comprueba la serie exacta (Series 3000, 5000, 7000...) antes de comprar láminas
        o cabezal.
      - 'Las láminas y cuchillas varían según la serie del modelo (Series 3000, 5000,
        7000): no son intercambiables entre series.'
      - Los cargadores Philips usan distintos conectores según la antigüedad del modelo
        (redondo 2 pines vs. USB-C).
      - Los accesorios OneBlade (QP/QG) no son compatibles con las afeitadoras de
        láminas de la misma marca.
      - 'Verifica siempre el año de fabricación para cabezales: los modelos antiguos
        pueden tener anclaje diferente.'
      problemas:
      - key: lamina-desgastada
        intent: info
        cta_cat: laminas
        fix_hint: Philips recomienda sustituir la lámina cada 2 años; Braun cada 18
          meses con uso diario.
        title: 'ES-LA93 Arc4: lámina desgastada o raya la piel'
        symptoms:
        - La afeitadora raya o irrita la piel
        - El afeitado ya no es tan apurado como antes
        - Nota que el vello "tira" en lugar de cortarse limpiamente
        causes:
        - Lámina metálica desgastada por el uso
        - Cabezal con más de 18-24 meses de uso intensivo
        - Pelo muy grueso o rizado que desgasta más la lámina
        checks:
        - '{''Revisar la lámina a contraluz'': ''si hay agujeros o deformaciones hay
          que cambiarla''}'
        - Comprobar si el problema mejora tras limpiar bien el cabezal
        - Verificar que el cabezal está correctamente encajado
      - key: no-carga-afeitadora
        intent: info
        cta_cat: cargador
        fix_hint: Si la batería no aguanta más de 15 minutos tras carga completa,
          es probable que necesite reemplazarse.
        title: ES-LA93 Arc4 no carga o tiene poca autonomía
        symptoms:
        - La batería dura menos de 20 minutos
        - El indicador de carga no responde al conectar
        - Se apaga sin avisar durante el afeitado
        causes:
        - Batería degradada tras 2-3 años de uso
        - Cargador o cable dañado
        - Contactos de carga sucios u oxidados
        checks:
        - Limpiar los contactos con un paño seco
        - Probar con otra toma de corriente o adaptador
        - Verificar que el cargador está caliente (normal) o frío (fallo)
      - key: cabezal-no-oscila
        intent: info
        cta_cat: cabezal
        fix_hint: Si después de limpiar el cabezal sigue rígido, sustituirlo suele
          ser la solución más económica frente a reparación.
        title: 'ES-LA93 Arc4: el cabezal no oscila o gira mal'
        symptoms:
        - El cabezal está rígido y no se adapta al contorno de la cara
        - Se escucha un clic o ruido al presionar el cabezal
        - El afeitado es desigual por zonas
        causes:
        - Mecanismo de oscilación bloqueado por acumulación de residuos
        - Cabezal dañado o deformado por caída
        - Resorte del cabezal roto
        checks:
        - Desmonta el cabezal y elimina acumulaciones de vello
        - Verifica que el cabezal encaja correctamente al volver a montarlo
        - Comprueba si el cabezal oscila libremente a mano sin la máquina
      faqs:
      - q: ¿Con qué frecuencia debo cambiar las láminas de mi afeitadora?
        a: Philips recomienda cada 2 años; Braun cada 18 meses con uso diario. Si
          notas que la piel se irrita o el afeitado tira más de lo normal, es momento
          de cambiarlas.
      - q: ¿Los cabezales compatibles son tan buenos como los originales?
        a: Los compatibles de calidad ofrecen un rendimiento muy similar. Busca que
          indiquen explícitamente compatibilidad con tu modelo y serie.
      - q: ¿Puedo usar el cargador de otra afeitadora Philips con la mía?
        a: Solo si el voltaje de salida y el conector son idénticos. Los modelos más
          recientes usan USB-C mientras los antiguos tienen conector redondo de 2
          pines.
      - q: ¿Es normal que la afeitadora genere calor al cargar?
        a: Sí, es normal que se caliente ligeramente. Si está muy caliente al tacto
          o el indicador de carga parpadea rápidamente, puede haber un problema con
          la batería o el cargador.
