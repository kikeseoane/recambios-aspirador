{{ define "main" }}
  {{ partial "hero.html" . }}

  <div class="container section">
    <div class="two-col">
      <article class="article panel">
        {{ .Content }}
      </article>

      <aside class="panel">
        <div class="kicker">Paso siguiente</div>
        <h2 style="margin-top:0;">Vuelve al catalogo</h2>
        <p class="muted">
          Cuando termines de revisar la guia, entra en tu modelo para abrir la categoria de recambio correcta.
        </p>
        <div class="chips" style="margin-top:12px;">
          <a class="chip" href="{{ "modelos/" | relURL }}">Buscar por modelo</a>
          <a class="chip" href="{{ "marcas/" | relURL }}">Ver marcas</a>
        </div>
      </aside>
    </div>
  </div>
{{ end }}
