name: Build & Deploy Hugo Site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build catalog
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import yaml

          root = pathlib.Path(".")
          verticals_doc = yaml.safe_load((root / "data" / "verticals.yaml").read_text(encoding="utf-8")) or {}
          verticals = list((verticals_doc.get("verticals") or {}).keys())
          if not verticals:
              verticals = ["aspiradores"]

          for vertical in verticals:
              subprocess.run(
                  [sys.executable, "tools/build_catalog.py", "--vertical", str(vertical)],
                  check=True,
              )
          PY

      - name: Generate content stubs
        run: python tools/generar.py --force

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build Hugo site
        run: hugo --minify --gc
        env:
          HUGO_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: recambios-aspirador.com
