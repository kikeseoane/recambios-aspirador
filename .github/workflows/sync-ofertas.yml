name: Sync ofertas AliExpress

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-ofertas
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      - name: Notificar Telegram (inicio)
        continue-on-error: true
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=Sync AliExpress iniciado a las $(date -u '+%H:%M UTC')")
          echo "Telegram inicio: $RESP"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild catalogos
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import yaml

          root = pathlib.Path(".")
          verticals_doc = yaml.safe_load((root / "data" / "verticals.yaml").read_text(encoding="utf-8")) or {}
          verticals = list((verticals_doc.get("verticals") or {}).keys())
          if not verticals:
              verticals = ["aspiradores"]

          for vertical in verticals:
              subprocess.run(
                  [sys.executable, "tools/build_catalog.py", "--vertical", str(vertical)],
                  check=True,
              )
          PY

      - name: Resolver refresco diario de vertical defaults
        run: |
          HOUR_UTC=$(date -u '+%H')
          if [ "$HOUR_UTC" = "04" ]; then
            echo "RUN_VERTICAL_DEFAULTS=1" >> $GITHUB_ENV
          else
            echo "RUN_VERTICAL_DEFAULTS=0" >> $GITHUB_ENV
          fi

      - name: Run sync_ofertas (batch horario)
        id: sync
        env:
          ALI_APP_KEY: ${{ secrets.ALI_APP_KEY }}
          ALI_APP_SECRET: ${{ secrets.ALI_APP_SECRET }}
          ALI_TRACKING_ID: recambiosaspiradora
          AI_VALIDATION_PROVIDER: ${{ vars.AI_VALIDATION_PROVIDER }}
          AI_VALIDATION_MODEL: ${{ vars.AI_VALIDATION_MODEL }}
          AI_VALIDATION_URL: ${{ vars.AI_VALIDATION_URL }}
          AI_VALIDATION_MAX_CHECKS: ${{ vars.AI_VALIDATION_MAX_CHECKS }}
          AI_VALIDATION_TIMEOUT: ${{ vars.AI_VALIDATION_TIMEOUT }}
          AI_VALIDATION_API_KEY: ${{ secrets.AI_VALIDATION_API_KEY }}
        run: |
          SKIP_VERTICALS="--skip-vertical-defaults"
          if [ "${RUN_VERTICAL_DEFAULTS}" = "1" ]; then
            SKIP_VERTICALS=""
          fi
          python tools/sync_ofertas.py \
            --only-stale 7 \
            --max-minutes 28 \
            --force \
            --no-cache \
            ${SKIP_VERTICALS} | tee /tmp/sync_output.txt
          STATS_LINE=$(grep "^STATS:" /tmp/sync_output.txt | tail -n 1 || echo "STATS: n/a")
          EXEC_SUMMARY_LINE=$(grep "^EXEC_SUMMARY:" /tmp/sync_output.txt | tail -n 1 || echo "EXEC_SUMMARY: n/a")
          MISSING_NEW_LINE=$(grep "^MISSING_NEW:" /tmp/sync_output.txt | tail -n 1 || echo "MISSING_NEW: n/a")
          COMPAT_STATUS_LINE=$(grep "^COMPAT_STATUS:" /tmp/sync_output.txt | tail -n 1 || echo "COMPAT_STATUS: n/a")
          AI_STATUS_LINE=$(grep "^AI_STATUS:" /tmp/sync_output.txt | tail -n 1 || echo "AI_STATUS: n/a")
          {
            echo "stats<<SYNC_OUTPUT_EOF"
            echo "$STATS_LINE"
            echo "SYNC_OUTPUT_EOF"
            echo "exec_summary<<SYNC_OUTPUT_EOF"
            echo "$EXEC_SUMMARY_LINE"
            echo "SYNC_OUTPUT_EOF"
            echo "missing_new<<SYNC_OUTPUT_EOF"
            echo "$MISSING_NEW_LINE"
            echo "SYNC_OUTPUT_EOF"
            echo "compat_status<<SYNC_OUTPUT_EOF"
            echo "$COMPAT_STATUS_LINE"
            echo "SYNC_OUTPUT_EOF"
            echo "ai_status<<SYNC_OUTPUT_EOF"
            echo "$AI_STATUS_LINE"
            echo "SYNC_OUTPUT_EOF"
          } >> $GITHUB_OUTPUT

      - name: Commit y push si hay cambios generados
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED_FILES=$(git status --porcelain -- data/*.yaml data/*.json | awk '{print $2}')
          if [ -z "$CHANGED_FILES" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          rm -rf /tmp/generated_state
          mkdir -p /tmp/generated_state
          for f in $CHANGED_FILES; do
            mkdir -p "/tmp/generated_state/$(dirname "$f")"
            cp "$f" "/tmp/generated_state/$f"
          done
          DONE=false
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for f in $CHANGED_FILES; do
              cp "/tmp/generated_state/$f" "$f"
            done
            if git diff --quiet -- $CHANGED_FILES; then
              echo "changed=false" >> $GITHUB_OUTPUT
              DONE=true
              break
            fi
            git add $CHANGED_FILES
            git commit -m "chore: sync horario catalogos y ofertas AliExpress"
            if git push; then
              echo "changed=true" >> $GITHUB_OUTPUT
              DONE=true
              break
            fi
            echo "Push intento $i/5 fallido, reintentando..."
            sleep 3
          done
          if [ "$DONE" != "true" ]; then exit 1; fi

      - name: Notificar Telegram (exito)
        if: success()
        env:
          CHANGED: ${{ steps.commit.outputs.changed }}
          STATS: ${{ steps.sync.outputs.stats }}
          EXEC_SUMMARY: ${{ steps.sync.outputs.exec_summary }}
          MISSING_NEW: ${{ steps.sync.outputs.missing_new }}
          COMPAT_STATUS: ${{ steps.sync.outputs.compat_status }}
          AI_STATUS: ${{ steps.sync.outputs.ai_status }}
        run: |
          ELAPSED=$(( $(date +%s) - START_TIME ))
          MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
          if [ "$CHANGED" = "true" ]; then
            MSG="Sync completado en ${MINS}m${SECS}s, actualizado. ${STATS}"
          else
            MSG="Sync completado en ${MINS}m${SECS}s, sin cambios. ${STATS}"
          fi
          printf -v MSG '%s\n%s\n%s\n%s\n%s' "$MSG" "$EXEC_SUMMARY" "$AI_STATUS" "$MISSING_NEW" "$COMPAT_STATUS"
          MSG="${MSG:0:3500}"
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MSG")
          echo "Telegram exito: $RESP"
          echo "$RESP" | grep -q '"ok":true'

      - name: Notificar Telegram (error)
        if: failure() || cancelled()
        run: |
          ELAPSED=$(( $(date +%s) - START_TIME ))
          MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="Sync AliExpress FALLIDO (estado: ${{ job.status }}) tras ${MINS}m${SECS}s. Revisa el log en GitHub Actions.")
          echo "Telegram error: $RESP"
