name: Sync ofertas AliExpress

on:
  schedule:
    # Cada hora
    - cron: "0 * * * *"
  workflow_dispatch:
    # Permite lanzarlo manualmente desde GitHub > Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync_ofertas (batch horario)
        env:
          ALI_APP_KEY: ${{ secrets.ALI_APP_KEY }}
          ALI_APP_SECRET: ${{ secrets.ALI_APP_SECRET }}
          ALI_TRACKING_ID: recambiosaspiradora
        run: |
          python tools/sync_ofertas.py \
            --only-stale 30 \
            --batch-size 80 \
            --force \
            --no-cache

      - name: Commit y push si hay cambios en ofertas.yaml
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ofertas.yaml
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: sync horario ofertas AliExpress [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Notificar Telegram (éxito)
        if: success()
        run: |
          CHANGED="${{ steps.commit.outputs.changed }}"
          if [ "$CHANGED" = "true" ]; then
            MSG="✅ Sync AliExpress completado — ofertas.yaml actualizado y pusheado."
          else
            MSG="✅ Sync AliExpress completado — sin cambios en ofertas.yaml."
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MSG"

      - name: Notificar Telegram (error)
        if: failure() || cancelled()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ Sync AliExpress FALLIDO (estado: ${{ job.status }}) — revisa el log en GitHub Actions."
