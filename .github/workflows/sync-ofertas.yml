name: Sync ofertas AliExpress

on:
  schedule:
    # Cada hora
    - cron: "0 * * * *"
  workflow_dispatch:
    # Permite lanzarlo manualmente desde GitHub > Actions

concurrency:
  group: sync-ofertas
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      - name: Notificar Telegram (inicio)
        continue-on-error: true
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=Sync AliExpress iniciado a las $(date -u '+%H:%M UTC')")
          echo "Telegram inicio: $RESP"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync_ofertas (batch horario)
        id: sync
        env:
          ALI_APP_KEY: ${{ secrets.ALI_APP_KEY }}
          ALI_APP_SECRET: ${{ secrets.ALI_APP_SECRET }}
          ALI_TRACKING_ID: recambiosaspiradora
        run: |
          python tools/sync_ofertas.py \
            --only-stale 30 \
            --batch-size 40 \
            --force \
            --no-cache | tee /tmp/sync_output.txt
          STATS_LINE=$(grep "^STATS:" /tmp/sync_output.txt || echo "STATS: n/a")
          echo "stats=$STATS_LINE" >> $GITHUB_OUTPUT

      - name: Commit y push si hay cambios en ofertas.yaml
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ofertas.yaml
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: sync horario ofertas AliExpress [skip ci]"
            PUSHED=false
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main || true
              if git push; then
                PUSHED=true
                break
              fi
              echo "Push intento $i/5 fallido, reintentando en 3s..."
              sleep 3
            done
            if [ "$PUSHED" != "true" ]; then
              echo "ERROR: no se pudo pushear tras 5 intentos"
              exit 1
            fi
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Notificar Telegram (éxito)
        if: success()
        run: |
          ELAPSED=$(( $(date +%s) - START_TIME ))
          MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
          CHANGED="${{ steps.commit.outputs.changed }}"
          STATS="${{ steps.sync.outputs.stats }}"
          if [ "$CHANGED" = "true" ]; then
            MSG="✅ Sync completado en ${MINS}m${SECS}s — actualizado. ${STATS}"
          else
            MSG="✅ Sync completado en ${MINS}m${SECS}s — sin cambios. ${STATS}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MSG"

      - name: Notificar Telegram (error)
        if: failure() || cancelled()
        run: |
          ELAPSED=$(( $(date +%s) - START_TIME ))
          MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ Sync AliExpress FALLIDO (estado: ${{ job.status }}) tras ${MINS}m${SECS}s — revisa el log en GitHub Actions."
