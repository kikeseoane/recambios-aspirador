name: Sync ofertas AliExpress

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-ofertas
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write
    env:
      SYNC_OFERTAS_PAUSED: ${{ vars.SYNC_OFERTAS_PAUSED }}
      SYNC_OFERTAS_PAUSED_AT: ${{ vars.SYNC_OFERTAS_PAUSED_AT }}

    steps:
      - name: Resolver pausa efectiva
        run: |
          SHOULD_RUN=1
          REASON="active"
          if [ "${SYNC_OFERTAS_PAUSED}" = "1" ]; then
            SHOULD_RUN=0
            REASON="paused"
            if [ -n "${SYNC_OFERTAS_PAUSED_AT}" ]; then
              NOW_TS=$(date -u +%s)
              PAUSED_TS=$(date -u -d "${SYNC_OFERTAS_PAUSED_AT}" +%s 2>/dev/null || echo 0)
              AGE_DAYS=$(( (NOW_TS - PAUSED_TS) / 86400 ))
              if [ "${PAUSED_TS}" -gt 0 ] && [ "${AGE_DAYS}" -ge 10 ]; then
                SHOULD_RUN=1
                REASON="pause-expired-${AGE_DAYS}d"
              fi
            fi
          fi
          echo "SYNC_SHOULD_RUN=${SHOULD_RUN}" >> $GITHUB_ENV
          echo "SYNC_PAUSE_REASON=${REASON}" >> $GITHUB_ENV

      - name: Salir si sync está pausado
        if: env.SYNC_SHOULD_RUN != '1'
        run: |
          echo "Sync pausado, omitiendo ejecución. Motivo: ${SYNC_PAUSE_REASON}"

      - name: Notificar Telegram (inicio)
        if: env.SYNC_SHOULD_RUN == '1'
        continue-on-error: true
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=Sync AliExpress iniciado a las $(date -u '+%H:%M UTC')")
          echo "Telegram inicio: $RESP"

      - name: Checkout
        if: env.SYNC_SHOULD_RUN == '1'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        if: env.SYNC_SHOULD_RUN == '1'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: env.SYNC_SHOULD_RUN == '1'
        run: pip install -r requirements.txt

      - name: Rebuild catalogos
        if: env.SYNC_SHOULD_RUN == '1'
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import yaml

          root = pathlib.Path(".")
          verticals_doc = yaml.safe_load((root / "data" / "verticals.yaml").read_text(encoding="utf-8")) or {}
          verticals = list((verticals_doc.get("verticals") or {}).keys())
          if not verticals:
              verticals = ["aspiradores"]

          for vertical in verticals:
              subprocess.run(
                  [sys.executable, "tools/build_catalog.py", "--vertical", str(vertical)],
                  check=True,
              )
          PY

      - name: Resolver refresco diario de vertical defaults
        if: env.SYNC_SHOULD_RUN == '1'
        run: |
          HOUR_UTC=$(date -u '+%H')
          if [ "$HOUR_UTC" = "04" ]; then
            echo "RUN_VERTICAL_DEFAULTS=1" >> $GITHUB_ENV
          else
            echo "RUN_VERTICAL_DEFAULTS=0" >> $GITHUB_ENV
          fi

      - name: Run sync_ofertas (batch horario)
        if: env.SYNC_SHOULD_RUN == '1'
        id: sync
        env:
          ALI_APP_KEY: ${{ secrets.ALI_APP_KEY }}
          ALI_APP_SECRET: ${{ secrets.ALI_APP_SECRET }}
          ALI_TRACKING_ID: recambiosaspiradora
        run: |
          SKIP_VERTICALS="--skip-vertical-defaults"
          if [ "${RUN_VERTICAL_DEFAULTS}" = "1" ]; then
            SKIP_VERTICALS=""
          fi
          python tools/sync_ofertas.py \
            --only-stale 7 \
            --max-minutes 28 \
            --force \
            --no-cache \
            ${SKIP_VERTICALS} | tee /tmp/sync_output.txt
          STATS_LINE=$(grep "^STATS:" /tmp/sync_output.txt || echo "STATS: n/a")
          MISSING_NEW_LINE=$(grep "^MISSING_NEW:" /tmp/sync_output.txt || echo "MISSING_NEW: n/a")
          COMPAT_STATUS_LINE=$(grep "^COMPAT_STATUS:" /tmp/sync_output.txt || echo "COMPAT_STATUS: n/a")
          echo "stats=$STATS_LINE" >> $GITHUB_OUTPUT
          echo "missing_new=$MISSING_NEW_LINE" >> $GITHUB_OUTPUT
          echo "compat_status=$COMPAT_STATUS_LINE" >> $GITHUB_OUTPUT

      - name: Commit y push si hay cambios generados
        if: env.SYNC_SHOULD_RUN == '1'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED_FILES=$(git status --porcelain -- data/*.yaml | awk '{print $2}')
          if [ -z "$CHANGED_FILES" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          rm -rf /tmp/generated_state
          mkdir -p /tmp/generated_state
          for f in $CHANGED_FILES; do
            mkdir -p "/tmp/generated_state/$(dirname "$f")"
            cp "$f" "/tmp/generated_state/$f"
          done
          DONE=false
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for f in $CHANGED_FILES; do
              cp "/tmp/generated_state/$f" "$f"
            done
            if git diff --quiet -- $CHANGED_FILES; then
              echo "changed=false" >> $GITHUB_OUTPUT
              DONE=true
              break
            fi
            git add $CHANGED_FILES
            git commit -m "chore: sync horario catalogos y ofertas AliExpress"
            if git push; then
              echo "changed=true" >> $GITHUB_OUTPUT
              DONE=true
              break
            fi
            echo "Push intento $i/5 fallido, reintentando..."
            sleep 3
          done
          if [ "$DONE" != "true" ]; then exit 1; fi

      - name: Notificar Telegram (exito)
        if: success() && env.SYNC_SHOULD_RUN == '1'
        run: |
          ELAPSED=$(( $(date +%s) - START_TIME ))
          MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
          CHANGED="${{ steps.commit.outputs.changed }}"
          STATS="${{ steps.sync.outputs.stats }}"
          MISSING_NEW="${{ steps.sync.outputs.missing_new }}"
          COMPAT_STATUS="${{ steps.sync.outputs.compat_status }}"
          if [ "$CHANGED" = "true" ]; then
            MSG="Sync completado en ${MINS}m${SECS}s, actualizado. ${STATS}"
          else
            MSG="Sync completado en ${MINS}m${SECS}s, sin cambios. ${STATS}"
          fi
          printf -v MSG '%s\n%s\n%s' "$MSG" "$MISSING_NEW" "$COMPAT_STATUS"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MSG"

      - name: Notificar Telegram (error)
        if: (failure() || cancelled()) && env.SYNC_SHOULD_RUN == '1'
        run: |
          ELAPSED=$(( $(date +%s) - START_TIME ))
          MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="Sync AliExpress FALLIDO (estado: ${{ job.status }}) tras ${MINS}m${SECS}s. Revisa el log en GitHub Actions."
