name: Sync ofertas AliExpress

on:
  schedule:
    # Cada hora
    - cron: "0 * * * *"
  workflow_dispatch:
    # Permite lanzarlo manualmente desde GitHub > Actions

concurrency:
  group: sync-ofertas
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      - name: Notificar Telegram (inicio)
        continue-on-error: true
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=Sync AliExpress iniciado a las $(date -u '+%H:%M UTC')")
          echo "Telegram inicio: $RESP"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild catálogos
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import sys
          import yaml

          root = pathlib.Path(".")
          verticals_doc = yaml.safe_load((root / "data" / "verticals.yaml").read_text(encoding="utf-8")) or {}
          verticals = list((verticals_doc.get("verticals") or {}).keys())
          if not verticals:
              verticals = ["aspiradores"]

          for vertical in verticals:
              subprocess.run(
                  [sys.executable, "tools/build_catalog.py", "--vertical", str(vertical)],
                  check=True,
              )
          PY

      - name: Run sync_ofertas (batch horario)
        id: sync
        env:
          ALI_APP_KEY: ${{ secrets.ALI_APP_KEY }}
          ALI_APP_SECRET: ${{ secrets.ALI_APP_SECRET }}
          ALI_TRACKING_ID: recambiosaspiradora
        run: |
          python tools/sync_ofertas.py \
            --only-stale 30 \
            --max-minutes 28 \
            --force \
            --no-cache | tee /tmp/sync_output.txt
          STATS_LINE=$(grep "^STATS:" /tmp/sync_output.txt || echo "STATS: n/a")
          echo "stats=$STATS_LINE" >> $GITHUB_OUTPUT

      - name: Commit y push si hay cambios generados
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED_FILES=$(git status --porcelain -- data/*.yaml | awk '{print $2}')
          if [ -z "$CHANGED_FILES" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          rm -rf /tmp/generated_state
          mkdir -p /tmp/generated_state
          for f in $CHANGED_FILES; do
            mkdir -p "/tmp/generated_state/$(dirname "$f")"
            cp "$f" "/tmp/generated_state/$f"
          done
          DONE=false
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for f in $CHANGED_FILES; do
              cp "/tmp/generated_state/$f" "$f"
            done
            if git diff --quiet -- $CHANGED_FILES; then
              echo "changed=false" >> $GITHUB_OUTPUT
              DONE=true
              break
            fi
            git add $CHANGED_FILES
            git commit -m "chore: sync horario catalogos y ofertas AliExpress [skip ci]"
            if git push; then
              echo "changed=true" >> $GITHUB_OUTPUT
              DONE=true
              break
            fi
            echo "Push intento $i/5 fallido, reintentando..."
            sleep 3
          done
          if [ "$DONE" != "true" ]; then exit 1; fi

      - name: Notificar Telegram (éxito)
        if: success()
        run: |
          ELAPSED=$(( $(date +%s) - START_TIME ))
          MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
          CHANGED="${{ steps.commit.outputs.changed }}"
          STATS="${{ steps.sync.outputs.stats }}"
          if [ "$CHANGED" = "true" ]; then
            MSG="✅ Sync completado en ${MINS}m${SECS}s — actualizado. ${STATS}"
          else
            MSG="✅ Sync completado en ${MINS}m${SECS}s — sin cambios. ${STATS}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MSG"

      - name: Notificar Telegram (error)
        if: failure() || cancelled()
        run: |
          ELAPSED=$(( $(date +%s) - START_TIME ))
          MINS=$(( ELAPSED / 60 )); SECS=$(( ELAPSED % 60 ))
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ Sync AliExpress FALLIDO (estado: ${{ job.status }}) tras ${MINS}m${SECS}s — revisa el log en GitHub Actions."
